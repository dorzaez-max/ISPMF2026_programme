  {id:'f8',code:'PF-08',day:'Thursday 14 May',dayKey:'thu',session:'Flash Talks — Session II',type:'flash',time:'18:25–18:30',speaker:'Carly Charron',authors:'CA Charron*(1)(2), S Shamriz (3), A Kaldis (1), CP Garnham (1)(4), MS Diarra (3), and R Menassa (1)(2)',affil:'(1) London Research and Development Centre, Agriculture and Agri-Food Canada, London, Ontario, Canada (2) Department of Biology, University of Western Ontario, London, Ontario, Canada (3) Guelph Research and Development Centre, Agriculture and Agri-Food Canada, Guelph, Ontario, Canada (4) Department of Biochemistry, University of Western Ontario, London, Ontario, Canada',title:'Plant production of multivalent protein nanoparticles for vaccine applications',topic:'Viral Vectors & Nanoparticles',abstract:'Non-typhoidal Salmonella enterica serovars (NTS) are major causes of gastrointestinal disease in humans, largely due to the consumption of contaminated poultry products. While vaccination is the most effective strategy to reduce NTS colonization in poultry, current vaccines have limitations regarding safety and efficacy, highlighting the need for improved alternatives. This project investigates plant-produced, self-assembling protein nanoparticles as a novel multivalent vaccine approach for NTS. Antigenic epitopes from three outer membrane proteins were genetically fused to the encapsulin monomer to achieve multivalency at three levels: multiple antigenic targets, multiple epitopes per antigen, and multiple copies of each epitope on the nanoparticle. The multivalent constructs were transiently expressed in Nicotiana benthamiana and successfully assembled into nanoparticles, despite lower yield than single-epitope versions. Further analysis revealed that epitope identity, rather than the number of modifications, primarily influenced protein stability and accumulation. A chicken immunization and NTS challenge study demonstrated production of NTS- and antigen-specific antibodies. Ongoing experiments will assess effects on NTS colonization, vaccine optimization, and strategies for oral delivery. Overall, these findings support the feasibility of multivalent, plant-produced encapsulin nanoparticles as promising next-generation NTS vaccines.'},
  {id:'f9',code:'PF-09',day:'Thursday 14 May',dayKey:'thu',session:'Flash Talks — Session II',type:'flash',time:'18:30–18:35',speaker:'Marta Rodríguez-Rodríguez',authors:'Marta Rodriguez-Rodriguez*, Marta Vazquez-Vilar and Diego Orzaez',affil:'Instituto de Biología Molecular y Celular de Plantas, CSIC-UPV, Valencia, Spain',title:'A multilayer strategy for stable integration and inducible control of TMV-based biofactories',topic:'Viral Vectors & Nanoparticles',abstract:'Viral vectors like the Tobacco Mosaic Virus (TMV) are efficient tools for recombinant protein production in plants, often yielding higher accumulation levels than standard constitutive expression systems. While current industrial practices rely on transient expression via agroinfiltration, scaling this process presents logistical and economic challenges. The genomic integration of viral replicons offers a potential solution; however, the autonomous replication of these vectors typically leads to significant cellular stress, hindering the regeneration of transgenic plants. To address these challenges, we developed a multilayered regulatory strategy to ensure tight control over integrated TMV replicons. First, we implemented an autonomous bioluminescence reporter to monitor viral kinetics with higher sensitivity. To keep a repressed state during plant development, we designed a circuit combining transcriptional regulation via copper-inducible promoters with a recombinase-mediated DNA inversion switch. In this configuration, the RNA-dependent RNA polymerase (RdRp) is maintained in an antisense orientation, preventing replication until the specific induction signal. This approach successfully mitigates viral leakiness in transient assays, being a promising approach to regenerate stable plants carrying the replicon. This system would offer a robust, scalable, and secure platform, paving the way for the next generation of industrial molecular farming.'},
  {id:'f10',code:'PF-10',day:'Thursday 14 May',dayKey:'thu',session:'Flash Talks — Session II',type:'flash',time:'18:35–18:40',speaker:'Sandra Correia',authors:'B Casimiro (1), M Rito (1), S Caeiro (2), P Rosa (2), C Azevedo (2), P Veríssimo (3), LF Rojas (4), JM Canhoto (1), S Correia*(1)',affil:'(1) Centre for Functional Ecology, TERRA Associate Laboratory, Department of Life Sciences, Calçada Martim de Freitas, University of Coimbra, 3000-456 Coimbra, Portugal (2) InnovPlantProtect CoLab, Estrada de Gil Vaz, 7351-901 Elvas, Portugal (3) Center for Neuroscience and Cell Biology, University of Coimbra, Calçada Martim de Freitas, 3000-456 Coimbra, Portugal (4) Universidad de Antioquía, Medellin, Antioquia, Colombia',title:'Scaled-Up Woody Plant Cell Suspension Cultures for high-value compound production',topic:'Scaling Up Plant-Based Production',abstract:'The increasing demand for sustainable, controllable, and scalable production of plant bioactives highlights the need for diverse in vitro metabolite platforms tailored to specific compound classes. Plant cell suspension cultures offer eco-friendly, reproducible systems that avoid whole-plant variability and allow controlled biosynthesis and recovery of valuable molecules. In this study, we established and optimised two complementary suspension-based platforms from woody species to produce different bioactives. Callus-derived cultures from Poplar (Populus tremula × P. alba) were developed for extracellular vesicle (EV) production, achieving isolation yields of 2.5 × 10¹⁰ vesicles per gram of biomass. RNA-loaded EVs successfully delivered cargo into Botrytis cinerea hyphae, demonstrating their potential as natural nanocarriers for plant protection and biotechnology. Simultaneously, tamarillo (Solanum betaceum) cell suspensions were optimised as enzyme-producing bioreactors through medium adjustments and elicitation. A 3% (w/v) sucrose medium enhanced growth and protein output, while casein hydrolysate, yeast extract, and chitosan selectively stimulated hydrolytic and glycosidase activities. Overall, these results show that tailored, scaled-up woody plant cell-suspension systems can act as versatile biofactories for vesicles, enzymes, and other high-value metabolites, thereby supporting biotechnological applications.'},

  {id:'k6',code:'K-06',day:'Friday 15 May',dayKey:'fri',session:'Keynote',type:'keynote',time:'09:00–09:45',speaker:'Antonio Granell',affil:'IBMCP (CSIC-UPV)',title:'Plants as Biofactories of Metabolites: Breeding and Engineering for High-Level Production in Tomato',topic:'Metabolic Pathway Engineering',abstract:'Using tomato as a metabolite biofactory through breeding and metabolic engineering. Examples span genome editing for non-native metabolite production, CRISPRa-based pathway activation, and fine-tuning nutritional and organoleptic quality. A showcase of how domesticated crops can be rapidly engineered into production platforms.'},
  {id:'o23',code:'O-23',day:'Friday 15 May',dayKey:'fri',session:'Oral — Metabolic Engineering',type:'oral',time:'09:45–10:05',speaker:'José Tomás Matus Picero',authors:'Matus JT*(1), Avilés-Kruuse N (2), Sánchez G (2), Navarro-Payá D (1), Bru R (3), Conessa A (1); Bombarely A (4), Moreno-Romero J (5), Hasbún R (2)',affil:'(1) Institute for Integrative Systems Biology (I2SysBio, CSIC - Universitat de València), Paterna, 46908, Valencia, Spain. (2) Laboratorio de Epigenética Vegetal, Departamento de Silvicultura, Facultad de Ciencias Forestales, Universidad de Concepción, Chile. (3) Universidad de Alicante. Alicante, Spain (4) Instituto de Biologia Molecular y Celular de Plantas (IBMCP), Valencia, Spain. (5) Universitat Autònoma de Barcelona, Department of Biochemistry and Molecular Biology, Campus UAB, Cerdanyola del Vallès, 08193, Spain',title:'Integrating cell culture elicitation with genome assembly and epigenetic modulation to dissect boldine biosynthesis in Peumus boldus',topic:'Metabolic Pathway Engineering',abstract:'Peumus boldus is a medicinal tree species native to Chile and the main natural source of boldine, an aporphine alkaloid with well-documented antioxidant, anti-inflammatory and neuroprotective properties. However, boldine production currently relies on leaf extraction from native forests, limiting its scalability and sustainability.; Here, we present an integrative genomic and functional framework to elucidate the regulation of boldine biosynthesis in P. boldus. We generated a first draft genome assembly complemented with Iso-Seq transcriptomes from leaves, flowers, fruits and boldine-producing in vitro cell cultures. This multi-tissue long-read transcriptomic dataset enabled refinement of gene models and identification of candidate genes associated with boldine metabolism. In parallel, we established long-term cell suspension cultures and evaluated the effects of elicitors and epigenetic modifiers on boldine accumulation. Our results show that modulation of chromatin state and stress-related signaling pathways significantly alters boldine production, supporting a regulatory role of epigenetic mechanisms in specialized metabolite biosynthesis. By integrating genome assembly, Iso-Seq-based transcriptomics and functional perturbation assays, this study provides insights into the genetic and epigenetic control of boldine biosynthesis and highlights P. boldus cell cultures as a platform for studying and engineering specialized metabolism in woody plant species.'},
  {id:'o24',code:'O-24',day:'Friday 15 May',dayKey:'fri',session:'Oral — Metabolic Engineering',type:'oral',time:'10:05–10:25',speaker:'Silvia Gianoglio',authors:'S Gianoglio* (1), S Vacas (2), V García-Carpintero (1), A Fernández-del-Carmen (1), R Ruiz-Partida (1), T Cervoni (1), D López Puertollano (3), J Marzo Bargues (4), GA Echavarri (2), P Juarez (5), A Torrejon Cabello (5), J Lozano-Juste (1), V Navarro-Llopis (2), I Navarro Fuertes (3), and D Orzaez (1)',affil:'(1) Instituto de Biología Molecular y Celular de Plantas, UPV-CSIC, Avenida Fausto Elio s/n, 46022 Valencia, Spain (2) CEQA-Instituto Agroforestal del Mediterráneo, Universitat Politècnica de València, Camino de Vera s/n, 46022 Valencia, Spain (3) Universitat de València, Departamento de Química Orgánica, Av. Vicent Andrés Estellés 19, 46100-Burjassot (Valencia), Spain (4) Ecología y Protección Agrícola SL, Pol. Ind. Ciutat de Carlet, 46240 Carlet (Valencia), Spain (5) AINIA Technology Center, Valencia Technological Park, c/ Benjamín Franklin, 5-11, E46980 Paterna, Spain',title:'Recombinant plant-based production of cyclic irregular monoterpene pheromones via a novel trans-α-necrodyl diphosphate synthase',topic:'Metabolic Pathway Engineering',abstract:'Irregular monoterpenes are high-value C10 compounds widely used in sustainable pest control as key components of insect pheromone blends. Their broader deployment is currently limited by the small number of known irregular isopentenyl diphosphate synthases (IDSs) and by the lack of efficient biobased production platforms. Improving the understanding of irregular IDS enzymatic activity while enabling plant recombinant expression is thus essential for scalable bioproduction of pheromones or their precursors. Within the Pheroplus project, we described a novel cyclic irregular IDS from Lavandula that catalyzes the formation of trans-α-necrodyl diphosphate. Its ester derivative, trans-α-necrodyl acetate (TNDAc), is a component of the pheromone blend of Delottococcus aberiae, an invasive mealybug pest. The enzyme, named TNDS, was functionally validated both in vitro and in planta. Notably, we developed tobacco plant biofactories producing TNDAc at levels sufficient to attract D. aberiae males under controlled conditions, demonstrating the feasibility of plant-based pheromone production and emission. Comparative analyses with related irregular IDSs point to specific structural features likely involved in determining the synthesis of cyclic versus branched products. These observations support ongoing efforts toward rational enzyme design and optimization, and highlight the potential of combining enzymatic insight with plant molecular farming for sustainable pheromone bioproduction.'},
  {id:'o25',code:'O-25',day:'Friday 15 May',dayKey:'fri',session:'Oral — Metabolic Engineering',type:'oral',time:'10:25–10:45',speaker:'Amir Akhgari',authors:'Amir Akhgari*, Aaron M. Klepper, Heiko Rischer',affil:'nan',title:'Ortholog Driven CRISPRa Modules Enable Enhanced and Flexible Plant Gene Activation',topic:'Metabolic Pathway Engineering',abstract:'Programmable transcriptional activation with CRISPRa offers a potent approach to gene regulation for synthetic biology and plant biotechnology. Here, we introduce a modular CRISPRa/Cas ortholog framework built on the multi-kingdom Golden Gate platform that enables direct comparison of dSaCas9 and dSpCas9 for activating genes in Nicotiana benthamiana. Across assays, dSaCas9 consistently produced stronger activation of target promoters than dSpCas9, achieving up to a 19‑fold increase in transient dual‑luciferase experiments. Beyond the constitutive pNOS promoter, we also assessed several plant‑specific promoters with the CRISPRa system; in multiple cases, dSaCas9 again showed superior activation compared to dSpCas9. To expand the system’s utility, we adapted it for stable expression in diverse plant cell cultures. We transformed the model N. tabacum BY2 line using standard procedures and further tailored transformation protocols for coffee cell cultures and tomato callus. Cells from all three species were successfully transformed with a construct driving activation of the constitutive pNOS promoter.; Overall, our modular CRISPRa/Cas system supports efficient transcriptional activation both transiently in plants and stably in cell cultures. Ongoing efforts with cell culture platforms focus on accelerating the development of customizable gene circuits and metabolic pathways for plant synthetic biology.;'},
  {id:'o26',code:'O-26',day:'Friday 15 May',dayKey:'fri',session:'Oral — Metabolic Engineering',type:'oral',time:'10:45–11:05',speaker:'Luca Morelli',authors:'L. Morelli* (1), P. Patwari (1), M. Rodriguez-Concepcion (2), M. Fabris (1)(3)',affil:'(1) SDU Biotechnology, Faculty of Engineering, University of Southern Denmark (Odense, Denmark) (2) Institute for Plant Molecular and Cell biology (IBMCP) CSIC-Universitat Politecnica de Valencia (Spain) (3) Stazione Zoologica Anton Dohrn, Naples (Italy)',title:'Compartmentalized metabolic engineering for carotenoid production across biological scales',topic:'Metabolic Pathway Engineering',abstract:'Carotenoids are essential lipophilic isoprenoids synthesized in plastids and fundamental for human nutrition and photosynthetic physiology. In green tissues, their tight co-regulation with chlorophylls sustains efficient light harvesting and photoprotection. Yet boosting carotenoids inside chloroplasts can disrupt this balance, sometimes driving chloroplast-to-chromoplast conversion, which is excellent for storage, but detrimental for photosynthetic efficiency. To bypass this trade-off, we investigated strategies to enhance carotenoid biosynthesis outside plastids, following the rationale that compartmentalizing metabolites can prevent harmful intracellular interactions. By engineering the cytosolic mevalonate (MVA) pathway in Nicotiana benthamiana leaves and introducing bacterial enzymes for carotenoid production, we successfully redirected the synthesis of intermediates such as phytoene and lycopene to the cytosol, demonstrating that pathway relocation is feasible. Looking ahead, extraplastidial carotenoid biosynthesis opens new avenues in microalgae, where cellular simplicity and plasticity may further improve production. We focus on the diatom Phaeodactylum tricornutum, combining rapid growth, mature genetic tools, and a highly compartmentalized metabolism shaped by secondary endosymbiosis. Altogether, we hope this work pushes carotenoid fortification beyond the limits imposed by the photosynthetic chloroplast.'},
  {id:'k7',code:'K-07',day:'Friday 15 May',dayKey:'fri',session:'Keynote',type:'keynote',time:'11:35–12:20',speaker:'Ana Judith Martín',affil:'Spanish Ministry of Agriculture, Fisheries and Food',title:'Molecular farming activities within the framework of GMO and genome editing regulations',topic:'Molecular Farming Marketplace',abstract:'Regulatory landscape for molecular farming under GMO and Cartagena Protocol frameworks. Analysis of how genome editing regulations are evolving globally, with implications for molecular farming products from development through to commercialisation.'},
  {id:'f11',code:'PF-11',day:'Friday 15 May',dayKey:'fri',session:'Flash Talks — Session III',type:'flash',time:'12:20–12:26',speaker:'Marcos Egea-Cortines',affil:'(1) Faculty of Natural Sciences, Department of Biotechnology, University of Ss. Cyril and Methodius, Trnava, 91701, Slovakia; (2) Department of Information Systems and Technologies, Bilkent University, Ankara, Türkiye; (3) National Agricultural and Food Center, Research Institute of Plant Production, Piešťany, 92168, Slovakia',title:'A genetic framework of genes involved in callus formation and organogenesis',topic:'Smart Chassis',abstract:'Lavender hybrids such as Lavandula × intermedia ‘Budrovka’ are increasingly explored as flexible upstream systems for plant molecular farming due to their well-characterized monoterpenoid and phenolic pathways and their reliable response to in vitro manipulation. Yet, long-term quantitative descriptions of callus biomass development remain limited. We monitored callus formation from root and stem explants in 3-week intervals across a 15-week cultivation period to generate a structured dataset suitable for predictive modelling. Five algorithms (Beta Regression, GAM, Random Forest, SVR, XGBoost) were trained on mean response data to estimate callus weight and induction efficiency. XGBoost achieved the highest accuracy for biomass prediction (R² = 0.9373; RMSE 1.76 g), and feature-importance profiles consistently identified explant origin, culture duration and auxin–cytokinin regime as dominant contributors to callus performance. NSGA-II multi-objective optimization, guided by GAM and XGBoost outputs, indicated that 15-week root-derived calli grown under 0.5 mg/L 2,4-D and 2 mg/L BAP represent the highest-yielding configuration. The study provides a data-resolved view of long-term callus behavior in hybrid lavender and a modelling-based approach for rational tuning of biomass production in plant-based bioprocesses.; This work was supported by project FPPV-31-2026.'},
  {id:'f12',code:'PF-12',day:'Friday 15 May',dayKey:'fri',session:'Flash Talks — Session III',type:'flash',time:'12:26–12:32',speaker:'Jules Delasalle',authors:'(Presenting author)Jules Delasalle(1,2), Narimane Mati-Baouche(1) *, Muriel Bardor(1)*, François Chaumont(2)* and Catherine Navarre(2)*',affil:'(1) Université de Rouen Normandie, Laboratoire GlycoMEV UR 4358, SFR Normandie Végétal FED 4277, Innovation Chimie Carnot, F-76000 Rouen, France.  (2) Louvain Institute of Biomolecular Science and Technology, UCLouvain, Croix du Sud 4-L7.07.14, 1348 Louvain-la-Neuve, Belgium *Equal contribution of these authors in the management of the work',title:'Calnexin and calreticulin ER lectins chaperone recombinant protein folding in plants',topic:'Smart Chassis',abstract:'Increasing demand for biologics, which are complex and glycosylated proteins, has driven the development of efficient sustainable bioproduction systems, like the microalgae Chlamydomonas reinhardtii and plant cell suspensions of Nicotiana tabacum BY-2, as alternatives to mammalian cell platforms. These systems offer: lower production costs, reduced contamination risks, and easy genome editing. N-glycosylation is well known to be a critical quality attribute affecting protein stability, activity and functions (Strasser et al., 2021). In the endoplasmic reticulum (ER), the lectin chaperones calreticulin (CRT) and calnexin (CNX) ensure proper folding of glycoproteins before Golgi transit (Aebi, 2013).; This study aims to: i) functionally characterize CRT and CNX in N. tabacum BY-2 and C. reinhardtii by generating KO cell lines. Phenotypic characterization: growth assays, RNA-seq, and glycan analyses are in progress. ii) improve recombinant glycoprotein production yield by overexpressing human, plant, and microalgal CRT/CNX variants together with a green-fluorescent erythropoietin fusion protein (EPO-Clover). Transient expression in Nicotiana benthamiana leaves revealed that co-expression of human CNX and CRT resulted in a 7-fold increase EPO-Clover accumulation. Stable transgenic N. tabacum BY-2 and C. reinhardtii lines were also generated, but differences in EPO-Clover fluorescence ratios were less pronounced under stable expression compared to transient systems.'},
  {id:'f13',code:'PF-13',day:'Friday 15 May',dayKey:'fri',session:'Flash Talks — Session III',type:'flash',time:'12:32–12:38',speaker:'Romane Vandevelde',authors:'ROMANE VANDEVELDE (1), Laurent Bouhon (1), François Chaumont (1), Catherine Navarre (1)',affil:'(1) UCLouvain',title:'Inhibition of transgene silencing in Nicotiana for improved molecular farming',topic:'Smart Chassis',abstract:'Nicotiana tabacum Bright Yellow 2 (BY-2) cell suspensions are established as a platform for producing recombinant complex glycoproteins. However, this system typically yields limited amounts of protein, even when strong constitutive promoters are used. One limitation arises from RNA silencing processes, such as transcriptional gene silencing (TGS) and post-transcriptional gene silencing (PTGS), which prevent large accumulation of transgene RNA transcripts. To address this challenge, our research project aims at developing strategies to counteract the production of transgene dsRNAs involved in silencing as well as to relieve DNA methylation specifically established in the 35S promoter sequence.  First, RNA-dependent RNA polymerase (RDR) genes involved in transgene silencing (RDR1, RDR2 and RDR6) were knocked-out in BY-2 cells using CRISPR/Cas9 technology. Next, BY-2 cell lines (WT, RDR2-KO, RDR1/6-KO and RDR1/2/6-KO backgrounds) expressing the dCas9-SunTag/TET1 system are currently being generated. This system recruits multiple copies of the catalytic domain of the human demethylase TET1 at a specific genome locus via a nuclease-deactivated Cas9 protein fused to repetitive GCN4 peptide epitopes, as previously reported. In our case, we will target demethylation of the 35S promoter controlling Gus reporter gene expression. We expect that this approach will significantly improve recombinant protein yields in transgenic BY-2 cells.'},
  {id:'f14',code:'PF-14',day:'Friday 15 May',dayKey:'fri',session:'Flash Talks — Session III',type:'flash',time:'12:38–12:44',speaker:'Javier Romero',authors:'J. Romero* (1), M. Vázquez (1), D. Orzáez (1)',affil:'(1) Instituto de biología molecular y celular de plantas (UPV-CSIC)',title:'Biofortification of S. lycopersicum through the fungal bioluminescence pathway to enhance hispidin synthesis',topic:'Metabolic Pathway Engineering',abstract:'Plant biofortification is a cost-effective strategy for delivering health-promoting metabolites to populations with limited dietary diversity. While antioxidants like flavonoids are common targets, the potential of styrylpyrone-type compounds like hispidin—noted for antiviral, antidiabetic, and antioxidant properties—remains under-explored. In this study, we generated transgenic S. lycopersicum var. Micro-Tom lines constitutively expressing the Fungal Bioluminescence Pathway (FBP). This pathway synthesizes hispidin from caffeic acid via a polyketide synthase (HispS) and subsequently converts it into luciferin to produce autonomous light. We evaluated bioluminescence across growth stages and fruit ripening: immature green (IG), mature green (MG), and breaker plus seven (B+7). Our results show continuous, autonomous bioluminescence, notably concentrated in the fruit as a metabolic sink. LC-MS confirmed stable hispidin synthesis throughout all stages, correlating with strong HispS expression. This work demonstrates that natural caffeic acid levels in tomatoes are sufficient to sustain the FBP and accumulate hispidin. While bioluminescence serves as a reliable in vivo indicator of pathway activity, it does not correlate linearly with total hispidin content. These findings position hispidin as a promising target for metabolic engineering and highlight the FBP as a powerful tool for monitoring metabolite production in functional crops'},
  {id:'f15',code:'PF-15',day:'Friday 15 May',dayKey:'fri',session:'Flash Talks — Session III',type:'flash',time:'12:44–12:50',speaker:'Javier Sánchez Vicente',affil:'(1), (4): Madeinplant SL.  (2),(3): IBMCP (UPV-CSIC)',title:'Characterization of Nicotiana-derived signal peptides and promoters for molecular farming',topic:'Molecular Farming Marketplace',abstract:'Plant-based expression systems are widely used in molecular farming, but their efficiency strongly depends on the regulatory and targeting elements employed. This study aimed to characterize a panel of signal peptides and promoters from Nicotiana benthamiana and Nicotiana tabacum for recombinant protein production.; Several endogenous plant proteins that accumulated in the apoplast in response to agroinfiltration were identified, and their associated signal peptides and promoters were selected for evaluation. Their performance was tested in transient expression assays using different recombinant proteins and compared with commonly used signal peptides and promoters in plant biotechnology.; Our results suggest substantial variability in performance, particularly for signal peptides, which appears to be protein-dependent. One promoter showed especially promising results across constructs. These findings contribute to expanding the molecular toolbox available for plant molecular farming and support the use of endogenous Nicotiana regulatory elements as valuable alternatives for recombinant protein expression.'},
  {id:'o27',code:'O-27',day:'Friday 15 May',dayKey:'fri',session:'Oral — Marketplace & Phytotech',type:'oral',time:'14:00–14:20',speaker:'Anatoli Giritch',authors:'A. Giritch* (1,2) & J. M. Sanchez* (1,3)',affil:'(1) Nambawan Spain SLU, Pl. Conquistadores, 2, 06004 Badajoz, Spain  (2) Nomad Bioscience GmbH, Weinbergweg 22, 06120 Halle, Germany  (3) Olivos de Badajoz SLU, Ctra. Calzada Romana, km 23, 06184 Pueblonuevo del Guadiana, Badajoz, Spain',title:'Scalable expression technologies for manufacturing bioengineered proteins in plants',topic:'Scaling Up Plant-Based Production',abstract:'Transient expression technologies such as magnICON® and NOMADIC® are efficient processes for biopharmaceutical and biomaterial production that are simple and indefinitely scalable protocols for heterologous protein expression in plants. They rely on transient amplification of viral vectors delivered systemically by Agrobacterium or by viral particles or released from a transgene using ethanol induction. These technologies effectively address most of the major shortcomings of earlier plant-based technologies such as low speed of manufacturing, low expression levels, lack of versatility, and high manufacturing cost. The technologies have been brought to GMP-compliant level and have been successfully used to manufacture diagnostic antibodies or produce materials for clinical trials by Icon Genetics/Bayer, Icon Genetics/Denka, Nomad Bioscience, KBio etc. In addition, Nambawan Spain, together with Nomad Bioscience and Olivos de Badajoz, has successfully scaled up and commercialized the technology based on stable transformation of plants expressing a protein of interest in endosperm of seed. Examples of technologies used at different (lab, pilot and industrial) manufacturing scales will be presented.'},
  {id:'o28',code:'O-28',day:'Friday 15 May',dayKey:'fri',session:'Oral — Marketplace & Phytotech',type:'oral',time:'14:20–14:40',speaker:'Sutinee Soopairin',authors:'Sutinee Soopairin* (1), Julian Ma (2), Pantira Parinyarux (1), Suthira Taychakhoonavudh (1)',affil:'(1) Department of Social and Administrative Pharmacy, Faculty of Pharmaceutical Sciences, Chulalongkorn University, Bangkok, Thailand (2) St George’s School of Health and Medical Sciences, City St George’s, University of London, London, United Kingdom',title:'Determinants of Public Hesitancy Toward Medicines Derived from Plant Molecular Farming',topic:'Molecular Farming Marketplace',abstract:'Our prior in-depth interviews with 63 stakeholders highlighted concerns regarding public hesitancy toward plant molecular farming (PMF). However, empirical evidence on public hesitancy toward PMF-derived products remains limited. Building on these insights, this study examined public hesitancy toward medicines or biomolecules derived from PMF and associated factors among the Thai population. A cross-sectional survey was conducted in January 2026 using a structured, self-administered online questionnaire based on the Theory of Planned Behavior and distributed via social media to Thai individuals aged 18 years or older. Descriptive statistics were used to characterize hesitancy and regression analysis identified associated factors. A total of 227 participants completed the questionnaire. The median age was 31 years, with respondents from all regions of Thailand. Overall, 54.2% reported hesitancy toward using PMF-derived products, with most showing moderate or higher hesitancy. A positive attitude toward the tobacco industry was associated with a twofold increase in non-hesitancy toward PMF, while a positive attitude toward PMF was also significantly associated with non-hesitancy. These findings indicate that public hesitancy toward PMF-derived products is evident in Thailand and influenced by multiple factors. This pilot study provides a basis for expansion at ISPMF 2026 to engage wider international audiences and inform broader communication and branding strategies for PMF.'},
  {id:'k8',code:'K-08',day:'Friday 15 May',dayKey:'fri',session:'Keynote — Closing',type:'keynote',time:'14:40–15:25',speaker:'Marc-André D\'Aoust',affil:'Aramis Biotechnologies',title:'Toward commercialization of a plant-based VLP seasonal influenza vaccine, and beyond',topic:'Molecular Farming Marketplace',abstract:'Aramis Biotechnologies optimized the VLP seasonal influenza vaccine from Medicago, stabilizing hemagglutinin in pre-fusion conformation and improving process yields up to 20-fold. Phase 1/2 clinical immunogenicity study now underway in Canada. Future plans to leverage manufacturing leadership for pharmaceutical, veterinary, and agricultural applications.'},
  {id:'pf_f1',code:'PF-01',num:'PF-01',day:'Wednesday 13 May',dayKey:'wed',session:'Flash Talks — Session I',type:'flash',time:'17:30–17:35',speaker:'Janejira Jaratsittisin',affil:'¹Department of Pharmacology and Physiology, Faculty of Pharmaceutical Sciences, Chulalongkorn University, Bangkok, Thailand. ²Baiya Phytopharm Co., Ltd., Bangkok, Thailand.',title:'Rapid Production of Broadly Neutralizing Antibodies against Emerging Viral Variants',topic:'Plant-Made Biologics',abstract:'Highly pathogenic avian influenza viruses such as H5N1 and H7N9 continue to pose a serious pandemic threat, emphasizing the need for rapidly deployable and broadly protective strategies. This study shows that Nicotiana benthamiana can serve as a rapid-response platform for producing CR9114, a broadly neutralizing antibody targeting the conserved influenza hemagglutinin stem. Plant-produced CR9114 potently neutralized recently isolated 2023 H5N1 strains in vitro, with IC₅₀ values as low as 0.646 ng/mL, comparable to mammalian-cell–derived antibodies. In contrast, reduced but detectable activity was observed against H7N9, consistent with glycan-mediated steric shielding in Group 2 viruses. Despite limited in vitro neutralization, previous studies demonstrate that CR9114 confers strong in vivo protection through Fc-mediated effector functions. Plant-produced CR9114 displayed a predominantly high-mannose glycosylation profile, which may enhance Fc-dependent immune activity. Overall, this work supports plant molecular pharming as a practical route toward a rapidly deployable intranasal antibody-based intervention for emerging zoonotic influenza threats.'},
  {id:'pf_f2',code:'PF-02',num:'PF-02',day:'Wednesday 13 May',dayKey:'wed',session:'Flash Talks — Session I',type:'flash',time:'17:35–17:40',speaker:'Seong-ryong Kim',affil:'(1) Sogang University, Department of Life Science, Seoul, Republic of Korea  (2) PhytoMab, Co. Ltd. R&D Centre, Seoul, Republic of Korea  (3) Sogang University, Department of Chemistry, Seoul, Republic of Korea  (4) Seoul National University, Department of Nuclear Medicine, Seoul, Republic of Korea  (5% University of London, Department of Molecular Immunology, London, UK  (6) National Cancer Center Korea, Goyang- si, Republic of Korea  (7) University of California, Department of Nanoengineering, San Diego, USA  (8) Seoul National University, Department of Pharmaceuticals, Seoul, Republic of Korea  (9) Seoul National University, Department of Biological Science, Seoul, Republic of Korea  (10) Seoul National University, Department of Veterinary Medicine, Seoul, Republic of Korea  (11) Hallym University, Department of Life Science, Chuncheon, Republic of Korea (12) Osong Medical Innovation Foundation (KBio), Osong, South Korea',title:'Hergreen as NF-engager: Bispecific antibody for enhanced cancer immunotherapy',topic:'Plant-Made Biologics',abstract:'More than three decades have passed since Hiatt et al. first reported the production of IgG in plants. Although many researchers have attempted to develop monoclonal antibody (mAb) biologics in various plant species, none have yet received FDA or USDA approval for market release. Limitations of plant-based biologics have been identified not only in quantitative terms but also in qualitative aspects. In the case of trastuzumab, we found that near-complete glycoengineering of plant-specific N-glycosylation enhanced the efficacy of the mAb and even resulted in novel biodistribution patterns in a xenografted mouse model. Furthermore, when Hergreen® was combined with the in-situ vaccine CPMV virus-like particle (VLP), the survival rate of a syngeneic mouse model reached 100%, suggesting the potential of PhytoRice®-expressed mAbs. Using this platform, we further glycoengineered mAbs with human 1,4-galactosyltransferase, as well as other mAbs such as immune checkpoint inhibitors and Hergreenpet. Based on the promising effects of PhytoRice®, we proceeded to develop Hergreen as NF-engager, Bispecific antibody, and an antibody-drug conjugate (ADC). Hergreen-ADC is being compared its efficacy with Kadcyla and Enhertu. The results of these studies will be discussed at the meeting.'},
  {id:'pf_f3',code:'PF-03',num:'PF-03',day:'Wednesday 13 May',dayKey:'wed',session:'Flash Talks — Session I',type:'flash',time:'17:40–17:45',speaker:'Marco Costantini',affil:'(1) ENEA Research Centre - Department of Green Biotechnologies, (2) The Pirbright Institute, (3) University of Lleida - Department of Animal Production',title:'Safety and pharmacokinetic study of a plant-produced therapeutic protein',topic:'Plant-Made Biologics',abstract:'Nipah virus (NiV) is a highly infectious zoonotic RNA virus that infects pigs and causes acute encephalitis in humans. Passive immunization with neutralising monoclonal antibodies targeting viral envelope glycoproteins has been shown to be an effective therapeutic strategy. A novel neutralising IgG1 antibody (mAb A2), specific for the attachment glycoprotein G (gpG), was isolated from NiV-vaccinated pigs and represents a promising therapeutic candidate. mAb A2 was transiently expressed in ∆XF Nicotiana benthamiana plants by agroinfiltration and purified by protein A–based magnetic beads affinity chromatography, yielding approximately 50 mg/kg fresh weight. Pseudovirus-based neutralisation assays showed that the plant-produced antibody displayed neutralising activity comparable to that of a HEK293T-produced counterpart. Surface plasmon resonance analysis revealed a high gpG-binding affinity in the picomolar range. In addition, the plant-derived antibody exhibited enhanced binding to porcine FcγRIIIa compared to the mammalian-produced version. Pharmacokinetics and biosafety were evaluated in pigs following single intravenous administration at 1 mg/kg and 2.5 mg/kg. Circulating antibody levels remained stable until day 14 and declined linearly by day 28, and no adverse effects were observed. Neutralisation assays on sera are ongoing. Overall, these results highlight the potential of plant-derived mAb A2 as a safe and effective therapeutic candidate against NiV.'},
  {id:'pf_f4',code:'PF-04',num:'PF-04',day:'Wednesday 13 May',dayKey:'wed',session:'Flash Talks — Session I',type:'flash',time:'17:45–17:50',speaker:'Audrey Teh',affil:'(1) City St. George’s, University of London, London, UK (2) University of Natural Resources and Life Sciences, Vienna (BOKU), Vienna, Austria (3) King’s College London, London, UK (4) University of Malaya, Kuala Lumpur, Malaysia, University of London',title:'Plant-based expression and engineering of Fc-fusion proteins for enhanced therapeutic profiles',topic:'Plant-Made Biologics',abstract:'Immune checkpoint inhibitors (ICIs) have transformed cancer treatment but remain inaccessible to many patients in low- and middle-income countries. Transient expression in Nicotiana benthamiana offers a rapid, flexible and easily scalable alternative to mammalian systems while enabling antibody engineering at the levels of glycosylation, Fc function, and molecular architecture.; Here, Fc-engineered monoclonal and bispecific ICIs were produced in wild-type and glycoengineered plants. IgG1 Fc variants containing silencing mutations demonstrated improved accumulation, assembly, and thermostability compared to IgG4P scaffolds. Fcγ receptor binding was abolished while FcRn and target binding were preserved, confirming successful Fc silencing without loss of functional integrity.; A scFv-Fc bispecific antibody targeting NKG2A and PD-1 was also transiently expressed. The molecule showed efficient heterodimerisation and simultaneous dual-target binding, with optimal assembly achieved through single-vector co-expression of both monomers.; These findings position Plant Molecular Farming as an integrated antibody engineering platform capable of producing functionally advanced, affordable immunotherapies and support its potential for decentralised biologics manufacturing and improved global access.'},
  {id:'pf_f5',code:'PF-05',num:'PF-05',day:'Wednesday 13 May',dayKey:'wed',session:'Flash Talks — Session I',type:'flash',time:'17:50–17:55',speaker:'Réka Kereszty',affil:'(1) BOKU University, Institute of Plant Biotechnology and Cell Biology, Department of Biotechnology and Food Science, Muthgasse 11/I, 1190 Vienna, Austria',title:'Optimizing the assembly and accumulation of secretory IgA (SIgA) in plants',topic:'Plant-Made Biologics',abstract:'The plant cellular machinery is well suited for the expression and assembly of SIgAs, but the overall yield and the proportion of fully assembled protein still vary. Expanding the physical dimensions of the ER generally supports a high protein production rate. This was confirmed in  N. benthamiana by CRISPR/Cas-mediated enhancement of phosphatidylcholine biosynthesis, which resulted in a higher yield of fully assembled and functional SIgA in the mutant plant lines (Göritzer et al., 2025).; To find out whether and in which way the luminal volume and morphology of the ER influence interactions between antibody components and ER-resident host factors, we have started to establish MS-based identification of interacting cellular machinery, enabling a direct comparison between wild-type and mutant plants. This will help us identify host proteins as candidates for simultaneous overexpression alongside recombinant proteins, aiming to equip the enlarged ER for optimal function. ; In a complementary approach, we are investigating whether reprogramming the lytic vacuole can enhance overall SIgA yield. Although SIgA is primarily targeted for secretion, previous studies have indicated that a fraction is frequently mis-targeted to the lytic vacuole (LV), where it undergoes degradation. Since the extent of this mis-targeting is currently unknown, we are investigating whether reprogramming the LV can improve overall SIgA yield.'},
  {id:'pf_f6',code:'PF-06',num:'PF-06',day:'Wednesday 13 May',dayKey:'wed',session:'Flash Talks — Session I',type:'flash',time:'17:55–18:00',speaker:'Shanice Taylor',affil:'(1) Department of Chemical Engineering, University of California, Davis, CA, United States, (2) Center for the Utilization of Biological Engineering in Space, Berkeley, CA, United States',title:'Multigenerational Expression of a Parathyroid Hormone-Fc Biologic in Transgenic Lettuce for Osteopenia Treatment',topic:'Plant-Made Biologics',abstract:'Osteopenia results from impaired bone remodeling that lowers bone density and increases fracture risk, particularly in aging populations and individuals exposed to microgravity. The biologically active region of the parathyroid hormone, PTH[1–34], is clinically approved for osteoporosis treatment. To extend its short circulating half-life, PTH was genetically fused to the fragment crystallizable (Fc) region of human IgG1 (PTH Fc).; Plant-based platforms offer scalable, economical biomanufacturing with reduced pathogen risk. Among these, Lactuca sativa (lettuce) is a promising host due to rapid growth, prior success producing therapeutics, and demonstrated spaceflight performance. This work aims to quantify PTH Fc accumulation in transgenic lettuce and evaluate a scalable Protein A–based downstream process.; Transgenic lines were generated by Agrobacterium-mediated transformation and screened across T1 – T3 generations by PCR, Western blot, and ELISA. Stable PTH-Fc transgene inheritance was confirmed through T3, with 100% of progeny in selected lines carrying the transgene. The lead line accumulated 0.3 – 1.2 mg PTH-Fc/kg fresh weight (0.004–0.018% TSP) in T2 plants. Crude plant extracts were concentrated and buffer‑exchanged by tangential flow filtration, followed by Protein A affinity chromatography, yielding purified PTH‑Fc at 0.85 mg/mL. These results demonstrate that transgenic lettuce supports scalable PTH-Fc production suitable for downstream protein characterization.'},
  {id:'pf_f7',code:'PF-07',num:'PF-07',day:'Thursday 14 May',dayKey:'thu',session:'Flash Talks — Session II',type:'flash',time:'18:20–18:25',speaker:'Juliane Schuphan',affil:'(1) Department of Dental Materials and Biomaterials Research, RWTH Aachen University Hospital, Pauwelsstrasse 30, 52074 Aachen, Germany (2) Institute for Molecular Biotechnology, RWTH Aachen University, Worringerweg 1, 52074 Aachen, Germany (3) Electron Microscopy Facility, Institute of Pathology RWTH Aachen University Hospital, Aachen, Germany (4) Fraunhofer Institute for Molecular Biology and Applied Ecology IME, Aachen, Germany',title:'More Than Carriers: Plant Viral Nanoparticles as Active Immunomodulators',topic:'Viral Vectors & Nanoparticles',abstract:'Despite advances in fibrous scaffolds for nerve repair, most platforms fail to integrate biochemical and physical cues essential for neuronal differentiation and neurite extension in vitro. Hey also lack precise control over growth factor presentation and spatial organization. Here, we introduce a multifunctional carrier based on potato virus X (PVX) nanoparticles that simultaneously delivers biochemical cues and directional guidance to neurons. Plant-produced, genetically engineered PVX is used to display high-density bioactive peptides derived from laminin and brain-derived neurotrophic factor, enabling targeted activation of neuronal membrane receptors. Neuronal differentiation and activation of associated signaling pathways are assessed using immunostaining, gene expression analysis, immunoprecipitation, and western blotting. Spatial guidance is achieved by aligning PVX nanoparticles using 3D-printed sacrificial materials to create an oriented microarchitecture, as confirmed by scanning electron microscopy. This integrated biochemical and structural strategy enables simultaneous pathway activation and neurite guidance within a single system. By combining biomimetic peptide display with plant-derived engineered PVX, this work establishes a versatile, scalable, and sustainable platform for precise control of neuronal differentiation and alignment, advancing biomimetic approaches in neural tissue engineering and regenerative medicine.'},
  {id:'pf_f8',code:'PF-08',num:'PF-08',day:'Thursday 14 May',dayKey:'thu',session:'Flash Talks — Session II',type:'flash',time:'18:25–18:30',speaker:'Carly Charron',affil:'(1) London Research and Development Centre, Agriculture and Agri-Food Canada, London, Ontario, Canada (2) Department of Biology, University of Western Ontario, London, Ontario, Canada (3) Guelph Research and Development Centre, Agriculture and Agri-Food Canada, Guelph, Ontario, Canada (4) Department of Biochemistry, University of Western Ontario, London, Ontario, Canada',title:'Plant production of multivalent protein nanoparticles for vaccine applications',topic:'Viral Vectors & Nanoparticles',abstract:'Non-typhoidal Salmonella enterica serovars (NTS) are major causes of gastrointestinal disease in humans, largely due to the consumption of contaminated poultry products. While vaccination is the most effective strategy to reduce NTS colonization in poultry, current vaccines have limitations regarding safety and efficacy, highlighting the need for improved alternatives. This project investigates plant-produced, self-assembling protein nanoparticles as a novel multivalent vaccine approach for NTS. Antigenic epitopes from three outer membrane proteins were genetically fused to the encapsulin monomer to achieve multivalency at three levels: multiple antigenic targets, multiple epitopes per antigen, and multiple copies of each epitope on the nanoparticle. The multivalent constructs were transiently expressed in Nicotiana benthamiana and successfully assembled into nanoparticles, despite lower yield than single-epitope versions. Further analysis revealed that epitope identity, rather than the number of modifications, primarily influenced protein stability and accumulation. A chicken immunization and NTS challenge study demonstrated production of NTS- and antigen-specific antibodies. Ongoing experiments will assess effects on NTS colonization, vaccine optimization, and strategies for oral delivery. Overall, these findings support the feasibility of multivalent, plant-produced encapsulin nanoparticles as promising next-generation NTS vaccines.'},
  {id:'pf_f9',code:'PF-09',num:'PF-09',day:'Thursday 14 May',dayKey:'thu',session:'Flash Talks — Session II',type:'flash',time:'18:30–18:35',speaker:'Marta Rodríguez-Rodríguez',affil:'Instituto de Biología Molecular y Celular de Plantas, CSIC-UPV, Valencia, Spain',title:'A multilayer strategy for stable integration and inducible control of TMV-based biofactories',topic:'Viral Vectors & Nanoparticles',abstract:'Viral vectors like the Tobacco Mosaic Virus (TMV) are efficient tools for recombinant protein production in plants, often yielding higher accumulation levels than standard constitutive expression systems. While current industrial practices rely on transient expression via agroinfiltration, scaling this process presents logistical and economic challenges. The genomic integration of viral replicons offers a potential solution; however, the autonomous replication of these vectors typically leads to significant cellular stress, hindering the regeneration of transgenic plants. To address these challenges, we developed a multilayered regulatory strategy to ensure tight control over integrated TMV replicons. First, we implemented an autonomous bioluminescence reporter to monitor viral kinetics with higher sensitivity. To keep a repressed state during plant development, we designed a circuit combining transcriptional regulation via copper-inducible promoters with a recombinase-mediated DNA inversion switch. In this configuration, the RNA-dependent RNA polymerase (RdRp) is maintained in an antisense orientation, preventing replication until the specific induction signal. This approach successfully mitigates viral leakiness in transient assays, being a promising approach to regenerate stable plants carrying the replicon. This system would offer a robust, scalable, and secure platform, paving the way for the next generation of industrial molecular farming.'},
  {id:'pf_f10',code:'PF-10',num:'PF-10',day:'Thursday 14 May',dayKey:'thu',session:'Flash Talks — Session II',type:'flash',time:'18:35–18:40',speaker:'Sandra Correia',affil:'(1) Centre for Functional Ecology, TERRA Associate Laboratory, Department of Life Sciences, Calçada Martim de Freitas, University of Coimbra, 3000-456 Coimbra, Portugal (2) InnovPlantProtect CoLab, Estrada de Gil Vaz, 7351-901 Elvas, Portugal (3) Center for Neuroscience and Cell Biology, University of Coimbra, Calçada Martim de Freitas, 3000-456 Coimbra, Portugal (4) Universidad de Antioquía, Medellin, Antioquia, Colombia',title:'Scaled-Up Woody Plant Cell Suspension Cultures for high-value compound production',topic:'Scaling Up Plant-Based Production',abstract:'The increasing demand for sustainable, controllable, and scalable production of plant bioactives highlights the need for diverse in vitro metabolite platforms tailored to specific compound classes. Plant cell suspension cultures offer eco-friendly, reproducible systems that avoid whole-plant variability and allow controlled biosynthesis and recovery of valuable molecules. In this study, we established and optimised two complementary suspension-based platforms from woody species to produce different bioactives. Callus-derived cultures from Poplar (Populus tremula × P. alba) were developed for extracellular vesicle (EV) production, achieving isolation yields of 2.5 × 10¹⁰ vesicles per gram of biomass. RNA-loaded EVs successfully delivered cargo into Botrytis cinerea hyphae, demonstrating their potential as natural nanocarriers for plant protection and biotechnology. Simultaneously, tamarillo (Solanum betaceum) cell suspensions were optimised as enzyme-producing bioreactors through medium adjustments and elicitation. A 3% (w/v) sucrose medium enhanced growth and protein output, while casein hydrolysate, yeast extract, and chitosan selectively stimulated hydrolytic and glycosidase activities. Overall, these results show that tailored, scaled-up woody plant cell-suspension systems can act as versatile biofactories for vesicles, enzymes, and other high-value metabolites, thereby supporting biotechnological applications.'},
  {id:'pf_f11',code:'PF-11',num:'PF-11',day:'Friday 15 May',dayKey:'fri',session:'Flash Talks — Session III',type:'flash',time:'12:20–12:26',speaker:'Marcos Egea-Cortines',affil:'(1) Faculty of Natural Sciences, Department of Biotechnology, University of Ss. Cyril and Methodius, Trnava, 91701, Slovakia; (2) Department of Information Systems and Technologies, Bilkent University, Ankara, Türkiye; (3) National Agricultural and Food Center, Research Institute of Plant Production, Piešťany, 92168, Slovakia',title:'A genetic framework of genes involved in callus formation and organogenesis',topic:'Smart Chassis',abstract:'Lavender hybrids such as Lavandula × intermedia ‘Budrovka’ are increasingly explored as flexible upstream systems for plant molecular farming due to their well-characterized monoterpenoid and phenolic pathways and their reliable response to in vitro manipulation. Yet, long-term quantitative descriptions of callus biomass development remain limited. We monitored callus formation from root and stem explants in 3-week intervals across a 15-week cultivation period to generate a structured dataset suitable for predictive modelling. Five algorithms (Beta Regression, GAM, Random Forest, SVR, XGBoost) were trained on mean response data to estimate callus weight and induction efficiency. XGBoost achieved the highest accuracy for biomass prediction (R² = 0.9373; RMSE 1.76 g), and feature-importance profiles consistently identified explant origin, culture duration and auxin–cytokinin regime as dominant contributors to callus performance. NSGA-II multi-objective optimization, guided by GAM and XGBoost outputs, indicated that 15-week root-derived calli grown under 0.5 mg/L 2,4-D and 2 mg/L BAP represent the highest-yielding configuration. The study provides a data-resolved view of long-term callus behavior in hybrid lavender and a modelling-based approach for rational tuning of biomass production in plant-based bioprocesses.; This work was supported by project FPPV-31-2026.'},
  {id:'pf_f12',code:'PF-12',num:'PF-12',day:'Friday 15 May',dayKey:'fri',session:'Flash Talks — Session III',type:'flash',time:'12:26–12:32',speaker:'Jules Delasalle',affil:'(1) Université de Rouen Normandie, Laboratoire GlycoMEV UR 4358, SFR Normandie Végétal FED 4277, Innovation Chimie Carnot, F-76000 Rouen, France.  (2) Louvain Institute of Biomolecular Science and Technology, UCLouvain, Croix du Sud 4-L7.07.14, 1348 Louvain-la-Neuve, Belgium *Equal contribution of these authors in the management of the work',title:'Calnexin and calreticulin ER lectins chaperone recombinant protein folding in plants',topic:'Smart Chassis',abstract:'Increasing demand for biologics, which are complex and glycosylated proteins, has driven the development of efficient sustainable bioproduction systems, like the microalgae Chlamydomonas reinhardtii and plant cell suspensions of Nicotiana tabacum BY-2, as alternatives to mammalian cell platforms. These systems offer: lower production costs, reduced contamination risks, and easy genome editing. N-glycosylation is well known to be a critical quality attribute affecting protein stability, activity and functions (Strasser et al., 2021). In the endoplasmic reticulum (ER), the lectin chaperones calreticulin (CRT) and calnexin (CNX) ensure proper folding of glycoproteins before Golgi transit (Aebi, 2013).; This study aims to: i) functionally characterize CRT and CNX in N. tabacum BY-2 and C. reinhardtii by generating KO cell lines. Phenotypic characterization: growth assays, RNA-seq, and glycan analyses are in progress. ii) improve recombinant glycoprotein production yield by overexpressing human, plant, and microalgal CRT/CNX variants together with a green-fluorescent erythropoietin fusion protein (EPO-Clover). Transient expression in Nicotiana benthamiana leaves revealed that co-expression of human CNX and CRT resulted in a 7-fold increase EPO-Clover accumulation. Stable transgenic N. tabacum BY-2 and C. reinhardtii lines were also generated, but differences in EPO-Clover fluorescence ratios were less pronounced under stable expression compared to transient systems.'},
  {id:'pf_f13',code:'PF-13',num:'PF-13',day:'Friday 15 May',dayKey:'fri',session:'Flash Talks — Session III',type:'flash',time:'12:32–12:38',speaker:'Romane Vandevelde',affil:'(1) UCLouvain',title:'Inhibition of transgene silencing in Nicotiana for improved molecular farming',topic:'Smart Chassis',abstract:'Nicotiana tabacum Bright Yellow 2 (BY-2) cell suspensions are established as a platform for producing recombinant complex glycoproteins. However, this system typically yields limited amounts of protein, even when strong constitutive promoters are used. One limitation arises from RNA silencing processes, such as transcriptional gene silencing (TGS) and post-transcriptional gene silencing (PTGS), which prevent large accumulation of transgene RNA transcripts. To address this challenge, our research project aims at developing strategies to counteract the production of transgene dsRNAs involved in silencing as well as to relieve DNA methylation specifically established in the 35S promoter sequence.  First, RNA-dependent RNA polymerase (RDR) genes involved in transgene silencing (RDR1, RDR2 and RDR6) were knocked-out in BY-2 cells using CRISPR/Cas9 technology. Next, BY-2 cell lines (WT, RDR2-KO, RDR1/6-KO and RDR1/2/6-KO backgrounds) expressing the dCas9-SunTag/TET1 system are currently being generated. This system recruits multiple copies of the catalytic domain of the human demethylase TET1 at a specific genome locus via a nuclease-deactivated Cas9 protein fused to repetitive GCN4 peptide epitopes, as previously reported. In our case, we will target demethylation of the 35S promoter controlling Gus reporter gene expression. We expect that this approach will significantly improve recombinant protein yields in transgenic BY-2 cells.'},
  {id:'pf_f14',code:'PF-14',num:'PF-14',day:'Friday 15 May',dayKey:'fri',session:'Flash Talks — Session III',type:'flash',time:'12:38–12:44',speaker:'Javier Romero',affil:'(1) Instituto de biología molecular y celular de plantas (UPV-CSIC)',title:'Biofortification of S. lycopersicum through the fungal bioluminescence pathway to enhance hispidin synthesis',topic:'Metabolic Pathway Engineering',abstract:'Plant biofortification is a cost-effective strategy for delivering health-promoting metabolites to populations with limited dietary diversity. While antioxidants like flavonoids are common targets, the potential of styrylpyrone-type compounds like hispidin—noted for antiviral, antidiabetic, and antioxidant properties—remains under-explored. In this study, we generated transgenic S. lycopersicum var. Micro-Tom lines constitutively expressing the Fungal Bioluminescence Pathway (FBP). This pathway synthesizes hispidin from caffeic acid via a polyketide synthase (HispS) and subsequently converts it into luciferin to produce autonomous light. We evaluated bioluminescence across growth stages and fruit ripening: immature green (IG), mature green (MG), and breaker plus seven (B+7). Our results show continuous, autonomous bioluminescence, notably concentrated in the fruit as a metabolic sink. LC-MS confirmed stable hispidin synthesis throughout all stages, correlating with strong HispS expression. This work demonstrates that natural caffeic acid levels in tomatoes are sufficient to sustain the FBP and accumulate hispidin. While bioluminescence serves as a reliable in vivo indicator of pathway activity, it does not correlate linearly with total hispidin content. These findings position hispidin as a promising target for metabolic engineering and highlight the FBP as a powerful tool for monitoring metabolite production in functional crops'},
  {id:'pf_f15',code:'PF-15',num:'PF-15',day:'Friday 15 May',dayKey:'fri',session:'Flash Talks — Session III',type:'flash',time:'12:44–12:50',speaker:'Javier Sánchez Vicente',affil:'(1), (4): Madeinplant SL.  (2),(3): IBMCP (UPV-CSIC)',title:'Characterization of Nicotiana-derived signal peptides and promoters for molecular farming',topic:'Molecular Farming Marketplace',abstract:'Plant-based expression systems are widely used in molecular farming, but their efficiency strongly depends on the regulatory and targeting elements employed. This study aimed to characterize a panel of signal peptides and promoters from Nicotiana benthamiana and Nicotiana tabacum for recombinant protein production.; Several endogenous plant proteins that accumulated in the apoplast in response to agroinfiltration were identified, and their associated signal peptides and promoters were selected for evaluation. Their performance was tested in transient expression assays using different recombinant proteins and compared with commonly used signal peptides and promoters in plant biotechnology.; Our results suggest substantial variability in performance, particularly for signal peptides, which appears to be protein-dependent. One promoter showed especially promising results across constructs. These findings contribute to expanding the molecular toolbox available for plant molecular farming and support the use of endogenous Nicotiana regulatory elements as valuable alternatives for recombinant protein expression.'},
];

const POSTERS = [
  {id:'p1',num:'P-01',speaker:'Amanda de Santana Lopes',affil:'Johannes Gutenberg-Universität Mainz',title:'Floating Biofactories for Sustainable Oil Production',topic:'Metabolic Pathway Engineering for High‑Value Compounds',abstract:'Duckweeds are floating aquatic plants recognized as the smallest flowering plants. They are particularly notable for their ease of cultivation and rapid growth. This latter trait makes them especially attractive for biotechnological applications, where fast biomass accumulation can be leveraged for the production of high value compounds. Recently, we published a detailed method for the reproducible genetic engineering of Spirodela polyrhiza (giant duckweed) to support duckweed research and expand its potential in biotechnology. One of our current projects focuses on engineering the triacylglycerol (TAG) metabolism of S. polyrhiza. Our long term goal is to develop a sustainable, land independent production system capable of achieving competitive oil yields. We first evaluated the heterologous expression of TAG‑biosynthesis genes, including the transcription factors LEC2 and WRI1 and the enzymes DGAT1 and DGAT2. Among these, WRI1 and DGAT1 most effectively increased TAG accumulation in transformed S. polyrhiza. Then, to further enhance TAG levels, we combined WRI1, DGAT1, and the oil‑body protein Oleosin in a single construct. Selection of transformed lines is ongoing, and regenerated plants will soon allow assessment of this strategy. Next, we aim to complement the heterologous expression strategy with CRISPR activation and dsRNA‑mediated knockdown of endogenous targets to fine‑tune TAG synthesis and maximize oil accumulation in giant duckweed.'},
  {id:'p2',num:'P-02',speaker:'Antonio Santiago Pajuelo',affil:'(1) Institute for Integrative Systems Biology (I2SysBio), Universitat de València-CSIC, Paterna, 46908, Valencia, Spain. (2) Department of Biochemistry and Molecular Biology and Soil and Agricultural Chemistry, Faculty of Sciences, University of Alicante, Alicante, Spain. (3) Centre for Research in Agricultural Genomics (CRAG) CSIC-IRTA-UAB-UB, Edifici CRAG, Campus UAB, Cerdanyola del Vallès, Barcelona, Spain. (4) Sequentia Biotech, C/ del Dr Trueta, 08005 Barcelona, Spain.',title:'DISCOVERY OF OXYRESVERATROL BIOSYNTHESIS PATHWAY IN MULBERRY (Morus alba L.) USING CELLS UNDER MeJA ELICITATION: KEY ROLE OF C2’Hs ACTING UPSTREAM OF STILBENE SYNTHASES',topic:'Metabolic Pathway Engineering for High‑Value Compounds',abstract:'The medicinal properties of mulberry (Morus alba L.) are partly attributed to stilbenoids, including resveratrol (R) and oxyresveratrol (OxyR). Natural extraction from bark and roots is unsustainable, making biochemical characterization challenging. While R biosynthesis is established, the OxyR pathway remains unclear. To investigate this, we established mulberry cell suspensions where methyl jasmonate (MeJA) and methyl-β-cyclodextrins (MBCD) elicited high intra- and extracellular R and OxyR production. We conducted time-series elicitation integrating transcriptomics and proteomics, supported by a re-annotated long-read genome (Mal_HE_154X_1). Multi-omics analysis identified 768 differentially expressed genes and 712 differentially abundant proteins. These included 22 stilbene synthase (STS) genes and six p-coumaroyl-CoA 2\'-hydroxylases (C2’Hs) co-expressed with R and OxyR accumulation. We hypothesized that the C2’H product, 2,4-cinnamoyl-CoA, rather than R, serves as the OxyR precursor in an STS-catalyzed reaction. Characterization of a recombinant C2’H isoform confirmed conversion of p-coumaroyl-CoA into 2,4-cinnamoyl-CoA. Agroinfiltration in N. benthamiana and grapevine cells expressing MaC2’H and STS led to OxyR accumulation. These results conclude that OxyR biosynthesis in mulberry is mediated by C2’Hs acting upstream of STS.'},
  {id:'p3',num:'P-03',speaker:'Carmen Laezza',affil:'(1) Department of Agricultural Sciences, University of Naples Federico II, Portici, Italy (2) Department of Natural Product Biosynthesis, Max Planck Institute for Chemical Ecology, Jena, Germany',title:'CRISPR Editing of a Light-Responsive Pathway Unlocks Polyphenol Biosynthesis in Annurca Apple',topic:'Metabolic Pathway Engineering for High‑Value Compounds',abstract:'Understanding how environmental signals modulate secondary metabolism remains a key challenge in plant biology. In this study, we combined CRISPR-Cas9 gene editing with callus culture systems to investigate the genetic and environmental regulation of the dihydrochalcone and flavonoid pathways in Malus domestica cv. Annurca. This traditional apple cultivar from Southern Italy is renowned for its rich polyphenolic profile, making it an ideal model to study light-dependent metabolic regulation. Peel-derived callus cultures provided a rapid and controllable platform for targeted gene manipulation and metabolic analysis. Following MdCHI gene knockout, both control and edited lines were grown under light and dark conditions to examine how light influences pathway activation. Expression profiling of key biosynthetic genes (Md4CL, MdCHS, MdCHI, MdUGT, and MdFLS) showed that light strongly induces their expression, causing pronounced differences in polyphenol and flavonoid accumulation, particularly in edited lines. These results demonstrate that combining gene editing and in vitro culture systems enables functional dissection of environmentally responsive biosynthetic networks and enhances our understanding of light-regulated secondary metabolism. Future RNA-seq analyses will identify transcription factors regulated by light and involved in activating polyphenol pathway genes in Annurca apple, providing new insights for targeted manipulation of secondary metabolism in fruit crops.'},
  {id:'p4',num:'P-04',speaker:'Giulia Marchisella',affil:'(1) University of Verona, Department of Biotechnology, 37134 Verona, Italy',title:'Uncovering the Metabolic Fate of Vanillin in Plants for Vanilla Aroma production',topic:'Metabolic Pathway Engineering for High‑Value Compounds',abstract:'Vanillin is the predominant odour component of natural vanilla, a complex aromatic bouquet comprising more than 200 compounds. Natural vanilla is obtained from Vanilla planifolia pods through a time-consuming process, whereas commercially available vanilla largely consists of pure vanillin produced by chemical synthesis or microbial fermentation. However, vanillin alone does not reproduce the full complexity of the natural bouquet.; In plants, the enzymatic route leading to vanillin formation and its metabolic fate remain unclear. Elucidating vanillin metabolism in plant cells is essential to identify upstream and downstream constraints affecting its accumulation. This project aims to investigate plant metabolic responses associated with vanillin as a foundational step toward the long-term reconstruction of the natural vanilla bouquet through plant-based metabolic engineering.; Accordingly, callus cultures from different plant species were fed with vanillin and analysed using a metabolomic approach. UPLC–MS profiling revealed extensive and species-specific conversion of vanillin into secondary metabolites, indicating the presence of endogenous transformation pathways. These results provide insights relevant to host selection and pathway engineering, supporting plants as promising platforms for vanilla aroma biosynthesis.'},
  {id:'p5',num:'P-05',speaker:'Jone Echeverria Alberdi',affil:'(1) Institute for Integrative Systems Biology (I2SysBio), Universitat de València-CSIC, Paterna, 46980, Valencia, Spain (2) Department of Biotechnology, University of Verona, 37134, Verona, Italy (3) Center Agriculture Food Environment (C3A), University of Trento/Fondazione Edmund Mach, via E. Mach 1, 38098, San Michele all’Adige (TN), Italy.',title:'INTERPLAY BETWEEN LIGHT SIGNALING AND PHYTOHORMONE ELICITATION IN THE REGULATION OF ANTHOCYANIN, STILBENOID, AND TERPENE BIOSYNTHESIS IN GRAPEVINE CELL CULTURES',topic:'Metabolic Pathway Engineering for High‑Value Compounds',abstract:'Plants produce specialized metabolites of high industrial value, yet the signalling cues regulating their biosynthesis remain complex. This study uses Vitis vinifera cell cultures to investigate the regulatory networks driving different specialized metabolic pathways. We evaluated the impact of jasmonic acid (JA, MeJA), cyclodextrins (CD) and abscisic acid (ABA) treatments under light and dark conditions. Anthocyanin accumulation was strongly light-dependent. While JA+CD elicitation significantly enhanced levels in the dark, light exposure potentially masked this effect. Conversely, ABA promoted higher anthocyanin levels regardless of light, indicating distinct regulatory mechanisms. Resveratrol, undetected in controls, was induced by JA+CD in both regimes, with higher levels in light-grown cultures, suggesting interaction between light signalling and stilbenoid regulation. Terpene accumulation was also responsive to JA-based elicitation, but not to ABA. To identify transcriptional drivers of these responses, transcriptomic data from 24 h and 4 day elicited cells was analyzed. This identified known and uncharacterized factors, including MYBA, MYC2, MYB24, MYB14 and WRKY03. DAP-seq and dual-luciferase analyses corroborated their regulatory roles. Finally, a 24-hour elicitation time-course was conducted to help resolve the temporal hierarchy among these TFs. Together, these findings provide insight into plant specialized metabolism in grape cells.'},
  {id:'p6',num:'P-06',speaker:'Kateryna Lystvan',affil:'Institute of Cell Biology and Genetic Engineering, 03143, Kyiv, Ukraine',title:'Valproic acid as an epigenetic modifier to improve the production of (non)protein valuable metabolites: early-stage results',topic:'Metabolic Pathway Engineering for High‑Value Compounds',abstract:'Influencing the epigenome is one of the ways to enhance the production of valuable substances through modifications that alter chromatin structure and promoter accessibility, thereby modulating gene transcriptional activity. Altering the activity or the heterologous expression of epigenome-modifying enzymes can activate hitherto inactive genes or enhance the expression of low-activity ones, leading to the synthesis of new metabolites or the hyperaccumulation of target (non)recombinant products.  There are successful examples of using such an approach in microorganisms. However, it remains poorly studied in plant biotechnology, despite some reports on the beneficial effect of histone deacetylase (HDAC)  inhibitors on recombinant protein production. We aimed to fill this gap (at least partially) by initiating a comprehensive analysis of the effects of both epigenome-modifying small molecules and heterologously expressed genes to improve the production of (non)protein metabolites. Our early-stage results confirm this potential. While we previously demonstrated the significant impact of valproic acid (VA), a potent HDAC inhibitor, on the regeneration processes of some plant species, we have now also observed its beneficial effects on protein accumulation and activity. Specifically, an 10-15% increase in total protein content, alongside a robust (up to 2.5-fold) enhancement of antibacterial activity, has been observed in VA-treated recombinant colicin-producing N. tabacum plants.'},
  {id:'p7',num:'P-07',speaker:'Katja Karppinen',affil:'1 Department of Arctic and Marine Biology, UiT The Arctic University of Norway, Tromsø, Norway 2 The New Zealand Institute for Plant and Food Research Ltd, Palmerston North, New Zealand 3 The New Zealand Institute for Plant and Food Research Ltd, Auckland, New Zealand 4 NIBIO, Norwegian Institute of Bioeconomy Research, Ås, Norway',title:'VmMYBA1 transcription factor is a strong inducer of anthocyanin biosynthesis in Nicotiana cells',topic:'Metabolic Pathway Engineering for High‑Value Compounds',abstract:'Bilberry (Vaccinium myrtillus L.) fruits accumulate high concentration of anthocyanins, especially delphinidins, which are associated with health-benefits. Anthocyanins are produced via the flavonoid biosynthetic pathway, which is regulated by the MBW regulatory complex, including R2R3 MYB transcription factor (TF) that is considered as the main regulator in the complex. Among 18 flavonoid biosynthesis-regulating R2R3 MYB genes identified in bilberry genome, VmMYBA1 was associated with anthocyanin biosynthesis in fruit. Transient overexpression of VmMYBA1 in Nicotiana benthamiana leaves by Agrobacterium infiltration led to the induction of expression of anthocyanin biosynthesis genes and accumulation of delphinidin 3-rutinoside. VmMYBA1 was verified to activate the promoters of F3’5’H, DFR, ANS and UFGT in the flavonoid pathway. When VmMYBA1 was cloned into a pEAQ-HT-DEST3 expression vector and transiently overexpressed in N. tabacum, a high accumulation of anthocyanins was observed. Our results indicate that VmMYBA1 can produce high anthocyanin concentration in Nicotiana cells without the need for co-infiltration of other TFs of the MBW complex or structural genes, such as F3’5’H to derive delphinidin production. VmMYBA1 is an excellent candidate for metabolic engineering towards high anthocyanin/delphinidin production in tobacco cells, which represents a sustainable alternative to conventional anthocyanin production platforms for use in industrial and medical applications.'},
  {id:'p8',num:'P-08',speaker:'Rita Abranches',affil:'ITQB NOVA, Universidade Nova de Lisboa, 2780-157 Oeiras, Portugal',title:'Cultured Plant Cells as Versatile Biofactories for Carotenoids and Functional Proteins',topic:'Metabolic Pathway Engineering for High‑Value Compounds',abstract:'Plant cell culture systems offer a sustainable and controllable platform for producing high-value biomolecules. Here we provide an overview of our work on the use of cultured plant cells as versatile biofactories, including metabolic engineering and the production of recombinant functional proteins. We established a plant-based platform using metabolically engineered tobacco BY-2 and Medicago truncatula A17 cell suspension cultures to produce ketocarotenoids, astaxanthin and canthaxanthin, by heterologous expression of key enzymes of the biosynthetic pathway. The intracellular localization of the accumulated carotenoids was investigated, and preliminary scale-up approaches were also explored. In parallel, plant cell systems were developed for the production of functional recombinant proteins, including health-related proteins such as the large complex Spike viral glycoprotein, as well as food-relevant proteins such as sweet proteins like thaumatin. Overall, these studies demonstrate the flexibility of plant cell cultures in supporting distinct biosynthetic objectives within a unified technological framework. Our results highlight the potential of cultured plant cells in health and food biotechnology, including emerging cellular agriculture strategies, reinforcing their role as adaptable, safe production platforms for next-generation bio-based products.'},
  {id:'p9',num:'P-09',speaker:'Ceren Cakmak',affil:'BOKU University, Institute of Plant Biotechnology and Cell Biology, Department of Biotechnology and Food Science, Muthgasse 11/I, 1190 Vienna, Austria',title:'Biomimicking mammalian ER in plants',topic:'Plant‑Made Biologics – From Antibodies to Advanced Therapeutics',abstract:'The endoplasmic reticulum (ER) is central to protein biosynthesis and folding, yet plant ER architecture is predominantly tubular, unlike the sheet-rich ER of mammalian secretory cells, which is optimized for high biosynthetic output. This project aims to reprogram plant ER morphology using synthetic and conserved ER-shaping proteins to induce mammalian-like ER sheets and to explore the effects on biosynthetic capacity. Arabidopsis thaliana ER-shaping proteins LNP1 and the reticulons RTNLB10 and RTNLB13 have been selected for transient overexpression in Nicotiana benthamiana, together with selected Nicotiana homologs, to assess their functional conservation in ER sheet stabilization, curvature regulation, and network organization. In addition, the mammalian ER scaffold protein CLIMP-63 will be heterologously expressed in plant cells to assess its ability to stabilize sheet-like ER domains in plant cells. We are currently assessing all constructs via transient agroinfiltration, allowing for rapid functional screening. Based on these outcomes, CRISPR/Cas9-based genome editing will be considered for precise and combinatorial ER engineering in N. benthamiana. ER remodeling and spatial organization will be analyzed using advanced microscopy. Potential effects on protein folding and post-translational processing will be explored to link ER morphology with biosynthetic performance and its relevance for plant-based molecular farming.'},
  {id:'p10',num:'P-10',speaker:'Gergana Zahmanova',affil:'(1) Department of Molecular Biology, University of Plovdiv, 4000 Plovdiv, Bulgaria (2) Center of Plant Systems Biology and Biotechnology, 4000 Plovdiv, Bulgaria',title:'Expression of Rat and Rabbit Hepatitis E Virus Capsid Proteins in Nicotiana benthamiana',topic:'Plant‑Made Biologics – From Antibodies to Advanced Therapeutics',abstract:'Rat hepatitis E virus (rat HEV) and rabbit hepatitis E virus (raHEV) have been isolated from their respective animal reservoirs, rats and rabbits, and accumulating evidence indicates their potential for zoonotic transmission to humans. Nicotiana benthamiana has emerged as an efficient and scalable plant-based expression system for the production of viral proteins and virus-like particles (VLPs). However, the expression of rat HEV and rabbit HEV capsid (ORF2) proteins capable of assembling into VLPs in N. benthamiana has not yet been reported. In this study, truncated ORF2 capsid proteins derived from rat and rabbit HEV were evaluated for expression in N. benthamiana. Two rat HEV ORF2 constructs and one rabbit HEV ORF2 construct, containing N- and C-terminal deletions (corresponding to amino acid positions rat HEV 357–614 and 102–614, and rabbit HEV 112–507), were cloned into the pEAQ-HT expression vector and transiently expressed in N. benthamiana leaves. The successful expression of these truncated capsid proteins provides a basis for assessing their capacity to assemble into VLPs and supports the development of plant-based platforms for the production of HEV structural proteins. This work establishes a foundation for further characterization of rat and rabbit HEV VLPs formation in plants and highlights the potential of N. benthamiana as a versatile system for studying zoonotic HEV and for developing diagnostic or vaccine-related reagents.;'},

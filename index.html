  {id:'f10',day:'Thursday 14 May',dayKey:'thu',session:'Flash Talks — Session II',type:'flash',time:'18:35–18:40',speaker:'Sandra Correia',affil:'(1) Centre for Functional Ecology, TERRA Associate Laboratory, Department of Life Sciences, Calçada Martim de Freitas, University of Coimbra, 3000-456 Coimbra, Portugal (2) InnovPlantProtect CoLab, Estrada de Gil Vaz, 7351-901 Elvas, Portugal (3) Center for Neuroscience and Cell Biology, University of Coimbra, Calçada Martim de Freitas, 3000-456 Coimbra, Portugal (4) Universidad de Antioquía, Medellin, Antioquia, Colombia',title:'Scaled-Up Woody Plant Cell Suspension Cultures for high-value compound production',topic:'Scaling Up Plant-Based Production',abstract:'The increasing demand for sustainable, controllable, and scalable production of plant bioactives highlights the need for diverse in vitro metabolite platforms tailored to specific compound classes. Plant cell suspension cultures offer eco-friendly, reproducible systems that avoid whole-plant variability and allow controlled biosynthesis and recovery of valuable molecules. In this study, we established and optimised two complementary suspension-based platforms from woody species to produce different bioactives. Callus-derived cultures from Poplar (Populus tremula × P. alba) were developed for extracellular vesicle (EV) production, achieving isolation yields of 2.5 × 10¹⁰ vesicles per gram of biomass. RNA-loaded EVs successfully delivered cargo into Botrytis cinerea hyphae, demonstrating their potential as natural nanocarriers for plant protection and biotechnology. Simultaneously, tamarillo (Solanum betaceum) cell suspensions were optimised as enzyme-producing bioreactors through medium adjustments and elicitation. A 3% (w/v) sucrose medium enhanced growth and protein output, while casein hydrolysate, yeast extract, and chitosan selectively stimulated hydrolytic and glycosidase activities. Overall, these results show that tailored, scaled-up woody plant cell-suspension systems can act as versatile biofactories for vesicles, enzymes, and other high-value metabolites, thereby supporting biotechnological applications.'},

  // FRIDAY
  {id:'k6',day:'Friday 15 May',dayKey:'fri',session:'Keynote',type:'keynote',time:'09:00–09:45',speaker:'Antonio Granell',affil:'IBMCP (CSIC-UPV)',title:'Plants as Biofactories of Metabolites: Breeding and Engineering for High-Level Production in Tomato',topic:'Metabolic Pathway Engineering',abstract:'Using tomato as a metabolite biofactory through breeding and metabolic engineering. Examples span genome editing for non-native metabolite production, CRISPRa-based pathway activation, and fine-tuning nutritional and organoleptic quality. A showcase of how domesticated crops can be rapidly engineered into production platforms.'},
  {id:'o23',day:'Friday 15 May',dayKey:'fri',session:'Oral — Metabolic Engineering',type:'oral',time:'09:45–10:05',speaker:'José Tomás Matus Picero',affil:'(1) Institute for Integrative Systems Biology (I2SysBio, CSIC - Universitat de València), Paterna, 46908, Valencia, Spain. (2) Laboratorio de Epigenética Vegetal, Departamento de Silvicultura, Facultad de Ciencias Forestales, Universidad de Concepción, Chile. (3) Universidad de Alicante. Alicante, Spain (4) Instituto de Biologia Molecular y Celular de Plantas (IBMCP), Valencia, Spain. (5) Universitat Autònoma de Barcelona, Department of Biochemistry and Molecular Biology, Campus UAB, Cerdanyola del Vallès, 08193, Spain',title:'Integrating cell culture elicitation with genome assembly and epigenetic modulation to dissect boldine biosynthesis in Peumus boldus',topic:'Metabolic Pathway Engineering',abstract:'Peumus boldus is a medicinal tree species native to Chile and the main natural source of boldine, an aporphine alkaloid with well-documented antioxidant, anti-inflammatory and neuroprotective properties. However, boldine production currently relies on leaf extraction from native forests, limiting its scalability and sustainability.; Here, we present an integrative genomic and functional framework to elucidate the regulation of boldine biosynthesis in P. boldus. We generated a first draft genome assembly complemented with Iso-Seq transcriptomes from leaves, flowers, fruits and boldine-producing in vitro cell cultures. This multi-tissue long-read transcriptomic dataset enabled refinement of gene models and identification of candidate genes associated with boldine metabolism. In parallel, we established long-term cell suspension cultures and evaluated the effects of elicitors and epigenetic modifiers on boldine accumulation. Our results show that modulation of chromatin state and stress-related signaling pathways significantly alters boldine production, supporting a regulatory role of epigenetic mechanisms in specialized metabolite biosynthesis. By integrating genome assembly, Iso-Seq-based transcriptomics and functional perturbation assays, this study provides insights into the genetic and epigenetic control of boldine biosynthesis and highlights P. boldus cell cultures as a platform for studying and engineering specialized metabolism in woody plant species.'},
  {id:'o24',day:'Friday 15 May',dayKey:'fri',session:'Oral — Metabolic Engineering',type:'oral',time:'10:05–10:25',speaker:'Silvia Gianoglio',affil:'(1) Instituto de Biología Molecular y Celular de Plantas, UPV-CSIC, Avenida Fausto Elio s/n, 46022 Valencia, Spain (2) CEQA-Instituto Agroforestal del Mediterráneo, Universitat Politècnica de València, Camino de Vera s/n, 46022 Valencia, Spain (3) Universitat de València, Departamento de Química Orgánica, Av. Vicent Andrés Estellés 19, 46100-Burjassot (Valencia), Spain (4) Ecología y Protección Agrícola SL, Pol. Ind. Ciutat de Carlet, 46240 Carlet (Valencia), Spain (5) AINIA Technology Center, Valencia Technological Park, c/ Benjamín Franklin, 5-11, E46980 Paterna, Spain',title:'Recombinant plant-based production of cyclic irregular monoterpene pheromones via a novel trans-α-necrodyl diphosphate synthase',topic:'Metabolic Pathway Engineering',abstract:'Irregular monoterpenes are high-value C10 compounds widely used in sustainable pest control as key components of insect pheromone blends. Their broader deployment is currently limited by the small number of known irregular isopentenyl diphosphate synthases (IDSs) and by the lack of efficient biobased production platforms. Improving the understanding of irregular IDS enzymatic activity while enabling plant recombinant expression is thus essential for scalable bioproduction of pheromones or their precursors. Within the Pheroplus project, we described a novel cyclic irregular IDS from Lavandula that catalyzes the formation of trans-α-necrodyl diphosphate. Its ester derivative, trans-α-necrodyl acetate (TNDAc), is a component of the pheromone blend of Delottococcus aberiae, an invasive mealybug pest. The enzyme, named TNDS, was functionally validated both in vitro and in planta. Notably, we developed tobacco plant biofactories producing TNDAc at levels sufficient to attract D. aberiae males under controlled conditions, demonstrating the feasibility of plant-based pheromone production and emission. Comparative analyses with related irregular IDSs point to specific structural features likely involved in determining the synthesis of cyclic versus branched products. These observations support ongoing efforts toward rational enzyme design and optimization, and highlight the potential of combining enzymatic insight with plant molecular farming for sustainable pheromone bioproduction.'},
  {id:'o25',day:'Friday 15 May',dayKey:'fri',session:'Oral — Metabolic Engineering',type:'oral',time:'10:25–10:45',speaker:'Amir Akhgari',affil:'nan',title:'Ortholog Driven CRISPRa Modules Enable Enhanced and Flexible Plant Gene Activation',topic:'Metabolic Pathway Engineering',abstract:'Programmable transcriptional activation with CRISPRa offers a potent approach to gene regulation for synthetic biology and plant biotechnology. Here, we introduce a modular CRISPRa/Cas ortholog framework built on the multi-kingdom Golden Gate platform that enables direct comparison of dSaCas9 and dSpCas9 for activating genes in Nicotiana benthamiana. Across assays, dSaCas9 consistently produced stronger activation of target promoters than dSpCas9, achieving up to a 19‑fold increase in transient dual‑luciferase experiments. Beyond the constitutive pNOS promoter, we also assessed several plant‑specific promoters with the CRISPRa system; in multiple cases, dSaCas9 again showed superior activation compared to dSpCas9. To expand the system’s utility, we adapted it for stable expression in diverse plant cell cultures. We transformed the model N. tabacum BY2 line using standard procedures and further tailored transformation protocols for coffee cell cultures and tomato callus. Cells from all three species were successfully transformed with a construct driving activation of the constitutive pNOS promoter.; Overall, our modular CRISPRa/Cas system supports efficient transcriptional activation both transiently in plants and stably in cell cultures. Ongoing efforts with cell culture platforms focus on accelerating the development of customizable gene circuits and metabolic pathways for plant synthetic biology.;'},
  {id:'o26',day:'Friday 15 May',dayKey:'fri',session:'Oral — Metabolic Engineering',type:'oral',time:'10:45–11:05',speaker:'Luca Morelli',affil:'(1) SDU Biotechnology, Faculty of Engineering, University of Southern Denmark (Odense, Denmark) (2) Institute for Plant Molecular and Cell biology (IBMCP) CSIC-Universitat Politecnica de Valencia (Spain) (3) Stazione Zoologica Anton Dohrn, Naples (Italy)',title:'Compartmentalized metabolic engineering for carotenoid production across biological scales',topic:'Metabolic Pathway Engineering',abstract:'Carotenoids are essential lipophilic isoprenoids synthesized in plastids and fundamental for human nutrition and photosynthetic physiology. In green tissues, their tight co-regulation with chlorophylls sustains efficient light harvesting and photoprotection. Yet boosting carotenoids inside chloroplasts can disrupt this balance, sometimes driving chloroplast-to-chromoplast conversion, which is excellent for storage, but detrimental for photosynthetic efficiency. To bypass this trade-off, we investigated strategies to enhance carotenoid biosynthesis outside plastids, following the rationale that compartmentalizing metabolites can prevent harmful intracellular interactions. By engineering the cytosolic mevalonate (MVA) pathway in Nicotiana benthamiana leaves and introducing bacterial enzymes for carotenoid production, we successfully redirected the synthesis of intermediates such as phytoene and lycopene to the cytosol, demonstrating that pathway relocation is feasible. Looking ahead, extraplastidial carotenoid biosynthesis opens new avenues in microalgae, where cellular simplicity and plasticity may further improve production. We focus on the diatom Phaeodactylum tricornutum, combining rapid growth, mature genetic tools, and a highly compartmentalized metabolism shaped by secondary endosymbiosis. Altogether, we hope this work pushes carotenoid fortification beyond the limits imposed by the photosynthetic chloroplast.'},
  {id:'k7',day:'Friday 15 May',dayKey:'fri',session:'Keynote',type:'keynote',time:'11:35–12:20',speaker:'Ana Judith Martín',affil:'Spanish Ministry of Agriculture, Fisheries and Food',title:'Molecular farming activities within the framework of GMO and genome editing regulations',topic:'Molecular Farming Marketplace',abstract:'Regulatory landscape for molecular farming under GMO and Cartagena Protocol frameworks. Analysis of how genome editing regulations are evolving globally, with implications for molecular farming products from development through to commercialisation.'},
  {id:'f11',day:'Friday 15 May',dayKey:'fri',session:'Flash Talks — Session III',type:'flash',time:'12:20–12:26',speaker:'Marcos Egea-Cortines',affil:'(1) Faculty of Natural Sciences, Department of Biotechnology, University of Ss. Cyril and Methodius, Trnava, 91701, Slovakia; (2) Department of Information Systems and Technologies, Bilkent University, Ankara, Türkiye; (3) National Agricultural and Food Center, Research Institute of Plant Production, Piešťany, 92168, Slovakia',title:'A genetic framework of genes involved in callus formation and organogenesis',topic:'Smart Chassis',abstract:'Lavender hybrids such as Lavandula × intermedia ‘Budrovka’ are increasingly explored as flexible upstream systems for plant molecular farming due to their well-characterized monoterpenoid and phenolic pathways and their reliable response to in vitro manipulation. Yet, long-term quantitative descriptions of callus biomass development remain limited. We monitored callus formation from root and stem explants in 3-week intervals across a 15-week cultivation period to generate a structured dataset suitable for predictive modelling. Five algorithms (Beta Regression, GAM, Random Forest, SVR, XGBoost) were trained on mean response data to estimate callus weight and induction efficiency. XGBoost achieved the highest accuracy for biomass prediction (R² = 0.9373; RMSE 1.76 g), and feature-importance profiles consistently identified explant origin, culture duration and auxin–cytokinin regime as dominant contributors to callus performance. NSGA-II multi-objective optimization, guided by GAM and XGBoost outputs, indicated that 15-week root-derived calli grown under 0.5 mg/L 2,4-D and 2 mg/L BAP represent the highest-yielding configuration. The study provides a data-resolved view of long-term callus behavior in hybrid lavender and a modelling-based approach for rational tuning of biomass production in plant-based bioprocesses.; This work was supported by project FPPV-31-2026.'},
  {id:'f12',day:'Friday 15 May',dayKey:'fri',session:'Flash Talks — Session III',type:'flash',time:'12:26–12:32',speaker:'Jules Delasalle',affil:'(1) Université de Rouen Normandie, Laboratoire GlycoMEV UR 4358, SFR Normandie Végétal FED 4277, Innovation Chimie Carnot, F-76000 Rouen, France.  (2) Louvain Institute of Biomolecular Science and Technology, UCLouvain, Croix du Sud 4-L7.07.14, 1348 Louvain-la-Neuve, Belgium *Equal contribution of these authors in the management of the work',title:'Calnexin and calreticulin ER lectins chaperone recombinant protein folding in plants',topic:'Smart Chassis',abstract:'Increasing demand for biologics, which are complex and glycosylated proteins, has driven the development of efficient sustainable bioproduction systems, like the microalgae Chlamydomonas reinhardtii and plant cell suspensions of Nicotiana tabacum BY-2, as alternatives to mammalian cell platforms. These systems offer: lower production costs, reduced contamination risks, and easy genome editing. N-glycosylation is well known to be a critical quality attribute affecting protein stability, activity and functions (Strasser et al., 2021). In the endoplasmic reticulum (ER), the lectin chaperones calreticulin (CRT) and calnexin (CNX) ensure proper folding of glycoproteins before Golgi transit (Aebi, 2013).; This study aims to: i) functionally characterize CRT and CNX in N. tabacum BY-2 and C. reinhardtii by generating KO cell lines. Phenotypic characterization: growth assays, RNA-seq, and glycan analyses are in progress. ii) improve recombinant glycoprotein production yield by overexpressing human, plant, and microalgal CRT/CNX variants together with a green-fluorescent erythropoietin fusion protein (EPO-Clover). Transient expression in Nicotiana benthamiana leaves revealed that co-expression of human CNX and CRT resulted in a 7-fold increase EPO-Clover accumulation. Stable transgenic N. tabacum BY-2 and C. reinhardtii lines were also generated, but differences in EPO-Clover fluorescence ratios were less pronounced under stable expression compared to transient systems.'},
  {id:'f13',day:'Friday 15 May',dayKey:'fri',session:'Flash Talks — Session III',type:'flash',time:'12:32–12:38',speaker:'Romane Vandevelde',affil:'(1) UCLouvain',title:'Inhibition of transgene silencing in Nicotiana for improved molecular farming',topic:'Smart Chassis',abstract:'Nicotiana tabacum Bright Yellow 2 (BY-2) cell suspensions are established as a platform for producing recombinant complex glycoproteins. However, this system typically yields limited amounts of protein, even when strong constitutive promoters are used. One limitation arises from RNA silencing processes, such as transcriptional gene silencing (TGS) and post-transcriptional gene silencing (PTGS), which prevent large accumulation of transgene RNA transcripts. To address this challenge, our research project aims at developing strategies to counteract the production of transgene dsRNAs involved in silencing as well as to relieve DNA methylation specifically established in the 35S promoter sequence.  First, RNA-dependent RNA polymerase (RDR) genes involved in transgene silencing (RDR1, RDR2 and RDR6) were knocked-out in BY-2 cells using CRISPR/Cas9 technology. Next, BY-2 cell lines (WT, RDR2-KO, RDR1/6-KO and RDR1/2/6-KO backgrounds) expressing the dCas9-SunTag/TET1 system are currently being generated. This system recruits multiple copies of the catalytic domain of the human demethylase TET1 at a specific genome locus via a nuclease-deactivated Cas9 protein fused to repetitive GCN4 peptide epitopes, as previously reported. In our case, we will target demethylation of the 35S promoter controlling Gus reporter gene expression. We expect that this approach will significantly improve recombinant protein yields in transgenic BY-2 cells.'},
  {id:'f14',day:'Friday 15 May',dayKey:'fri',session:'Flash Talks — Session III',type:'flash',time:'12:38–12:44',speaker:'Javier Romero',affil:'(1) Instituto de biología molecular y celular de plantas (UPV-CSIC)',title:'Biofortification of S. lycopersicum through the fungal bioluminescence pathway to enhance hispidin synthesis',topic:'Metabolic Pathway Engineering',abstract:'Plant biofortification is a cost-effective strategy for delivering health-promoting metabolites to populations with limited dietary diversity. While antioxidants like flavonoids are common targets, the potential of styrylpyrone-type compounds like hispidin—noted for antiviral, antidiabetic, and antioxidant properties—remains under-explored. In this study, we generated transgenic S. lycopersicum var. Micro-Tom lines constitutively expressing the Fungal Bioluminescence Pathway (FBP). This pathway synthesizes hispidin from caffeic acid via a polyketide synthase (HispS) and subsequently converts it into luciferin to produce autonomous light. We evaluated bioluminescence across growth stages and fruit ripening: immature green (IG), mature green (MG), and breaker plus seven (B+7). Our results show continuous, autonomous bioluminescence, notably concentrated in the fruit as a metabolic sink. LC-MS confirmed stable hispidin synthesis throughout all stages, correlating with strong HispS expression. This work demonstrates that natural caffeic acid levels in tomatoes are sufficient to sustain the FBP and accumulate hispidin. While bioluminescence serves as a reliable in vivo indicator of pathway activity, it does not correlate linearly with total hispidin content. These findings position hispidin as a promising target for metabolic engineering and highlight the FBP as a powerful tool for monitoring metabolite production in functional crops'},
  {id:'f15',day:'Friday 15 May',dayKey:'fri',session:'Flash Talks — Session III',type:'flash',time:'12:44–12:50',speaker:'Javier Sánchez Vicente',affil:'(1), (4): Madeinplant SL.  (2),(3): IBMCP (UPV-CSIC)',title:'Characterization of Nicotiana-derived signal peptides and promoters for molecular farming',topic:'Molecular Farming Marketplace',abstract:'Plant-based expression systems are widely used in molecular farming, but their efficiency strongly depends on the regulatory and targeting elements employed. This study aimed to characterize a panel of signal peptides and promoters from Nicotiana benthamiana and Nicotiana tabacum for recombinant protein production.; Several endogenous plant proteins that accumulated in the apoplast in response to agroinfiltration were identified, and their associated signal peptides and promoters were selected for evaluation. Their performance was tested in transient expression assays using different recombinant proteins and compared with commonly used signal peptides and promoters in plant biotechnology.; Our results suggest substantial variability in performance, particularly for signal peptides, which appears to be protein-dependent. One promoter showed especially promising results across constructs. These findings contribute to expanding the molecular toolbox available for plant molecular farming and support the use of endogenous Nicotiana regulatory elements as valuable alternatives for recombinant protein expression.'},
  {id:'o27',day:'Friday 15 May',dayKey:'fri',session:'Oral — Marketplace & Phytotech',type:'oral',time:'14:00–14:20',speaker:'Anatoli Giritch',affil:'(1) Nambawan Spain SLU, Pl. Conquistadores, 2, 06004 Badajoz, Spain  (2) Nomad Bioscience GmbH, Weinbergweg 22, 06120 Halle, Germany  (3) Olivos de Badajoz SLU, Ctra. Calzada Romana, km 23, 06184 Pueblonuevo del Guadiana, Badajoz, Spain',title:'Scalable expression technologies for manufacturing bioengineered proteins in plants',topic:'Scaling Up Plant-Based Production',abstract:'Transient expression technologies such as magnICON® and NOMADIC® are efficient processes for biopharmaceutical and biomaterial production that are simple and indefinitely scalable protocols for heterologous protein expression in plants. They rely on transient amplification of viral vectors delivered systemically by Agrobacterium or by viral particles or released from a transgene using ethanol induction. These technologies effectively address most of the major shortcomings of earlier plant-based technologies such as low speed of manufacturing, low expression levels, lack of versatility, and high manufacturing cost. The technologies have been brought to GMP-compliant level and have been successfully used to manufacture diagnostic antibodies or produce materials for clinical trials by Icon Genetics/Bayer, Icon Genetics/Denka, Nomad Bioscience, KBio etc. In addition, Nambawan Spain, together with Nomad Bioscience and Olivos de Badajoz, has successfully scaled up and commercialized the technology based on stable transformation of plants expressing a protein of interest in endosperm of seed. Examples of technologies used at different (lab, pilot and industrial) manufacturing scales will be presented.'},
  {id:'o28',day:'Friday 15 May',dayKey:'fri',session:'Oral — Marketplace & Phytotech',type:'oral',time:'14:20–14:40',speaker:'Sutinee Soopairin',affil:'(1) Department of Social and Administrative Pharmacy, Faculty of Pharmaceutical Sciences, Chulalongkorn University, Bangkok, Thailand (2) St George’s School of Health and Medical Sciences, City St George’s, University of London, London, United Kingdom',title:'Determinants of Public Hesitancy Toward Medicines Derived from Plant Molecular Farming',topic:'Molecular Farming Marketplace',abstract:'Our prior in-depth interviews with 63 stakeholders highlighted concerns regarding public hesitancy toward plant molecular farming (PMF). However, empirical evidence on public hesitancy toward PMF-derived products remains limited. Building on these insights, this study examined public hesitancy toward medicines or biomolecules derived from PMF and associated factors among the Thai population. A cross-sectional survey was conducted in January 2026 using a structured, self-administered online questionnaire based on the Theory of Planned Behavior and distributed via social media to Thai individuals aged 18 years or older. Descriptive statistics were used to characterize hesitancy and regression analysis identified associated factors. A total of 227 participants completed the questionnaire. The median age was 31 years, with respondents from all regions of Thailand. Overall, 54.2% reported hesitancy toward using PMF-derived products, with most showing moderate or higher hesitancy. A positive attitude toward the tobacco industry was associated with a twofold increase in non-hesitancy toward PMF, while a positive attitude toward PMF was also significantly associated with non-hesitancy. These findings indicate that public hesitancy toward PMF-derived products is evident in Thailand and influenced by multiple factors. This pilot study provides a basis for expansion at ISPMF 2026 to engage wider international audiences and inform broader communication and branding strategies for PMF.'},
  {id:'k8',day:'Friday 15 May',dayKey:'fri',session:'Keynote — Closing',type:'keynote',time:'14:40–15:25',speaker:'Marc-André D\'Aoust',affil:'Aramis Biotechnologies',title:'Toward commercialization of a plant-based VLP seasonal influenza vaccine, and beyond',topic:'Molecular Farming Marketplace',abstract:'Aramis Biotechnologies optimized the VLP seasonal influenza vaccine from Medicago, stabilizing hemagglutinin in pre-fusion conformation and improving process yields up to 20-fold. Phase 1/2 clinical immunogenicity study now underway in Canada. Future plans to leverage manufacturing leadership for pharmaceutical, veterinary, and agricultural applications.'},
];

const POSTERS = [
  {id:'p1',num:'P-01',speaker:'Amanda de Santana Lopes',affil:'Johannes Gutenberg-Universität Mainz',title:'Floating Biofactories for Sustainable Oil Production',topic:'Metabolic Pathway Engineering',abstract:'Duckweeds are floating aquatic plants recognized as the smallest flowering plants. They are particularly notable for their ease of cultivation and rapid growth. This latter trait makes them especially attractive for biotechnological applications, where fast biomass accumulation can be leveraged for the production of high value compounds. Recently, we published a detailed method for the reproducible genetic engineering of Spirodela polyrhiza (giant duckweed) to support duckweed research and expand its potential in biotechnology. One of our current projects focuses on engineering the triacylglycerol (TAG) metabolism of S. polyrhiza. Our long term goal is to develop a sustainable, land independent production system capable of achieving competitive oil yields. We first evaluated the heterologous expression of TAG‑biosynthesis genes, including the transcription factors LEC2 and WRI1 and the enzymes DGAT1 and DGAT2. Among these, WRI1 and DGAT1 most effectively increased TAG accumulation in transformed S. polyrhiza. Then, to further enhance TAG levels, we combined WRI1, DGAT1, and the oil‑body protein Oleosin in a single construct. Selection of transformed lines is ongoing, and regenerated plants will soon allow assessment of this strategy. Next, we aim to complement the heterologous expression strategy with CRISPR activation and dsRNA‑mediated knockdown of endogenous targets to fine‑tune TAG synthesis and maximize oil accumulation in giant duckweed.'},
  {id:'p2',num:'P-02',speaker:'Antonio Santiago Pajuelo',affil:'(1) Institute for Integrative Systems Biology (I2SysBio), Universitat de València-CSIC, Paterna, 46908, Valencia, Spain. (2) Department of Biochemistry and Molecular Biology and Soil and Agricultural Chemistry, Faculty of Sciences, University of Alicante, Alicante, Spain. (3) Centre for Research in Agricultural Genomics (CRAG) CSIC-IRTA-UAB-UB, Edifici CRAG, Campus UAB, Cerdanyola del Vallès, Barcelona, Spain. (4) Sequentia Biotech, C/ del Dr Trueta, 08005 Barcelona, Spain.',title:'Discovery of Oxyresveratrol Biosynthesis Pathway in Mulberry (Morus alba) Using MeJA-Elicited Cells',topic:'Metabolic Pathway Engineering',abstract:'The medicinal properties of mulberry (Morus alba L.) are partly attributed to stilbenoids, including resveratrol (R) and oxyresveratrol (OxyR). Natural extraction from bark and roots is unsustainable, making biochemical characterization challenging. While R biosynthesis is established, the OxyR pathway remains unclear. To investigate this, we established mulberry cell suspensions where methyl jasmonate (MeJA) and methyl-β-cyclodextrins (MBCD) elicited high intra- and extracellular R and OxyR production. We conducted time-series elicitation integrating transcriptomics and proteomics, supported by a re-annotated long-read genome (Mal_HE_154X_1). Multi-omics analysis identified 768 differentially expressed genes and 712 differentially abundant proteins. These included 22 stilbene synthase (STS) genes and six p-coumaroyl-CoA 2-hydroxylases (C2’Hs) co-expressed with R and OxyR accumulation. We hypothesized that the C2’H product, 2,4-cinnamoyl-CoA, rather than R, serves as the OxyR precursor in an STS-catalyzed reaction. Characterization of a recombinant C2’H isoform confirmed conversion of p-coumaroyl-CoA into 2,4-cinnamoyl-CoA. Agroinfiltration in N. benthamiana and grapevine cells expressing MaC2’H and STS led to OxyR accumulation. These results conclude that OxyR biosynthesis in mulberry is mediated by C2’Hs acting upstream of STS.'},
  {id:'p3',num:'P-03',speaker:'Carmen Laezza',affil:'(1) Department of Agricultural Sciences, University of Naples Federico II, Portici, Italy (2) Department of Natural Product Biosynthesis, Max Planck Institute for Chemical Ecology, Jena, Germany',title:'CRISPR Editing of a Light-Responsive Pathway Unlocks Polyphenol Biosynthesis in Annurca Apple',topic:'Metabolic Pathway Engineering',abstract:'Understanding how environmental signals modulate secondary metabolism remains a key challenge in plant biology. In this study, we combined CRISPR-Cas9 gene editing with callus culture systems to investigate the genetic and environmental regulation of the dihydrochalcone and flavonoid pathways in Malus domestica cv. Annurca. This traditional apple cultivar from Southern Italy is renowned for its rich polyphenolic profile, making it an ideal model to study light-dependent metabolic regulation. Peel-derived callus cultures provided a rapid and controllable platform for targeted gene manipulation and metabolic analysis. Following MdCHI gene knockout, both control and edited lines were grown under light and dark conditions to examine how light influences pathway activation. Expression profiling of key biosynthetic genes (Md4CL, MdCHS, MdCHI, MdUGT, and MdFLS) showed that light strongly induces their expression, causing pronounced differences in polyphenol and flavonoid accumulation, particularly in edited lines. These results demonstrate that combining gene editing and in vitro culture systems enables functional dissection of environmentally responsive biosynthetic networks and enhances our understanding of light-regulated secondary metabolism. Future RNA-seq analyses will identify transcription factors regulated by light and involved in activating polyphenol pathway genes in Annurca apple, providing new insights for targeted manipulation of secondary metabolism in fruit crops.'},
  {id:'p4',num:'P-04',speaker:'Giulia Marchisella',affil:'(1) University of Verona, Department of Biotechnology, 37134 Verona, Italy',title:'Uncovering the Metabolic Fate of Vanillin in Plants for Vanilla Aroma Production',topic:'Metabolic Pathway Engineering',abstract:'Vanillin is the predominant odour component of natural vanilla, a complex aromatic bouquet comprising more than 200 compounds. Natural vanilla is obtained from Vanilla planifolia pods through a time-consuming process, whereas commercially available vanilla largely consists of pure vanillin produced by chemical synthesis or microbial fermentation. However, vanillin alone does not reproduce the full complexity of the natural bouquet.; In plants, the enzymatic route leading to vanillin formation and its metabolic fate remain unclear. Elucidating vanillin metabolism in plant cells is essential to identify upstream and downstream constraints affecting its accumulation. This project aims to investigate plant metabolic responses associated with vanillin as a foundational step toward the long-term reconstruction of the natural vanilla bouquet through plant-based metabolic engineering.; Accordingly, callus cultures from different plant species were fed with vanillin and analysed using a metabolomic approach. UPLC–MS profiling revealed extensive and species-specific conversion of vanillin into secondary metabolites, indicating the presence of endogenous transformation pathways. These results provide insights relevant to host selection and pathway engineering, supporting plants as promising platforms for vanilla aroma biosynthesis.'},
  {id:'p5',num:'P-05',speaker:'Jone Echeverria Alberdi',affil:'(1) Institute for Integrative Systems Biology (I2SysBio), Universitat de València-CSIC, Paterna, 46980, Valencia, Spain (2) Department of Biotechnology, University of Verona, 37134, Verona, Italy (3) Center Agriculture Food Environment (C3A), University of Trento/Fondazione Edmund Mach, via E. Mach 1, 38098, San Michele all’Adige (TN), Italy.',title:'Interplay Between Light Signalling and Phytohormone Elicitation in Anthocyanin and Terpene Biosynthesis in Grapevine Cell Cultures',topic:'Metabolic Pathway Engineering',abstract:'Plants produce specialized metabolites of high industrial value, yet the signalling cues regulating their biosynthesis remain complex. This study uses Vitis vinifera cell cultures to investigate the regulatory networks driving different specialized metabolic pathways. We evaluated the impact of jasmonic acid (JA, MeJA), cyclodextrins (CD) and abscisic acid (ABA) treatments under light and dark conditions. Anthocyanin accumulation was strongly light-dependent. While JA+CD elicitation significantly enhanced levels in the dark, light exposure potentially masked this effect. Conversely, ABA promoted higher anthocyanin levels regardless of light, indicating distinct regulatory mechanisms. Resveratrol, undetected in controls, was induced by JA+CD in both regimes, with higher levels in light-grown cultures, suggesting interaction between light signalling and stilbenoid regulation. Terpene accumulation was also responsive to JA-based elicitation, but not to ABA. To identify transcriptional drivers of these responses, transcriptomic data from 24 h and 4 day elicited cells was analyzed. This identified known and uncharacterized factors, including MYBA, MYC2, MYB24, MYB14 and WRKY03. DAP-seq and dual-luciferase analyses corroborated their regulatory roles. Finally, a 24-hour elicitation time-course was conducted to help resolve the temporal hierarchy among these TFs. Together, these findings provide insight into plant specialized metabolism in grape cells.'},
  {id:'p6',num:'P-06',speaker:'Mohammed Shahid Chaudhary',affil:'(1) Laboratory for Genome Engineering and Synthetic Biology, Division of Biological Sciences, King Abdullah University of Science and Technology (KAUST), Thuwal, Jeddah, Saudi Arabia; (2) Laboratory for Nanomedicine, Division of Biological and Environmental Science and Engineering, King Abdullah University of Science and Technology (KAUST), Thuwal, Jeddah, Saudi Arabia; (3) Computational Bioscience Research Center, King Abdullah University of Science and Technology (KAUST), Thuwal, Jeddah, Saudi Arabia; (4) Red Sea Research Center, King Abdullah University of Science and Technology (KAUST), Thuwal, Jeddah, Saudi Arabia; (5) Water Desalination and Reuse Center, Division of Biological Sciences and Engineering, King Abdullah University of Science and Technology (KAUST), Thuwal, Jeddah, Saudi Arabia',title:'High-yield, plant-based production of an antimicrobial peptide with potent activity in a mouse model',topic:'Plant-Made Biologics',abstract:'Plants offer a promising chassis for the large-scale, cost-effective production of diverse therapeutics, including antimicrobial peptides (AMPs). However, key advances will reduce production costs, including simplifying the downstream processing and purification steps. Here, using Nicotiana benthamiana plants, we present an improved modular design that enables AMPs to be secreted via the endomembrane system and sequestered in an extracellular compartment, the apoplast. Additionally, we translationally fused an AMP to a mutated small ubiquitin-like modifier sequence, thereby enhancing peptide yield and solubilizing the peptide with minimal aggregation and reduced occurrence of necrotic lesions in the plant. This strategy resulted in substantial peptide accumulation, reaching around 2.9 mg AMP per 20 g fresh weight of leaf tissue. Furthermore, the purified AMP demonstrated low collateral toxicity in primary human skin cells, killed pathogenic bacteria by permeabilizing the membrane, and exhibited anti- infective efficacy in a preclinical mouse (Mus musculus) model system, reducing bacterial loads by up to three orders of magnitude. A base-case techno-economic analysis demonstrated the economic advantages and scalability of our plant-based platform. We envision that our work can establish plants as efficient bioreactors for producing preclinical-grade AMPs at a commercial scale, with the potential for clinical applications.'},
  {id:'p7',num:'P-07',speaker:'Kevin Wang',affil:'Division of Math and Natural Sciences, University of Pikeville, Pikeville, KY, United States',title:'Differential Host Responses to Full-Length and Mature Serine Proteases during Transient Expression in N. benthamiana',topic:'Plant-Made Biologics',abstract:'Plant molecular farming enables rapid and scalable production of recombinant biopharmaceuticals; however, expression of proteolytic enzymes remains challenging due to host toxicity and tissue necrosis. In this study, we investigated the impact of protease maturation state on plant host responses using transient expression in Nicotiana benthamiana. Building on our published findings with nattokinase, we compared the expression of full-length zymogen forms and corresponding mature serine proteases lacking pro-domains.; Agroinfiltration of full-length constructs consistently triggered rapid leaf necrosis within 3–5 days post-infiltration, accompanied by reduced protein accumulation and compromised tissue integrity. In contrast, expression of mature protease forms resulted in delayed or minimal necrosis, higher soluble protein yield, and preserved leaf morphology. Functional assays confirmed that mature enzymes retained robust proteolytic activity, whereas full-length forms exhibited limited recoverable activity due to early tissue collapse.; These observations suggest that pro-domains in plant-expressed serine proteases may interfere with host cellular processes or activate plant immune responses, leading to hypersensitive-like cell death. Our results indicate that strategic removal of pro-peptides can mitigate host toxicity while preserving enzymatic function, offering a generalizable design principle for expressing bioactive proteases in plants.'},
  {id:'p8',num:'P-08',speaker:'Henrik Nausch',affil:'',title:'Optimizing recombinant protein yields through promoter engineering in plant expression systems',topic:'Smart Chassis',abstract:'Systematic promoter engineering approaches for maximizing recombinant protein yields across different plant expression platforms.'},
  {id:'p9',num:'P-09',speaker:'Monique Schulze',affil:'',title:'Glycoengineering strategies for improved therapeutic protein quality in plants',topic:'Plant-Made Biologics',abstract:'Comprehensive glycoengineering of N. benthamiana to produce therapeutic proteins with humanised glycan profiles.'},
  {id:'p10',num:'P-10',speaker:'Gergana Zahmanova',affil:'University of Plovdiv',title:'Plant-produced virus-like particles as mucosal vaccine candidates',topic:'Viral Vectors & Nanoparticles',abstract:'Development and preclinical evaluation of plant-produced VLPs for mucosal vaccination strategies.'},
  {id:'p11',num:'P-11',speaker:'Lea Veničáková',affil:'',title:'Transient expression optimization for rapid antibody production in Nicotiana',topic:'Plant-Made Biologics',abstract:'Optimization of agroinfiltration parameters and expression constructs for rapid, high-yield antibody production.'},
  {id:'p12',num:'P-12',speaker:'Micaela Rossini',affil:'',title:'Metabolic engineering of chloroplasts for terpenoid overproduction',topic:'Metabolic Pathway Engineering',abstract:'Plastid-targeted metabolic engineering strategies for enhanced terpenoid accumulation in plant biofactories.'},
  {id:'p13',num:'P-13',speaker:'Nuria Jimenez',affil:'UPV',title:'CRISPR-mediated enhancement of infiltration efficiency in N. benthamiana',topic:'Smart Chassis',abstract:'Gene editing targets in N. benthamiana that enhance Agrobacterium infiltration efficiency and transgene expression levels.'},
  {id:'p14',num:'P-14',speaker:'Oliver Körner',affil:'',title:'Automated phenotyping for high-throughput screening of plant expression lines',topic:'Phytotech & AI',abstract:'Integration of computer vision and automated phenotyping for accelerated screening of plant molecular farming lines.'},
  {id:'p15',num:'P-15',speaker:'Petra Holásková',affil:'',title:'Hairy root cultures as scalable platforms for secondary metabolite production',topic:'Scaling Up Plant-Based Production',abstract:'Development and scale-up of hairy root culture systems for consistent, large-scale secondary metabolite production.'},
  {id:'p16',num:'P-16',speaker:'Roberto Defez',affil:'',title:'Nitrogen fixation engineering for enhanced plant productivity in molecular farming',topic:'Smart Chassis',abstract:'Engineering of nitrogen fixation pathways to reduce fertilizer inputs and enhance plant productivity for molecular farming applications.'},
  {id:'p17',num:'P-17',speaker:'Sara Spada',affil:'',title:'Plant cell wall engineering for improved downstream processing',topic:'Scaling Up Plant-Based Production',abstract:'Modification of cell wall composition to facilitate cell disruption and improve downstream processing yields.'},
  {id:'p18',num:'P-18',speaker:'Thomas Rademacher',affil:'Fraunhofer IME',title:'Regulatory considerations for plant-made biologics entering clinical trials',topic:'Molecular Farming Marketplace',abstract:'Practical guidance on regulatory pathways for plant-made biologics from pre-clinical development through IND filing and Phase I trials.'},
  {id:'p19',num:'P-19',speaker:'Valentina Massa',affil:'',title:'AI-assisted design of plant expression vectors',topic:'Phytotech & AI',abstract:'Machine learning approaches for rational design of plant expression vectors optimised for specific protein targets.'},
  {id:'p20',num:'P-20',speaker:'Willem Vanhercke',affil:'',title:'Seed oil engineering for industrial lipid production',topic:'Metabolic Pathway Engineering',abstract:'Engineering of seed lipid biosynthesis pathways for high-level production of industrially relevant fatty acids.'},

let activeFilter = 'all';
let myAgenda = new Set();
let expandedCards = new Set();
let collapsedDays = new Set();

function setFilter(type, btn) {
  activeFilter = type;
  document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const query = document.getElementById('search').value.toLowerCase().trim();
  const content = document.getElementById('content');

  const allItems = [...TALKS, ...POSTERS];
  const filtered = allItems.filter(t => {
    const matchType = activeFilter === 'all' || t.type === activeFilter || (activeFilter === 'poster' && t.num);
    const matchQ = !query ||
      (t.speaker||'').toLowerCase().includes(query) ||
      (t.title||'').toLowerCase().includes(query) ||
      (t.topic||'').toLowerCase().includes(query) ||
      (t.affil||'').toLowerCase().includes(query);
    return matchType && matchQ;
  });

  updateStats(filtered);

  if (filtered.length === 0) {
    content.innerHTML = `<div class="no-results"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><p>No results found for "<strong>${query}</strong>"</p></div>`;
    return;
  }

  // Separate posters from talks
  const filteredTalks = filtered.filter(t => !t.num);
  const filteredPosters = filtered.filter(t => t.num);

  let html = '';

  // Group talks by day
  const days = [
    {key:'wed',label:'Wednesday 13 May',cls:'dh-wed',sub:'Plant-Made Biologics · Keynotes · Flash Talks I'},
    {key:'thu',label:'Thursday 14 May',cls:'dh-thu',sub:'Viral Vectors · Scaling Up · Smart Chassis · Flash Talks II'},
    {key:'fri',label:'Friday 15 May',cls:'dh-fri',sub:'Metabolic Engineering · Marketplace · Flash Talks III'},
  ];

  for (const day of days) {
    const dayTalks = filteredTalks.filter(t => t.dayKey === day.key);
    if (dayTalks.length === 0) continue;

    const isCollapsed = collapsedDays.has(day.key);
    html += `<div class="day-section">
      <div class="day-header ${day.cls}" onclick="toggleDay('${day.key}',this)">
        <div>
          <h2>${day.label}</h2>
        </div>
        <span class="day-sub">${dayTalks.length} sessions</span>
        <span class="day-toggle ${isCollapsed?'':'open'}">▼</span>
      </div>
      <div class="day-body ${isCollapsed?'collapsed':''}">`;

    // Group by session
    const sessions = [...new Set(dayTalks.map(t => t.session))];
    for (const session of sessions) {
      const sessionTalks = dayTalks.filter(t => t.session === session);
      html += `<div class="session-group"><div class="session-label">${session}</div>`;
      for (const t of sessionTalks) {
        html += buildTalkCard(t);
      }
      html += '</div>';
    }
    html += '</div></div>';
  }

  // Posters section
  if (filteredPosters.length > 0 && (activeFilter === 'all' || activeFilter === 'poster')) {
    const isPosterCollapsed = collapsedDays.has('poster');
    html += `<div class="day-section">
      <div class="day-header dh-poster" onclick="toggleDay('poster',this)">
        <div><h2>Poster Sessions</h2></div>
        <span class="day-sub">Wed 18:00 & Thu 18:40 · ${filteredPosters.length} posters</span>
        <span class="day-toggle ${isPosterCollapsed?'':'open'}">▼</span>
      </div>
      <div class="day-body ${isPosterCollapsed?'collapsed':''}">
        <div class="session-group">
          <div class="session-label">All posters — click to view abstract</div>
          <div class="poster-grid">`;

    for (const p of filteredPosters) {
      const inA = myAgenda.has(p.id);
      html += `<div class="poster-card ${inA?'in-agenda':''}" onclick="togglePoster('${p.id}')">
        <div class="poster-num">${p.num}</div>
        <div class="poster-title">${p.title}</div>
        <div class="poster-author">${p.speaker}${p.affil?' · '+p.affil:''}</div>
        <div class="poster-topic">${p.topic}</div>
      </div>`;
    }
    html += '</div></div></div></div>';
  }

  content.innerHTML = html;

  // Re-expand previously expanded cards
  for (const id of expandedCards) {
    const detail = document.getElementById('d_'+id);
    const card = document.getElementById('c_'+id);
    if (detail) detail.classList.add('open');
    if (card) card.classList.add('expanded');
  }
}

function buildTalkCard(t) {
  const inA = myAgenda.has(t.id);
  const isExp = expandedCards.has(t.id);
  const badgeCls = {keynote:'bk',oral:'bo',flash:'bf',poster:'bp'}[t.type]||'bo';
  const badgeLabel = t.type.charAt(0).toUpperCase() + t.type.slice(1);
  return `<div class="talk-card ${inA?'in-agenda':''} ${isExp?'expanded':''}" id="c_${t.id}">
    <div class="talk-header" onclick="toggleCard('${t.id}')">
      <div class="talk-time">${t.time}</div>
      <div class="talk-content">
        <div class="talk-title">${t.title}</div>
        <div class="talk-speaker">${t.speaker}${t.affil?' <em>· '+t.affil+'</em>':''}</div>
      </div>
      <div class="talk-right">
        <span class="badge ${badgeCls}">${badgeLabel}</span>
        <button class="add-btn ${inA?'added':''}" title="${inA?'Remove from agenda':'Add to agenda'}"
          onclick="event.stopPropagation();toggleAgenda('${t.id}')">${inA?'★':'☆'}</button>
      </div>
    </div>
    <div class="talk-detail ${isExp?'open':''}" id="d_${t.id}">
      <div class="detail-inner">
        <div class="detail-topic">${t.topic}</div>
        <p class="detail-abstract">${t.abstract}</p>
        ${t.affil?'<p class="detail-affil">'+t.affil+'</p>':''}
        <div class="detail-actions">
          <button class="action-link ${inA?'primary':''}" onclick="toggleAgenda('${t.id}')">
            ${inA?'★ In my agenda':'☆ Add to agenda'}
          </button>
        </div>
      </div>
    </div>
  </div>`;
}

function toggleCard(id) {
  if (expandedCards.has(id)) {
    expandedCards.delete(id);
  } else {
    expandedCards.add(id);
  }
  const detail = document.getElementById('d_'+id);
  const card = document.getElementById('c_'+id);
  if (detail) detail.classList.toggle('open');
  if (card) card.classList.toggle('expanded');
}

function toggleAgenda(id) {
  if (myAgenda.has(id)) {
    myAgenda.delete(id);
  } else {
    myAgenda.add(id);
  }
  updateAgendaCount();
  render();
}

function togglePoster(id) {
  if (myAgenda.has(id)) myAgenda.delete(id);
  else myAgenda.add(id);
  updateAgendaCount();
  render();
}

function toggleDay(key, el) {
  if (collapsedDays.has(key)) {
    collapsedDays.delete(key);
  } else {
    collapsedDays.add(key);
  }
  render();
}

function updateAgendaCount() {
  const cnt = myAgenda.size;
  const el = document.getElementById('agenda-count');
  if (cnt > 0) {
    el.textContent = cnt;
    el.classList.remove('hidden');
  } else {
    el.classList.add('hidden');
  }
}

function openAgenda() {
  document.getElementById('agenda-overlay').classList.add('open');
  renderAgendaPanel();
}

function closeAgenda() {
  document.getElementById('agenda-overlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('agenda-overlay')) closeAgenda();
}

function renderAgendaPanel() {
  const ac = document.getElementById('agenda-content');
  if (myAgenda.size === 0) {
    ac.innerHTML = '<div class="agenda-empty">No talks saved yet.<br>Click ☆ on any talk to add it to your agenda.</div>';
    return;
  }

  const allItems = [...TALKS, ...POSTERS];
  const saved = allItems.filter(t => myAgenda.has(t.id));

  // Group by day
  const dayOrder = ['Wednesday 13 May','Thursday 14 May','Friday 15 May'];
  const grouped = {};
  for (const t of saved) {
    const d = t.day || 'Poster Sessions';
    if (!grouped[d]) grouped[d] = [];
    grouped[d].push(t);
  }

  let html = '';
  const allDays = [...new Set([...dayOrder, ...Object.keys(grouped)])];
  for (const day of allDays) {
    if (!grouped[day]) continue;
    html += `<div class="agenda-day-label">${day}</div>`;
    for (const t of grouped[day]) {
      html += `<div class="agenda-item">
        <div>
          <div class="agenda-item-time">${t.time||t.num||''}</div>
          <div class="agenda-item-title">${t.title}</div>
          <div class="agenda-item-speaker">${t.speaker}</div>
        </div>
        <button class="remove-btn" title="Remove" onclick="toggleAgenda('${t.id}');renderAgendaPanel()">×</button>
      </div>`;
    }
  }

  html += `<button class="export-btn" onclick="exportAgenda()">Download my agenda (.txt)</button>`;
  ac.innerHTML = html;
}

function exportAgenda() {
  const allItems = [...TALKS, ...POSTERS];
  const saved = allItems.filter(t => myAgenda.has(t.id));
  let txt = 'MY ISPMF 2026 AGENDA\n';
  txt += '13–15 May 2026 · UPV Valencia\n';
  txt += '='.repeat(50) + '\n\n';
  const grouped = {};
  for (const t of saved) {
    const d = t.day || 'Poster Sessions';
    if (!grouped[d]) grouped[d] = [];
    grouped[d].push(t);
  }
  for (const [day, items] of Object.entries(grouped)) {
    txt += day.toUpperCase() + '\n' + '-'.repeat(30) + '\n';
    for (const t of items) {
      txt += `${t.time||t.num||''} | [${(t.type||'poster').toUpperCase()}] ${t.title}\n`;
      txt += `  ${t.speaker}${t.affil?' ('+t.affil+')':''}\n\n`;
    }
  }
  const blob = new Blob([txt], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ISPMF2026_My_Agenda.txt';
  a.click();
}

function updateStats(filtered) {
  const counts = {};
  for (const t of filtered) {
    const type = t.num ? 'poster' : t.type;
    counts[type] = (counts[type]||0) + 1;
  }
  const bar = document.getElementById('stats-bar');
  const parts = [
    `<div class="stat-pill">Showing <b>${filtered.length}</b></div>`,
    counts.keynote ? `<div class="stat-pill">Keynotes <b>${counts.keynote}</b></div>` : '',
    counts.oral ? `<div class="stat-pill">Oral <b>${counts.oral}</b></div>` : '',
    counts.flash ? `<div class="stat-pill">Flash <b>${counts.flash}</b></div>` : '',
    counts.poster ? `<div class="stat-pill">Posters <b>${counts.poster}</b></div>` : '',
  ];
  bar.innerHTML = parts.join('');
}

// Initial render
render();
</script>
</body>
</html>

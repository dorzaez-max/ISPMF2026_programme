<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Programme · ISPMF 2026 Valencia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root {
  --green-dark: #1B4332;
  --green-mid: #2D6A4F;
  --green-light: #52B788;
  --green-pale: #D8F3DC;
  --orange: #E07A2F;
  --orange-light: #FDF0E4;
  --blue: #457B9D;
  --blue-light: #EAF2F8;
  --purple: #7B5EA7;
  --purple-light: #F0EBF8;
  --coral: #E63946;
  --coral-light: #FDECEE;
  --sand: #F7F4EF;
  --text: #1A1A1A;
  --text-muted: #6B7280;
  --text-light: #9CA3AF;
  --border: #E5E7EB;
  --white: #FFFFFF;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
  --shadow-md: 0 4px 16px rgba(0,0,0,.10);
  --radius: 10px;
  --radius-sm: 6px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--sand);
  color: var(--text);
  line-height: 1.6;
  font-size: 15px;
}

/* ── HERO ── */
.hero {
  background: var(--green-dark);
  padding: 3rem 2rem 2.5rem;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 60% 80% at 80% 50%, rgba(82,183,136,.18) 0%, transparent 70%);
  pointer-events: none;
}
.hero-inner { max-width: 860px; margin: 0 auto; position: relative; }
.hero-eyebrow {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--green-light);
  margin-bottom: .75rem;
}
.hero h1 {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(2rem, 5vw, 3rem);
  color: #fff;
  line-height: 1.15;
  margin-bottom: .5rem;
}
.hero h1 em { font-style: italic; color: var(--green-light); }
.hero-meta {
  display: flex;
  flex-wrap: wrap;
  gap: .5rem 1.5rem;
  margin-top: 1rem;
}
.hero-meta span {
  font-size: 13px;
  color: rgba(255,255,255,.65);
  display: flex;
  align-items: center;
  gap: .35rem;
}
.hero-meta span::before { content: ''; display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--green-light); }

/* ── CONTROLS ── */
.controls-wrap {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-sm);
}
.controls {
  max-width: 860px;
  margin: 0 auto;
  padding: .75rem 1.5rem;
  display: flex;
  flex-wrap: wrap;
  gap: .5rem;
  align-items: center;
}
.search-wrap {
  position: relative;
  flex: 1;
  min-width: 180px;
  max-width: 280px;
}
.search-wrap svg {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-light);
  pointer-events: none;
}
.search-box {
  width: 100%;
  padding: 7px 12px 7px 34px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  background: var(--sand);
  outline: none;
  transition: border-color .2s;
}
.search-box:focus { border-color: var(--green-mid); background: #fff; }
.search-box::placeholder { color: var(--text-light); }

.filter-group { display: flex; gap: 4px; flex-wrap: wrap; }
.f-btn {
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  padding: 5px 13px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all .18s;
  white-space: nowrap;
}
.f-btn:hover { border-color: var(--green-mid); color: var(--green-mid); }
.f-btn.active { color: #fff; border-color: transparent; }
.f-btn.fa.active { background: var(--green-mid); }
.f-btn.fk.active { background: var(--orange); }
.f-btn.fo.active { background: var(--blue); }
.f-btn.ff.active { background: var(--purple); }
.f-btn.fp.active { background: var(--green-mid); }

.agenda-btn {
  margin-left: auto;
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  padding: 5px 14px;
  border-radius: 20px;
  border: 1.5px solid var(--green-mid);
  background: transparent;
  color: var(--green-mid);
  cursor: pointer;
  transition: all .18s;
  display: flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
}
.agenda-btn:hover { background: var(--green-mid); color: #fff; }
.agenda-count {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--orange);
  color: #fff;
  font-size: 10px;
  font-weight: 500;
}
.agenda-count.hidden { display: none; }

/* ── STATS BAR ── */
.stats-bar {
  max-width: 860px;
  margin: 1rem auto 0;
  padding: 0 1.5rem;
  display: flex;
  gap: .5rem;
  flex-wrap: wrap;
}
.stat-pill {
  font-size: 12px;
  padding: 3px 11px;
  border-radius: 12px;
  background: var(--white);
  border: 1px solid var(--border);
  color: var(--text-muted);
}
.stat-pill b { color: var(--text); font-weight: 500; }

/* ── MAIN CONTENT ── */
.content { max-width: 860px; margin: 0 auto; padding: 1.25rem 1.5rem 3rem; }

/* ── DAY SECTION ── */
.day-section { margin-bottom: 2rem; }
.day-header {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1rem;
  padding: .9rem 1.25rem;
  border-radius: var(--radius);
  cursor: pointer;
  user-select: none;
  transition: opacity .2s;
}
.day-header:hover { opacity: .92; }
.day-header h2 {
  font-family: 'DM Serif Display', serif;
  font-size: 1.35rem;
  color: #fff;
  font-weight: 400;
}
.day-header .day-sub { font-size: 12px; color: rgba(255,255,255,.6); margin-left: auto; margin-right: .5rem; }
.day-toggle { color: rgba(255,255,255,.7); font-size: 11px; transition: transform .2s; }
.day-toggle.open { transform: rotate(180deg); }
.dh-wed { background: linear-gradient(135deg, var(--green-dark), #2D6A4F); }
.dh-thu { background: linear-gradient(135deg, #0D3B2E, #155236); }
.dh-fri { background: linear-gradient(135deg, #9B4E1A, var(--orange)); }
.dh-poster { background: linear-gradient(135deg, #3B6978, #457B9D); }

.day-body { display: block; }
.day-body.collapsed { display: none; }

/* ── SESSION GROUP ── */
.session-group { margin-bottom: 1.25rem; }
.session-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .09em;
  text-transform: uppercase;
  color: var(--text-light);
  padding: 0 2px 6px;
  margin-bottom: 2px;
  border-bottom: 1px solid var(--border);
}

/* ── TALK CARD ── */
.talk-card {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 6px;
  overflow: hidden;
  transition: border-color .18s, box-shadow .18s;
  cursor: pointer;
}
.talk-card:hover { border-color: #C7D9CC; box-shadow: var(--shadow-sm); }
.talk-card.expanded { border-color: var(--green-mid); box-shadow: var(--shadow-md); }
.talk-card.in-agenda { border-left: 3px solid var(--orange); }

.talk-header {
  display: grid;
  grid-template-columns: 72px 1fr auto;
  align-items: start;
  gap: 12px;
  padding: 11px 14px;
}
.talk-time {
  font-size: 11.5px;
  color: var(--text-muted);
  padding-top: 2px;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}
.talk-content {}
.talk-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.4;
  margin-bottom: 3px;
}
.talk-speaker {
  font-size: 12.5px;
  color: var(--text-muted);
}
.talk-speaker em { font-style: normal; color: var(--text-light); }
.talk-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }

.badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 500;
  padding: 2px 9px;
  border-radius: 10px;
  white-space: nowrap;
  letter-spacing: .02em;
}
.bk { background: var(--orange-light); color: #9B4E1A; }
.bo { background: var(--blue-light); color: #1E5C7E; }
.bf { background: var(--purple-light); color: #5A3D8A; }
.bp { background: var(--green-pale); color: var(--green-dark); }

.add-btn {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-light);
  font-size: 16px;
  line-height: 1;
  transition: all .18s;
  font-family: 'DM Sans', sans-serif;
  flex-shrink: 0;
}
.add-btn:hover { border-color: var(--orange); color: var(--orange); background: var(--orange-light); }
.add-btn.added { border-color: var(--orange); background: var(--orange); color: #fff; }

/* ── DETAIL PANEL ── */
.talk-detail {
  display: none;
  padding: 0 14px 14px;
  border-top: 1px solid var(--border);
  margin-top: 0;
}
.talk-detail.open { display: block; }
.detail-inner { padding-top: 12px; }
.detail-topic {
  display: inline-block;
  font-size: 10.5px;
  padding: 2px 10px;
  border-radius: 10px;
  background: var(--sand);
  color: var(--text-muted);
  margin-bottom: 8px;
  font-weight: 500;
  letter-spacing: .03em;
}
.detail-abstract {
  font-size: 13.5px;
  color: #444;
  line-height: 1.75;
  margin-bottom: 8px;
}
.detail-authors {
  font-size: 13px;
  color: var(--text);
  margin-bottom: 8px;
  line-height: 1.5;
}
.detail-affil {
  font-size: 12px;
  color: var(--text-light);
  font-style: italic;
}
.detail-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  flex-wrap: wrap;
}
.action-link {
  font-size: 12px;
  padding: 5px 14px;
  border-radius: 16px;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  transition: all .18s;
}
.action-link:hover { border-color: var(--green-mid); color: var(--green-mid); }
.action-link.primary { background: var(--green-dark); color: #fff; border-color: var(--green-dark); }
.action-link.primary:hover { background: var(--green-mid); border-color: var(--green-mid); }

/* ── NO RESULTS ── */
.no-results {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text-muted);
}
.no-results svg { margin-bottom: 1rem; opacity: .3; }
.no-results p { font-size: 15px; }

/* ── MY AGENDA PANEL ── */
.agenda-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 200;
  align-items: flex-start;
  justify-content: flex-end;
  padding: 0;
}
.agenda-overlay.open { display: flex; }
.agenda-panel {
  background: var(--white);
  width: 100%;
  max-width: 420px;
  height: 100vh;
  overflow-y: auto;
  box-shadow: -4px 0 32px rgba(0,0,0,.15);
  display: flex;
  flex-direction: column;
}
.agenda-panel-header {
  padding: 1.25rem 1.5rem 1rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: var(--white);
  z-index: 1;
}
.agenda-panel-header h3 {
  font-family: 'DM Serif Display', serif;
  font-size: 1.25rem;
  font-weight: 400;
}
.close-btn {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: transparent;
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  transition: all .18s;
  font-family: 'DM Sans', sans-serif;
}
.close-btn:hover { background: var(--sand); }
.agenda-content { padding: 1rem 1.5rem; flex: 1; }
.agenda-empty {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text-muted);
  font-size: 14px;
}
.agenda-item {
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
  align-items: start;
}
.agenda-item-time { font-size: 11px; color: var(--text-light); margin-bottom: 2px; }
.agenda-item-title { font-size: 13px; font-weight: 500; line-height: 1.4; }
.agenda-item-speaker { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.remove-btn {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: transparent;
  cursor: pointer;
  font-size: 13px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-light);
  transition: all .18s;
  font-family: 'DM Sans', sans-serif;
  flex-shrink: 0;
  margin-top: 2px;
}
.remove-btn:hover { background: var(--coral-light); color: var(--coral); border-color: var(--coral); }
.agenda-day-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text-light);
  padding: 12px 0 4px;
}
.export-btn {
  display: block;
  width: 100%;
  margin-top: 1.5rem;
  padding: 10px;
  background: var(--green-dark);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background .18s;
  text-align: center;
}
.export-btn:hover { background: var(--green-mid); }

/* ── POSTER GRID ── */
.poster-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 8px;
}
.poster-card {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  cursor: pointer;
  transition: border-color .18s, box-shadow .18s;
}
.poster-card:hover { border-color: var(--green-mid); box-shadow: var(--shadow-sm); }
.poster-card.in-agenda { border-left: 3px solid var(--orange); }
.poster-num {
  font-size: 10px;
  font-weight: 500;
  color: var(--green-mid);
  letter-spacing: .05em;
  margin-bottom: 4px;
}
.poster-title { font-size: 13px; font-weight: 500; line-height: 1.4; color: var(--text); margin-bottom: 4px; }
.poster-author { font-size: 12px; color: var(--text-muted); }
.poster-topic { font-size: 10px; color: var(--text-light); margin-top: 5px; font-style: italic; }

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  .hero { padding: 2rem 1rem 1.75rem; }
  .controls { padding: .6rem 1rem; }
  .content { padding: 1rem 1rem 2.5rem; }
  .talk-header { grid-template-columns: 60px 1fr auto; gap: 8px; }
  .poster-grid { grid-template-columns: 1fr; }
  .agenda-panel { max-width: 100%; }
}

/* ── ANIMATIONS ── */
@keyframes slideIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.talk-card { animation: slideIn .25s ease both; }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-inner">
    <p class="hero-eyebrow">ISPMF 2026 · Valencia</p>
    <h1>Conference <em>Programme</em></h1>
    <div class="hero-meta">
      <span>13–15 May 2026</span>
      <span>Universitat Politècnica de València</span>
      <span>Valencia, Spain</span>
    </div>
  </div>
</div>

<div class="controls-wrap">
  <div class="controls">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-box" type="text" id="search" placeholder="Search speaker or title…" oninput="render()">
    </div>
    <div class="filter-group">
      <button class="f-btn fa active" onclick="setFilter('all',this)">All</button>
      <button class="f-btn fk" onclick="setFilter('keynote',this)">Keynotes</button>
      <button class="f-btn fo" onclick="setFilter('oral',this)">Oral</button>
      <button class="f-btn ff" onclick="setFilter('flash',this)">Flash</button>
      <button class="f-btn fp" onclick="setFilter('poster',this)">Posters</button>
    </div>
    <button class="agenda-btn" onclick="openAgenda()">
      ☆ My agenda
      <span class="agenda-count hidden" id="agenda-count">0</span>
    </button>
  </div>
</div>

<div class="stats-bar" id="stats-bar"></div>

<div class="content" id="content"></div>

<!-- MY AGENDA PANEL -->
<div class="agenda-overlay" id="agenda-overlay" onclick="handleOverlayClick(event)">
  <div class="agenda-panel">
    <div class="agenda-panel-header">
      <h3>My Agenda</h3>
      <button class="close-btn" onclick="closeAgenda()">×</button>
    </div>
    <div class="agenda-content" id="agenda-content"></div>
  </div>
</div>

<script>
const TALKS = [
  // WEDNESDAY
  {id:'k1',code:'K-01',day:'Wednesday 13 May',dayKey:'wed',session:'Keynote — Opening',type:'keynote',time:'10:00–10:45',speaker:'Julian Ma',authors:'Sutinee Soopairin*, Mathew Paul**, Suthira Taychakhoonavudh* and Julian Ma**',affil:'* Department of Social and Administrative Pharmacy, Faculty of Pharmaceutical Sciences, Chulalongkorn University, Bangkok, Thailand. ** Institute for Infection and Immunity, School of Health and Medical Sciences, City St. George\'s University of London, London, UK',title:'Plant Molecular Farming - a 360° review',topic:'Plant-Made Biologics',abstract:'Plant molecular farming (PMF) has been a promising manufacturing platform for over three decades, but has yet to make a significant commercial breakthrough. The closure of large and important PMF companies in recent years was a major blow to confidence and interest in plant manufacturing technologies, leaving PMF in a potentially existential crisis. The purpose of this study was to assess attitudes towards PMF around the world, from within and without the field and to identify common themes to inform a forward strategy for PMF. To this end, we have conducted two interview studies. The first was conducted using detailed semi-structured interviews with 63 people involved in recombinant protein production, including senior academics, early career researchers, CEO/CSOs from PMF companies, representatives from the mainstream pharmaceutical industry, government, major funders and private investors. In order to include the public voice, the second study involved shorter semi-structured interviews with 48 members of the public. Data was analyzed using framework analysis to identify perceived advantages of PMF, major concerns, and regional differences in the way forward to PMF success. This talk will discuss the key findings, highlighting areas where there are fundamental differences in opinions between different stakeholders, such as the key advantages of plant manufacturing platforms, selection of target products and potential contribution to global health. The talk will also address issues around general awareness and understanding of PMF and future recruitment of young scientists to the field. The future of PMF will require not only addressing barriers but also strengthening collaboration, improving communication, and demonstrating credible success stories to build global interest and confidence toward PMF. The ISPMF community is invited to participate in this ongoing work, providing mutual support to develop a strategy for the future of PMF, to formulate a strategic action plan, and become involved in implementing that plan.'},
  {id:'o1',code:'O-01',day:'Wednesday 13 May',dayKey:'wed',session:'Oral — Plant-Made Biologics',type:'oral',time:'11:45–12:05',speaker:'Pasquale Creanza',authors:'P. Creanza* (1), M. Osnato (1), E. Maricchiolo (1), S. Scataglini (1), F. De Marchis (2), M. Bellucci (2), A. Aluigi (1), G. Beihammer (3), J. Schwestka (3), E. Kapusi (3), E. Arcalis (3), E. Stöger (3) and A. Pompa (1).',affil:'(1)	Department of Biomolecular Sciences, University of Urbino Carlo Bo, Urbino (PU), Italy (2)	Institute of Biosciences and Bioresources, Division of Perugia, National Research Council, Perugia, Italy  (3)	Department of Biotechnology and Food Science, University of Natural Resources and Life Sciences, Vienna, Austria',title:'A Novel Eco-Friendly Biopolymer from Phaseolin',topic:'Plant-Made Biologics',abstract:'Petroleum-based materials remain a primary source of global pollution, driving the scientific community to develop sustainable, eco-friendly bioplastics. This study proposes an innovative strategy to partially replace conventional plastics using phaseolin (P), an edible vacuolar protein that constitutes 50% of the protein content in common bean seeds. Naturally, phaseolin forms homotrimers but cannot assemble into extended polymers. To overcome this, we genetically modified its coding sequence by introducing a cysteine codon at the C-terminal tail (P*). This modification enables the formation of intermolecular disulfide bridges, facilitating the assembly of P* units into long polymeric chains. The P*$ gene was introduced into the N. tabacum plastidial genome via biolistic transformation. Plasticization tests of the resulting protein confirmed the formation of resilient, thin biopolymer films. The engineered P* was further modified by inserting additional CYS to produce a biopolymer that could increase polymer size. To compare with the nuclear transformation, a different strategy stategy was tested, such as adding the KDEL peptide to increase the P* retention inside the endoplasmic reticulum (ER) , which facilitates the production of the disulfide bridges thanks to its oxidizing environment. Future applications of this new biopolymer are expected across different sectors, ranging from packaging for the food industry to the biomedical sector as a carrier of protein-based drugs.'},
  {id:'o2',code:'O-02',day:'Wednesday 13 May',dayKey:'wed',session:'Oral — Plant-Made Biologics',type:'oral',time:'12:05–12:25',speaker:'Yvonne Rosenberg',authors:'YJ Rosenberg*(1), S Permar (2), L Haigwood (3), ME Ackerman (4), K Van Rompay (5).',affil:'(1) PlantVax Inc., Rockville, MD 20850, USA (2) Department of Pediatrics, Weill Cornell Medicine, New York, NY, 10065 USA   (3) Oregon National Primate Research Center, Oregon Health and Science        University,  OR, 97006, USA (4) Thayer School of Engineering, Dartmouth College, Hanover, NH 03755, USA (5) California National Primate Research Center, University of California, Davis, CA, 95616, USA',title:'The use of plant-derived cancer immunotherapics to provide treatments for pregnant women, while avoiding fetal and neonatal harm',topic:'Plant-Made Biologics',abstract:'Recent PlantVax studies comparing transfer efficiency of plant-derived HIV-specific mAbs and their high (FcRn) affinity YTE and LS-mutants with mammalian counterparts following passive SC infusion into macaque dams close to parturition, demonstrated that while plant- and mammalian-derived Abs exhibited comparable efficiency across the yolk sac in mice, plant-derived Abs were unable to cross macaque placentas. This defect was closely associated with altered Fc glycan expression of plant-derived Abs and poor FcR binding and triggering, suggesting a second FcR receptor is required for maternal-fetal IgG transfer of across three-layer primate placentas and the use of plant-derived Abs as a means of providing cytotoxic treatments for woman during pregnancy, while avoiding fetal harm. Accordingly, highly successful anti-cancer mAb treatments, Rituximab, Trastuzumab and Cetuximab for B cell lymphomas, breast cancer and rectal cancer respectively, were produced in plants and administered to pregnant macaque dams prior to delivery. As predicted, pharmacokinetics showed high mAb levels in dams with no transfer of mAbs to babies. In addition, B lymphocytes were absent in dams but present in variable but normal levels in newborns. These results indicate a potential role for plant-derived immunotherapeutics in preventing side effects in babies; including known B cell depletion in infants following Rituximab and respiratory complications in babies born of Trastuzumab treated mothers'},
  {id:'o3',code:'O-03',day:'Wednesday 13 May',dayKey:'wed',session:'Oral — Plant-Made Biologics',type:'oral',time:'12:25–12:45',speaker:'Geartsje Bakker',authors:'GM Bakker*, A. Schots, and RHP Wilbers',affil:'LABORATORY OF NEMATOLOGY, WAGENINGEN UNIVERSITY & RESEARCH, THE NETHERLANDS',title:'FROM LEAF TO LIFESAVER: Nicotiana benthamiana as a highly versatile platform for glycoprotein-based vaccines against parasitic worms',topic:'Plant-Made Biologics',abstract:'Infections with the parasitic worms Schistosomes and hookworms have tremendous impact on human health. Vaccines could provide a sustainable control strategy but are not available to date. Current vaccine research is mainly hampered by antigen selection and recombinant antigen production with appropriate post-translational modifications, like glycosylation. Recently controlled human infection studies were exploited to select new antigens, which we produced in our Nicotiana benthamiana expression platform. The versatility of this platform allowed us to quickly screen a range of antigens for both parasites. After selecting proteins that were highly expressed and secreted into the apoplast, we focused on their glycan composition. We produced these glycoproteins with defined N-glycans found on secreted parasite proteins from different life-stages. To do this, we (1) developed a CRISPR workflow that allows us to efficiently knock-out undesired plant glycosyltransferases or glycosidases and (2) co-expressed exogeneous glycan-modifying enzymes with our vaccine antigens. Using our platform we were able to produce Schistosoma mansoni Cathepsin B1, with a variety of N-glycans. These plant-produced Cathepsin B1 variants are used to study how different N-glycans contribute to antigen recognition and protective immunity and are even investigated in a vaccination challenge model. These studies showcase how plants can fuel research towards novel anti-parasite vaccines.'},
  {id:'o4',code:'O-04',day:'Wednesday 13 May',dayKey:'wed',session:'Oral — Plant-Made Biologics',type:'oral',time:'12:45–13:05',speaker:'Andreas Fradinger',authors:'A Fradinger*(1,2), MS Epping (3), A Grünberger (3), E Stöger (2), JF Buyel (1)',affil:'(1) BOKU University, Department of Biotechnology and Food Science, Institute of Bioprocess Science and Engineering, Muthgasse 18, 1190 Vienna, Austria (2) BOKU University, Department of Biotechnology and Food Science, Institute of Plant Biotechnology and Cell Biology, Muthgasse 18, 1190 Vienna, Austria (3) Karlsruhe Institute of Technology, Microsystems in Bioprocess Engineering, Institute of Process Engineering in Life Sciences, 76131 Karlsruhe, Germany',title:'Plants-on-a-chip: microfluidics-based real-time tracking of protein body formation in plant cells',topic:'Plant-Made Biologics',abstract:'Zein protein bodies are specialised storage organelles naturally occurring in maize seeds. Due to their high chemical resistance and immunostimulatory properties, they represent promising vehicles for oral vaccine delivery. This application is further promoted by their distinct multi-layered structure, which enables the in vivo bio-encapsulation of therapeutic proteins. Despite the successful ectopic formation of multi-layered protein bodies in leaf tissue of Nicotiana benthamiana , the mechanisms underlying their assembly remain poorly understood. Current models based on static immunolocalization studies suggest a sequential assembly of different zeins in this process, however a time-resolved analysis is still missing. Here, we report in situ protein body biogenesis in real-time. In our approach Nicotiana tabacum BY-2 cells are utilised for transient transformation with fluorescently labelled zein genes via the plant cell pack platform. The cells are subsequently loaded into a microfluidic chip for continuous cultivation. This setup allows the in vivo monitoring via fluorescence microscopy, providing insights into the spatiotemporal dynamics of protein body assembly. This unprecedented view can be important for the assessment and expansion of existing models on protein body formation. The technology has further application potential to assess, for example, the growth of plant cells lines in different media conditions and cultivation optimization.'},
  {id:'o5',code:'O-05',day:'Wednesday 13 May',dayKey:'wed',session:'Oral — Plant-Made Biologics',type:'oral',time:'13:05–13:25',speaker:'Nobuyuki Matoba',authors:'KL Mayer (1) and N Matoba (1, 2, 3)',affil:'(1) Department of Pharmacology and Toxicology, University of Louisville School of Medicine (2) UofL Health – Brown Cancer Center, University of Louisville School of Medicine (3) Center for Predictive Medicine, University of Louisville School of Medicine',title:'A plant-produced FcR-agonistic lectibody targeting high-mannose glycans for cancer immunotherapy',topic:'Plant-Made Biologics',abstract:'Glycans are critical regulators of disease pathogenesis and immune function, yet they remain largely underexploited as therapeutic targets. N-linked high-mannose (HM) glycans are aberrantly enriched on the surface of malignant cells and enveloped viruses, where they contribute to disease progression and immune evasion. To target this disease-associated glycobiomarker, we developed a “lectibody” composed of the HM-specific lectin Avaren fused to the human IgG1 Fc region (AvFc), produced using a Nicotiana benthamiana transient expression system. We previously showed that AvFc selectively recognizes clustered HM glycans on virus-infected cells and cancer cells, leading to Fcγ receptor engagement and activation of cytotoxic effector functions. In this study, we evaluated the antitumor activity of AvFc in a syngeneic orthotopic ovarian cancer model using the murine ID8 cell line in C57BL/6 mice. AvFc treatment (25 mg/kg, every other day for 15 doses) significantly prolonged median survival. Cytometry by time-of-flight (CyTOF) analysis revealed expansion of total splenic leukocytes and increased CD8+ T cells in the peritoneal fluid, suggesting that AvFc’s antitumor activity is partially mediated by adaptive immune responses. Together, these findings demonstrate the therapeutic potential of a plant-produced lectibody and highlight molecular farming as a viable platform for generating novel Immunotherapeutics.'},
  {id:'o6',code:'O-06',day:'Wednesday 13 May',dayKey:'wed',session:'Oral — Plant-Made Biologics',type:'oral',time:'14:40–15:00',speaker:'Kathrin Göritzer',authors:'Jacqueline Seigner, Gudrun Kücher, Richard Strasser, Kathrin Göritzer',affil:'Department of Biotechnology and Food Science, BOKU University, Vienna',title:'Using in planta glycoengineering to decode mucosal structure–function relationships of human secretory IgA',topic:'Plant-Made Biologics',abstract:'Secretory IgA (SIgA) is a promising modality for mucosal therapeutics owing to its potent pathogen neutralization, anti-inflammatory activity, and stability in secretions. A defining feature of SIgA is its extensive N- and O-glycosylation, yet tissue specific glycan profiles and their functional significance remain incompletely understood. We addressed this gap by profiling site-specific glycosylation on human SIgA from saliva, colostrum, and milk, and used transient expression and glycoengineering in Nicotiana benthamiana to assemble SIgA with tailored, homogeneous glycans. Our toolkit enabled controlled presentation of human relevant motifs, including highly sialylated variants characteristic of colostrum and milk, and Lewis-type arm-fucosylation found in saliva, features not readily accessible in conventional mammalian systems. We further installed defined mucin-type O-glycosylation in plant lines with reduced endogenous O-glycan backgrounds. Across biochemical, biophysical, and cell-based assays, hinge O-glycosylation primarily modulated protease resistance with minimal impact on receptor engagement, while specific N-glycan features shaped commensal binding and stability in saliva and simulated gastric fluid. The ability of established plant platforms to produce high quality SIgA with defined glycosylation provides unprecedented insight into SIgA structure-function relationships and advances its therapeutic potential.'},
  {id:'o7',code:'O-07',day:'Wednesday 13 May',dayKey:'wed',session:'Oral — Plant-Made Biologics',type:'oral',time:'15:00–15:20',speaker:'Doga Selin Kayihan',authors:'DS Kayihan*(1, 3), C Kayihan (2, 3), G Lomonossoff (3)',affil:'Department of Pharmacognosy, Faculty of Pharmacy, Baskent University, Ankara, Turkey (1) Department of Molecular Biology and Genetics, Faculty of Science and Letters, Baskent University, Ankara, Turkey (2) Department of Biochemistry and Metabolism, John Innes Centre, Norwich Research Park, Norwich, UK (3)',title:'Development of a transgene-free edible vaccine model via mobile mRNA fusion',topic:'Plant-Made Biologics',abstract:'Traditional vaccines require qualified healthcare personnel for administration and expensive equipment due to purification procedures, transportation and storage, making access to these vaccines difficult for developing countries. Edible vaccines, besides sharing the advantages of plant-based recombinant vaccines, have further benefits like lack of purification steps, easier administration and increased stability. However, producing edible vaccines via transgenic methods brings limitations such as the risk of transgene escape and low public acceptance. Along the plant vascular system, mRNAs with specific mobility motifs can be transported from source to sink tissues where they are translated. It is well established that some of these mobile mRNAs are also able to pass through the graft junctions. This study aims to combine hetero-grafting technique with mobile mRNA fusion to develop a transgene-free edible vaccine model. For this purpose, three mobile mRNA constructs were generated by fusing GFP with mobility motifs of tRNAmet-deltaDT, Flowering Locus T and gibberellic acid‐insensitive RNA and infiltrated to Nicotiana benthamiana leaves by means of Agrobacterium to investigate their capability of transport and translation in non-infiltrated leaves. The most efficient motif will be fused to SARS-COV-2 RBD and transiently expressed in N. benthamiana grafted with sweet-basil and tomato scions potentially capable of producing antigens free from transgene and Agrobacterium.'},
  {id:'k2',code:'K-02',day:'Wednesday 13 May',dayKey:'wed',session:'Keynote',type:'keynote',time:'15:20–16:05',speaker:'Alfredo Quijano',affil:'Monod Bio',title:'NovoBodies: Next-generation AI-Designed Antibody Mimetics',topic:'Molecular Farming Marketplace',abstract:'Monod Bio\'s NovoBody platform leverages AI-enabled computational protein design to generate novel binding molecules that exploit the binding interfaces of existing antibodies. The result is small, single-chain, highly stable molecules with customizable properties and formats, easy to manufacture in both prokaryotic and eukaryotic systems.'},
  {id:'f1',code:'PF-01',day:'Wednesday 13 May',dayKey:'wed',session:'Flash Talks — Session I',type:'flash',time:'17:30–17:35',speaker:'Janejira Jaratsittisin',authors:'Janejira Jaratsittisin¹, Waranyoo Phoolcharoen¹,²',affil:'¹Department of Pharmacology and Physiology, Faculty of Pharmaceutical Sciences, Chulalongkorn University, Bangkok, Thailand. ²Baiya Phytopharm Co., Ltd., Bangkok, Thailand.',title:'Rapid Production of Broadly Neutralizing Antibodies against Emerging Viral Variants',topic:'Plant-Made Biologics',abstract:'Highly pathogenic avian influenza viruses such as H5N1 and H7N9 continue to pose a serious pandemic threat, emphasizing the need for rapidly deployable and broadly protective strategies. This study shows that Nicotiana benthamiana can serve as a rapid-response platform for producing CR9114, a broadly neutralizing antibody targeting the conserved influenza hemagglutinin stem. Plant-produced CR9114 potently neutralized recently isolated 2023 H5N1 strains in vitro, with IC₅₀ values as low as 0.646 ng/mL, comparable to mammalian-cell–derived antibodies. In contrast, reduced but detectable activity was observed against H7N9, consistent with glycan-mediated steric shielding in Group 2 viruses. Despite limited in vitro neutralization, previous studies demonstrate that CR9114 confers strong in vivo protection through Fc-mediated effector functions. Plant-produced CR9114 displayed a predominantly high-mannose glycosylation profile, which may enhance Fc-dependent immune activity. Overall, this work supports plant molecular pharming as a practical route toward a rapidly deployable intranasal antibody-based intervention for emerging zoonotic influenza threats.'},
  {id:'f2',code:'PF-02',day:'Wednesday 13 May',dayKey:'wed',session:'Flash Talks — Session I',type:'flash',time:'17:35–17:40',speaker:'Seong-ryong Kim',authors:'Yes',affil:'(1) Sogang University, Department of Life Science, Seoul, Republic of Korea  (2) PhytoMab, Co. Ltd. R&D Centre, Seoul, Republic of Korea  (3) Sogang University, Department of Chemistry, Seoul, Republic of Korea  (4) Seoul National University, Department of Nuclear Medicine, Seoul, Republic of Korea  (5% University of London, Department of Molecular Immunology, London, UK  (6) National Cancer Center Korea, Goyang- si, Republic of Korea  (7) University of California, Department of Nanoengineering, San Diego, USA  (8) Seoul National University, Department of Pharmaceuticals, Seoul, Republic of Korea  (9) Seoul National University, Department of Biological Science, Seoul, Republic of Korea  (10) Seoul National University, Department of Veterinary Medicine, Seoul, Republic of Korea  (11) Hallym University, Department of Life Science, Chuncheon, Republic of Korea (12) Osong Medical Innovation Foundation (KBio), Osong, South Korea',title:'Hergreen as NF-engager: Bispecific antibody for enhanced cancer immunotherapy',topic:'Plant-Made Biologics',abstract:'More than three decades have passed since Hiatt et al. first reported the production of IgG in plants. Although many researchers have attempted to develop monoclonal antibody (mAb) biologics in various plant species, none have yet received FDA or USDA approval for market release. Limitations of plant-based biologics have been identified not only in quantitative terms but also in qualitative aspects. In the case of trastuzumab, we found that near-complete glycoengineering of plant-specific N-glycosylation enhanced the efficacy of the mAb and even resulted in novel biodistribution patterns in a xenografted mouse model. Furthermore, when Hergreen® was combined with the in-situ vaccine CPMV virus-like particle (VLP), the survival rate of a syngeneic mouse model reached 100%, suggesting the potential of PhytoRice®-expressed mAbs. Using this platform, we further glycoengineered mAbs with human 1,4-galactosyltransferase, as well as other mAbs such as immune checkpoint inhibitors and Hergreenpet. Based on the promising effects of PhytoRice®, we proceeded to develop Hergreen as NF-engager, Bispecific antibody, and an antibody-drug conjugate (ADC). Hergreen-ADC is being compared its efficacy with Kadcyla and Enhertu. The results of these studies will be discussed at the meeting.'},
  {id:'f3',code:'PF-03',day:'Wednesday 13 May',dayKey:'wed',session:'Flash Talks — Session I',type:'flash',time:'17:40–17:45',speaker:'Marco Costantini',authors:'M Costantini*(1), JWP Hayes (2), C Marusic (1), M Catellani (1), L Fraile (3), P Curto (3), SP Graham (2), ME Villani (1), C Lico (1), C Capodicasa (1), S Baschieri (1), M Donini (1)',affil:'(1) ENEA Research Centre - Department of Green Biotechnologies, (2) The Pirbright Institute, (3) University of Lleida - Department of Animal Production',title:'Safety and pharmacokinetic study of a plant-produced therapeutic protein',topic:'Plant-Made Biologics',abstract:'Nipah virus (NiV) is a highly infectious zoonotic RNA virus that infects pigs and causes acute encephalitis in humans. Passive immunization with neutralising monoclonal antibodies targeting viral envelope glycoproteins has been shown to be an effective therapeutic strategy. A novel neutralising IgG1 antibody (mAb A2), specific for the attachment glycoprotein G (gpG), was isolated from NiV-vaccinated pigs and represents a promising therapeutic candidate. mAb A2 was transiently expressed in ∆XF Nicotiana benthamiana plants by agroinfiltration and purified by protein A–based magnetic beads affinity chromatography, yielding approximately 50 mg/kg fresh weight. Pseudovirus-based neutralisation assays showed that the plant-produced antibody displayed neutralising activity comparable to that of a HEK293T-produced counterpart. Surface plasmon resonance analysis revealed a high gpG-binding affinity in the picomolar range. In addition, the plant-derived antibody exhibited enhanced binding to porcine FcγRIIIa compared to the mammalian-produced version. Pharmacokinetics and biosafety were evaluated in pigs following single intravenous administration at 1 mg/kg and 2.5 mg/kg. Circulating antibody levels remained stable until day 14 and declined linearly by day 28, and no adverse effects were observed. Neutralisation assays on sera are ongoing. Overall, these results highlight the potential of plant-derived mAb A2 as a safe and effective therapeutic candidate against NiV.'},
  {id:'f4',code:'PF-04',day:'Wednesday 13 May',dayKey:'wed',session:'Flash Talks — Session I',type:'flash',time:'17:45–17:50',speaker:'Audrey Teh',authors:'Zack Croxford (1), Anya Choudhury (1)*, Johannes Stadlmann (2), Julian K-C. Ma (1), Ferran Valderrama (1), Sophia N. Karagiannis (3), Mark Bodman-Smith (1) and Audrey Y-H. Teh(1), (4)',affil:'(1) City St. George’s, University of London, London, UK (2) University of Natural Resources and Life Sciences, Vienna (BOKU), Vienna, Austria (3) King’s College London, London, UK (4) University of Malaya, Kuala Lumpur, Malaysia, University of London',title:'Plant-based expression and engineering of Fc-fusion proteins for enhanced therapeutic profiles',topic:'Plant-Made Biologics',abstract:'Immune checkpoint inhibitors (ICIs) have transformed cancer treatment but remain inaccessible to many patients in low- and middle-income countries. Transient expression in Nicotiana benthamiana offers a rapid, flexible and easily scalable alternative to mammalian systems while enabling antibody engineering at the levels of glycosylation, Fc function, and molecular architecture.; Here, Fc-engineered monoclonal and bispecific ICIs were produced in wild-type and glycoengineered plants. IgG1 Fc variants containing silencing mutations demonstrated improved accumulation, assembly, and thermostability compared to IgG4P scaffolds. Fcγ receptor binding was abolished while FcRn and target binding were preserved, confirming successful Fc silencing without loss of functional integrity.; A scFv-Fc bispecific antibody targeting NKG2A and PD-1 was also transiently expressed. The molecule showed efficient heterodimerisation and simultaneous dual-target binding, with optimal assembly achieved through single-vector co-expression of both monomers.; These findings position Plant Molecular Farming as an integrated antibody engineering platform capable of producing functionally advanced, affordable immunotherapies and support its potential for decentralised biologics manufacturing and improved global access.'},
  {id:'f5',code:'PF-05',day:'Wednesday 13 May',dayKey:'wed',session:'Flash Talks — Session I',type:'flash',time:'17:50–17:55',speaker:'Réka Kereszty',authors:'R Kereszty* (1), E Arcalis (1), E Stöger (1)',affil:'(1) BOKU University, Institute of Plant Biotechnology and Cell Biology, Department of Biotechnology and Food Science, Muthgasse 11/I, 1190 Vienna, Austria',title:'Optimizing the assembly and accumulation of secretory IgA (SIgA) in plants',topic:'Plant-Made Biologics',abstract:'The plant cellular machinery is well suited for the expression and assembly of SIgAs, but the overall yield and the proportion of fully assembled protein still vary. Expanding the physical dimensions of the ER generally supports a high protein production rate. This was confirmed in  N. benthamiana by CRISPR/Cas-mediated enhancement of phosphatidylcholine biosynthesis, which resulted in a higher yield of fully assembled and functional SIgA in the mutant plant lines (Göritzer et al., 2025).; To find out whether and in which way the luminal volume and morphology of the ER influence interactions between antibody components and ER-resident host factors, we have started to establish MS-based identification of interacting cellular machinery, enabling a direct comparison between wild-type and mutant plants. This will help us identify host proteins as candidates for simultaneous overexpression alongside recombinant proteins, aiming to equip the enlarged ER for optimal function. ; In a complementary approach, we are investigating whether reprogramming the lytic vacuole can enhance overall SIgA yield. Although SIgA is primarily targeted for secretion, previous studies have indicated that a fraction is frequently mis-targeted to the lytic vacuole (LV), where it undergoes degradation. Since the extent of this mis-targeting is currently unknown, we are investigating whether reprogramming the LV can improve overall SIgA yield.'},
  {id:'f6',code:'PF-06',day:'Wednesday 13 May',dayKey:'wed',session:'Flash Talks — Session I',type:'flash',time:'17:55–18:00',speaker:'Shanice Taylor',authors:'Shanice I. Taylor* (1, 2), Alison A. McCormick (1), Somen Nandi (1, 2), Karen A. McDonald (1, 2)',affil:'(1) Department of Chemical Engineering, University of California, Davis, CA, United States, (2) Center for the Utilization of Biological Engineering in Space, Berkeley, CA, United States',title:'Multigenerational Expression of a Parathyroid Hormone-Fc Biologic in Transgenic Lettuce for Osteopenia Treatment',topic:'Plant-Made Biologics',abstract:'Osteopenia results from impaired bone remodeling that lowers bone density and increases fracture risk, particularly in aging populations and individuals exposed to microgravity. The biologically active region of the parathyroid hormone, PTH[1–34], is clinically approved for osteoporosis treatment. To extend its short circulating half-life, PTH was genetically fused to the fragment crystallizable (Fc) region of human IgG1 (PTH Fc).; Plant-based platforms offer scalable, economical biomanufacturing with reduced pathogen risk. Among these, Lactuca sativa (lettuce) is a promising host due to rapid growth, prior success producing therapeutics, and demonstrated spaceflight performance. This work aims to quantify PTH Fc accumulation in transgenic lettuce and evaluate a scalable Protein A–based downstream process.; Transgenic lines were generated by Agrobacterium-mediated transformation and screened across T1 – T3 generations by PCR, Western blot, and ELISA. Stable PTH-Fc transgene inheritance was confirmed through T3, with 100% of progeny in selected lines carrying the transgene. The lead line accumulated 0.3 – 1.2 mg PTH-Fc/kg fresh weight (0.004–0.018% TSP) in T2 plants. Crude plant extracts were concentrated and buffer‑exchanged by tangential flow filtration, followed by Protein A affinity chromatography, yielding purified PTH‑Fc at 0.85 mg/mL. These results demonstrate that transgenic lettuce supports scalable PTH-Fc production suitable for downstream protein characterization.'},

  // THURSDAY
  {id:'k3',code:'K-03',day:'Thursday 14 May',dayKey:'thu',session:'Keynote',type:'keynote',time:'09:00–09:45',speaker:'Nicole F. Steinmetz',affil:'UC San Diego',title:'From Plants to Planets: Plant Virus Therapeutics for One Health',topic:'Viral Vectors & Nanoparticles',abstract:'Plant viruses re-engineered as platform nanotechnology for challenges in human health, agriculture, and space exploration. Plant virus-based delivery systems for small molecules and biologics; vaccine and cancer immunotherapy candidates including a lead candidate for intratumoral immunotherapy now entering clinical development after canine cancer trials.'},
  {id:'o8',code:'O-08',day:'Thursday 14 May',dayKey:'thu',session:'Oral — Viral Vectors & Nanoparticles',type:'oral',time:'09:45–10:05',speaker:'George Lomonossoff',authors:'GP Lomonossoff* (1), H. Peyret(1,2), SN Shah (1), Y. Meshcheriakova (1), L. Mitchenall (1), H. Martin (3), DL Tomlinson (3)',affil:'(1) John Innes Centre, Norwich, UK (2) University of Nottingham, Sutton Bonington Campus, UK (3) Astbury Centre, University of Leeds, UK',title:'Delivering RNA to mammalian cells using a plant virus capsid',topic:'Viral Vectors & Nanoparticles',abstract:'RNA molecules of defined sequence have many potential uses in biomedicine and bionanotechnology. However, one of the main factors limiting their deployment is their intrinsic instability, meaning that preparations must be stored at low temperature. As a consequence, several approaches have been investigated to stabilise the molecules, including the incorporation of non-natural nucleotides into the sequence and encapsulation of the molecules.; The plant virus, cowpea mosaic virus (CPMV), has icosahedral particles that are extremely effective at protecting its genomic RNA. As a result of our studies on the virus replication cycle, we demonstrated that RNA replication and encapsidation are tightly coupled. We have utilised this to develop a method for the encapsidation of designer RNAs into CPMV particles and have shown that the encapsidated RNA is stable for months at room temperature. CPMV particles harbouring RNA encoding GFP can be taken up by mammalian cells and the RNA released and translated. This uptake can be greatly improved through the bispecific affimer reagents which can bind the virus particles and cell-surface proteins. Furthermore, preliminary studies in mice suggest that the administration of CPMV particles containing RNA encoding the Zikavirus structural proteins can elicit the production of anti-Zika antibodies. These studies suggest that CPMV particles could be an effective approach to delivering mRNA molecules to cells without the need for cold storage.'},
  {id:'o9',code:'O-09',day:'Thursday 14 May',dayKey:'thu',session:'Oral — Viral Vectors & Nanoparticles',type:'oral',time:'10:05–10:25',speaker:'Jordan VanderBurgt',authors:'JT VanderBurgt*(1,2), R Strasser(3), CP Garnham(1,4), H Nausch(5), and R Menassa(1,2).',affil:'(1) London Research and Development Centre, Agriculture and Agri-Food Canada, London, Ontario, Canada,  (2) Department of Biology, University of Western Ontario, London, Ontario, Canada,  (3) Department of Biotechnology and Food Sciences, BOKU University, Vienna, Austria,  (4) Department of Biochemistry, University of Western Ontario, London, Ontario, Canada,  (5) Fraunhofer Institute for Molecular Biology and Applied Ecology IME, Aachen, Germany',title:'Effective production of protein nanoparticles in two plant-based systems',topic:'Viral Vectors & Nanoparticles',abstract:'Protein nanoparticles self-assemble into large quaternary structures and are innovative tools in biotechnology, however, further work is required to develop them in plant-based systems. We have investigated the plant-production of four protein nanoparticles as scaffolds for antigen display, each with properties affecting their suitability for certain applications. To expand our toolbox of plant-made nanoparticles we investigated ferritin from Helicobacter pylori, which assembles from 24 identical subunits. Ferritin accumulated to over 0.2 mg/g of fresh weight in Nicotiana benthamiana, and genetic fusion of a viral glyco-epitope to this protein unexpectedly tripled the accumulation. The fusion protein was efficiently N-glycosylated and assembled into nanoparticles. Chimeric and wild type ferritin showed similar iron mineralization, which was reduced by introducing substitutions at two critical amino acids. This adds ferritin to our suite of plant-made nanoparticles for vaccine development. To allow for high throughput screening of multiple combinations of nanoparticles and pathogenic viral and bacterial immunogens, we adopted the plant cell pack (PCP) technology, using BY-2 cell aggregates in microtiter plates. Three protein nanoparticles were produced in PCPs with accumulation up to 0.38 mg/g. Scale-up for purification and characterization of these proteins was successful in 1000-fold larger PCPs, demonstrating the potential of the PCP screening and production platform.'},
  {id:'o10',code:'O-10',day:'Thursday 14 May',dayKey:'thu',session:'Oral — Viral Vectors & Nanoparticles',type:'oral',time:'10:25–10:45',speaker:'Patrick Opdensteinen',authors:'Patrick Opdensteinen (1), and Nicole F. Steinmetz (1)',affil:'(1) Aiiso Yufeng Li Family Department of Chemical and Nano Engineering, University of California, San Diego, La Jolla, CA 92093, USA',title:'Immunoengineering in space: VLP-based immunotherapies via plant molecular farming in low-resource environments',topic:'Viral Vectors & Nanoparticles',abstract:'Plant virus-like particles (VLPs) have remarkable immunomodulatory properties, allowing these biologics to be repurposed as precise, safe, and adaptable vaccines and immunotherapies against cancer and chronic diseases. Their modular, self-assembling nature enables the rapid production of diverse formulations from minimal genetic templates – further, the fact that VLPs can be produced using simple infrastructure and plant molecular farming, makes these VLPs ideal candidates for on-demand biomanufacturing in low-resource or extreme environments. In this work we focused on addressing the manufacturing challenge, specifically focusing on availability and purification for on demand use in low resource environments, i.e. space flight. This fusion of biotechnology and space research exemplifies the next frontier of “off-world biopharmaceuticals”, supporting human space travel to mars and beyond.'},
  {id:'o11',code:'O-11',day:'Thursday 14 May',dayKey:'thu',session:'Oral — Viral Vectors & Nanoparticles',type:'oral',time:'10:45–11:05',speaker:'E. Lozano-Sanchez',authors:'E. Lozano-Sanchez* (1), M.A. Moreno-Gonzalez (2), F. Merwaiss, (1), N.F. Steinmetz (2), and J.A. Daròs (1).',affil:'(1) Instituto de Biología Molecular y Celular de Plantas (Consejo Superior de Investigaciones Científicas − Universitat Politècnica de Valencia), Valencia, Spain. (2) Department of NanoEngineering, University of California San Diego, La Jolla, California, USA.',title:'Nanobody-functionalized potato virus X nanoparticles for targeted cancer therapy and protein delivery',topic:'Viral Vectors & Nanoparticles',abstract:'Plant virus nanoparticles (VNPs) is a promising material in nanomedicine thanks to its inherent biological and physicochemical properties. VNPs can be manipulated through different methods to display molecules of interest for biotechnology applications. In previous studies, we have set up a genetically encoded potato virus X (PVX) system for displaying nanobodies on the VNP surface for SARS-CoV-2 neutralization. Here, we further explore the application of this system for cancer targeted therapy and protein delivery. First, we developed different PVX-derived VNPs decorated with different nanobodies against HER2, one of the most common cancer-related markers. The combination of nanobody targeting abilities with the intrinsic antitumor properties of PVX nanoparticles supports the potential of this VNP in cancer therapeutic applications. The targeting capacity of the nanoparticles were validated in vivo in solid tumors. Second, we leveraged the binding capacity of nanobodies displayed in VNPs to create a protein delivery system. We present a proof of concept consisting of nanobody-decorated VNPs able to bind the receptor-binding domain (RBD) of the SARS-CoV-2 Spike protein. Once loaded with the protein of interest in vitro, they can be used as a delivery system with potential applications in vaccine development. In summary, our results reaffirm the versatility and potential of VNPs for nanomedicine applications, particularly in targeted cancer therapy and protein delivery.'},
  {id:'o12',code:'O-12',day:'Thursday 14 May',dayKey:'thu',session:'Oral — Viral Vectors & Nanoparticles',type:'oral',time:'11:05–11:25',speaker:'Vianney Poignavent',authors:'A Utard, A Guigand, M Demeules, C Ott, , L Bellott, A Trolet, V Poignavent*',affil:'nan',title:'Plant-Derived VLPs for Cancer Immunotherapy: Coupling Neoantigen Packaging with APC-Targeted Display',topic:'Viral Vectors & Nanoparticles',abstract:'Virus-like particles (VLPs) have achieved clinical success as prophylactic vaccines against hepatitis B, HPV and influenza. Their nanoscale size (<100 nm) and highly ordered, repetitive protein structure enhance interactions with B cells and antigen-presenting cells (APCs) compared with soluble antigens, enabling potent immune activation with an established safety profile. Despite these advantages, the ability of VLPs to induce cytotoxic CD8+ T-cell responses for cancer immunotherapy has been limitedly evaluated clinically, outside settings such as HPV-driven malignancies. Here, we present a plant-derived VLP platform based on Grapevine fanleaf virus (GFLV) that enables simultaneous engineering of both the inner and outer particle surfaces. We designed GFLV VLPs to encapsidate tumor-derived neoantigens within the inner cavity while displaying APC-targeting moieties on the outer surface to enhance uptake and antigen presentation. In murine preclinical models, the engineered VLPs demonstrated APC-targeting capability and therapeutic vaccination activity, supporting induction of tumor-directed cellular immunity. Overall, this plant-VLP platform provides a versatile scaffold for next-generation therapeutic cancer vaccines, combining modular payload/display design with the manufacturing advantages of plant bioproduction and the potential to drive robust CD8+ T-cell responses.'},
  {id:'k4',code:'K-04',day:'Thursday 14 May',dayKey:'thu',session:'Keynote',type:'keynote',time:'11:55–12:40',speaker:'Björn Örvar',affil:'ORF Genetics',title:'Molecular farming for 25 years – aligning our barley bioreactor to business opportunities',topic:'Molecular Farming Marketplace',abstract:'ORF Genetics celebrates 25 years using bioengineered barley seeds as bioreactor for recombinant proteins. From ISOkine growth factors for stem cell research to current innovations in gene technology, hydroponic cultivation and downstream processing, with a forward look at the bright future of molecular farming.'},
  {id:'o13',code:'O-13',day:'Thursday 14 May',dayKey:'thu',session:'Oral — Scaling Up',type:'oral',time:'12:40–13:00',speaker:'Anthony Rosa',authors:'A Rosa*(1), A Doglia (1), L Rinarelli (1), Roberta Zampieri (1), Linda Avesani (2)',affil:'Diamante SB srl (1), Università degli Studi di Verona (2)',title:'Pilot-scale production facility of clinical-grade therapeutic nanoparticles',topic:'Scaling Up Plant-Based Production',abstract:'Plant-based biomanufacturing of therapeutic proteins represents a relatively novel platform which provides several advantages compared to other systems, including cost-effective scalability, simplified upstream processes and inherent biosafety. Diamante SB has developed a pilot-scale GMP-compliant manufacturing process where Nicotiana benthamiana serves as a bioreactor to produce therapeutic nanoparticles derived from Tomato Bushy Stunt Virus (TBSV) and engineered to display a non-native immunodominant peptide necessary to induce immune tolerance in patients affected by Rheumatoid Arthritis. Manufacturing consists of two main phases: the upstream process entails three consecutive cycles of infection with replication-competent viral particles, in a vertical farming layout that increases productivity per unit area. Downstream purification, on the other hand, has been simplified to consist of simple and labour-friendly centrifugation steps to obtain a high-purity active ingredient. At present, the facility produces more than 15Kg of biomass per year, with an average yield of 71mg per Kg of leaf fresh weight and higher-than 97% purity. While manufacturing has been streamlined to obtain fast and consistent production quality, certain hurdles remain to optimize scalability with minimal losses. In this sense, Diamante SB is in the development stage of an optimized process with the goal to increase yield linearity and overall quality of its therapeutic ingredient.'},
  {id:'o14',code:'O-14',day:'Thursday 14 May',dayKey:'thu',session:'Oral — Scaling Up',type:'oral',time:'13:00–13:20',speaker:'Cliff Yang',authors:'Kunpeng Li, Ningli Wang, Heng Ying, Yong Yang, Ming Luo, Daichang Yang and Cliff Yang',affil:'Healthgen Biotech. Inc., Wuhan, Hubei, China',title:'Recombinant Protein Expression Reached 30 g/kg in Oryza Sativa endosperm',topic:'Scaling Up Plant-Based Production',abstract:'Human blood has remained the only source for human serum albumin since the 1940s. OsrHSA, a recombinant human serum albumin purified from bioengineered Oryza Sativa endosperm, was approved by China National Medicinal Products Agency (NMPA) in 2025 as the first rice-derived pharmaceutical in the world. Although OsrHSA possesses much higher purity (99.9999%) than blood-derived albumin (~96%), it faces a commercial challenge of a very low market price (~$5 per gram). Here we report a series of genetic engineering techniques which increased the recombinant albumin expression to ~30g/kg of brown rice, which is 37.5% of all host proteins contained in rice. First, we discovered a natural endosperm-specific Gt13a promoter. Second, we utilized a low glutelin content rice transgenic line. Third, we further enhanced the Gt13a promoter by removing its negative regulatory motifs.  This new expression technology enabled OsrHSA to compete commercially with blood products.'},
  {id:'o15',code:'O-15',day:'Thursday 14 May',dayKey:'thu',session:'Oral — Scaling Up',type:'oral',time:'14:30–14:50',speaker:'Andreas Schaaf',authors:'A Schaaf*',affil:'nan',title:'Unlocking unique products whilst maintaining industry standards',topic:'Scaling Up Plant-Based Production',abstract:'Rising structural and mechanistic complexity in next‑generation biologics—driven by deeper disease‑pathway insights and the need for defined post‑translational modifications such as glycosylation—often exceeds the capabilities of conventional microbial and mammalian hosts. These systems struggle particularly with proteins requiring extensive disulfide bonding, multidomain organization, or multiple glycosylation sites, creating manufacturing bottlenecks. Plant‑based expression systems provide an alternative route for such molecules. Moss is presented as one example that supports correct folding, human‑like glycosylation, and expression of complex proteins. This includes recombinant Factor H (CPV‑104)—a ~150‑kDa complement regulator comprising 20 SCR domains, ~40 disulfide bonds, and eight N‑glycosylation sites—which is in clinical development, underscoring that plant‑derived production can meet the quality requirements for advancement to human studies. From a process standpoint, a 500‑L production scale is well established and has been scaled out, with further scale-up activities underway, , indicating a clear path to larger‑scale, GMP‑compatible manufacturing. Overall, plant‑based technologies may help address key constraints in producing advanced biologics by enabling the manufacture—and clinical progression—of proteins that are otherwise difficult to express in traditional systems, as exemplified by the clinical‑stage CPV‑104 program.'},
  {id:'o16',code:'O-16',day:'Thursday 14 May',dayKey:'thu',session:'Oral — Scaling Up',type:'oral',time:'14:50–15:10',speaker:'Yuri Gleba',authors:'C. Jimenez (1,2) & Y. Gleba (1,2)',affil:'Nambawan Spain SLU (1), Nomad Bioscience GmbH (2)',title:'Reinventing Sweetness: How Plant Molecular Farming Unlocked the Industrial Production of Thaumatin',topic:'Molecular Farming Marketplace',abstract:'Excessive consumption of sugar imposes a severe global burden on human health — contributing to overweight, obesity, diabetes, cardiovascular diseases, and related disorders — and carries a substantial environmental footprint, requiring more than 33 million hectares worldwide for the cultivation of sugar cane, sugar beet, and sugar corn.; There is a powerful alternative in nature: thaumatin, a naturally occurring sweet protein with an extraordinary sweetness intensity—over 13,000 times that of sucrose on a weight basis. However, the widespread use of thaumatin has historically been limited by the lack of an economically viable industrial production system.; In 2025, Nambawan Spain, a technology spin-off of Nomad Bioscience, successfully brought Thaumatin II to market under the trademark Thauma™, using plant biofactories to enable scalable, cost-efficient manufacturing.; Thauma™ combines exceptional sweetness and taste attributes with functional versatility: it is non-caloric, non-glycemic, and has received regulatory approval from JECFA, FDA, and FEMA for use as a sweetener and flavor modifier with clean-label status.; In this talk, we will outline the key technical developments that enabled the industrial production of Thauma™ and discuss the scientific, regulatory, and market challenges encountered in bringing this novel ingredient to global markets.;'},
  {id:'o17',code:'O-17',day:'Thursday 14 May',dayKey:'thu',session:'Oral — Scaling Up',type:'oral',time:'15:10–15:30',speaker:'Jannik Lutz',authors:'J Lutz*(1, 2), J Nowizki (1, 3), M Knödler (1, 2), H Spiegel (1), H Nausch (1)',affil:'(1) Fraunhofer Institute for Molecular Biology and Applied Ecology IME, Forckenbeckstrasse 6, 52074 Aachen, Germany; (2) Institute for Molecular Biotechnology, RWTH Aachen University, Worringerweg 1, 52074 Aachen, Germany; (3) Institute of Plant Biology and Biotechnology, University of Muenster, Schlossplatz 7, 48149 Muenster, Germany',title:'Scale-up and DoE-based optimization of plant cell packs: transformation of 600 g BY-2 cells with >1 g/kg yield',topic:'Scaling Up Plant-Based Production',abstract:'The plant cell pack (PCP) transient expression platform enables efficient microplate-based high-throughput screening of recombinant biopharmaceuticals in Nicotiana tabacum BY-2 cell suspensions by removal of the cultivation medium and subsequent infiltration with Agrobacterium tumefaciens. However, once a subset of promising product candidates has been identified, the method fails to provide sufficient protein quantities for detailed functional characterization and pre-clinical studies. Therefore, we scaled the PCPs by 1,000-fold from 60 mg to 60 g using a centrifugation-based approach, yielding ~400 mg/kg fresh mass (FM) of the model protein DsRed, ~300 mg/kg FM of the malaria vaccine candidate antigen PfAMA1 and ~160 mg/kg FM of the human PfAMA1 specific monoclonal antibody 1E4. A further 1,000-fold increase to 600 g was achieved by the technical refinement of vacuum-filtration strategy and devices. Using design of experiments (DoE) we optimized the following process parameters: i) sucrose concentration in the infiltration buffer, ii) co-incubation time of BY-2 and A. tumefaciens prior to PCP packing, iii) PCP thickness as well as iv) residual moisture content of the PCPs and increased product accumulation to >1 g/kg FM DsRed, ~550 mg/kg PfAMA1 and ~280 mg/kg mAb 1E4. Hence, the optimized PCP procedure is suitable to provide sufficient amounts of target protein (>100 mg) for detailed functional characterization and might be further applicable for small-scale production.'},
  {id:'o18',code:'O-18',day:'Thursday 14 May',dayKey:'thu',session:'Oral — Scaling Up',type:'oral',time:'15:30–15:50',speaker:'Hugh Haydon',authors:'H Haydon* (1), B Bratcher (1), K Whelan (1)',affil:'KBio, Inc. (1)',title:'Scale-up and cGMP Manufacturing of Plant-Made Pharmaceuticals',topic:'Scaling Up Plant-Based Production',abstract:'As one of the few organizations in the world capable of large scale, cGMP manufacture of pharmaceuticals from plants, this presentation will share recent changes in KBio’s business structure as well as major advances in production capacity. Using actual product development case studies, KBio’s experience in both production scale up and design of quality systems necessary to meet regulatory requirements will be addressed. Included will be a discussion of the unique aspects of implementing cGMP controls when using a whole plant system, quality assurance progression from research, pre-clinical, Phase 1, Phase 2 and Phase 3, as well as cost implications.  Experience from direct interactions with both US FDA and European Medicines Agency will be shared to highlight the different approaches to early-stage requirements for clinical manufacturing. The presentation will conclude with practical tips for preparing product candidates for scale up and efficient tech transfer to a CDMO.'},
  {id:'k5',code:'K-05',day:'Thursday 14 May',dayKey:'thu',session:'Keynote',type:'keynote',time:'15:50–16:35',speaker:'Kirsi-Marja Oksman-Caldentey',affil:'VTT Technical Research Centre of Finland',title:'Scientifically validated new cosmetic ingredients from plants and plant cells',topic:'Metabolic Pathway Engineering',abstract:'The EU InnCoCells project developed innovative plant-based production processes for scientifically validated cosmetic ingredients. Four platforms investigated: plant cell cultures, hairy roots, aeroponics, and field-grown plants. 90+ species cultivated; four ingredients already commercialized, 10+ at pre-commercial stage.'},
  {id:'o19',code:'O-19',day:'Thursday 14 May',dayKey:'thu',session:'Oral — Smart Chassis',type:'oral',time:'17:00–17:20',speaker:'Dominique Michaud',authors:'K LeBreux, B Giroux, L Feyzeau, MC Goulet, C Goulet, and D Michaud*',affil:'Centre de recherche et d\'innovation sur les végétaux, Université Laval, Québec City, Canada',title:'A gene-edited, space-efficient N. benthamiana platform for heterologous protein production in closed environments',topic:'Smart Chassis',abstract:'Closed environments offer practical advantages for the cultivation of plant protein biofactories including plant uniformity, product consistency, water/nutrient recycling and production cycles on a year-round basis. Here, we present CRISPR/Cas9-edited lines of transient expression host Nicotiana benthamiana presenting a compact, space-efficient phenotype well suited to such environments. Our strategy consisted of altering apical dominance by suppressing the synthesis of strigolactone, a negative regulator of bud outgrowth-promoting cytokinins. Strigolactone-depleted lines were produced by hindering the expression of either Carotenoid cleavage dioxygenase 7 (CCD7) or CCD8, two key enzymes of the strigolactone synthetic pathway. Knocking out either enzyme had no impact on biomass production but strongly influenced the auxin/cytokinin ratio, primary metabolism-associated proteome and aboveground architecture. The ΔCCD (or ‘benthi.x’) lines showed altered metabolic fluxes driving energy and cytokinin production, an axillary growth-oriented pattern and a spatial footprint reduced by 45-50% compared to the LAB strain commonly used for protein expression. Recombinant protein yields were maintained in the benthi.x lines, as here shown with GFP and therapeutic chimeric antibody rituximab. Our data confirm the usefulness of knocking out CCD7 and CCD8 in N. benthamiana to generate space-efficient lines well suited to closed production environments, including vertical farming systems.'},
  {id:'o20',code:'O-20',day:'Thursday 14 May',dayKey:'thu',session:'Oral — Smart Chassis',type:'oral',time:'17:20–17:40',speaker:'Marta Vazquez-Vilar',authors:'Camilo Calvache (1),  Marta Rodriguez-Rodriguez (1),  Victor Vazquez-Vilriales (1),  Elena Garcia-Perez (1),  Aubin Fleiss (2),  Mustafá Ezzeddin-Ayoub (3),  Fabio Pasin (4),  José Antonio Daròs (1),  Karen S. Sarkisyan (2),  Diego Orzaez (1),  Marta Vazquez-Vilar* (1)',affil:'(1) Instituto de Biología Molecular y Celular de Plantas (IBMCP), CSIC-UPV, Valencia, Spain. (2) MRC Laboratory of Medical Sciences, London, UK. (3) Central Unit for Research in Medicine, Universitat de Valencia, Valencia, Spain (4) Centro de Investigaciones Biológicas Margarita Salas (CIB), CSIC, Madrid, Spain',title:'Bioluminescent sentinel plants enable autonomous diagnostics of viral infections',topic:'Smart Chassis',abstract:'Plants engineered with synthetic genetic programs can transform how we monitor and manage the extension of crop pests and diseases. Here, we establish a bioluminescent platform in Nicotiana benthamiana for autonomous viral sensing based on the fungal bioluminescence pathway (FBP). We first demonstrate that recombinant viruses can deliver missing pathway components, enabling spatially resolved tracking of infection dynamics. Leveraging this starting point, we developed a dualoutput sentinel circuit that uses a protease-responsive Bioluminescence Resonance Energy Transfer (BRET) module to report infection through a virus-triggered spectral shift in luminescence. In the absence of infection, plants emit a stable yellow glow indicating system integrity. Upon infection with potyviruses, cleavage of the BRET fusion by the virus-encoded NIa-Pro protease activates a distinct colour change detectable with low-cost imaging. This modular design is compatible with other pathogens carrying specific proteases and supports future multiplexing strategies. Our results highlight the potential of synthetic sentinel gene circuits as autonomous biosensors for precision crop protection.'},
  {id:'o21',code:'O-21',day:'Thursday 14 May',dayKey:'thu',session:'Oral — Smart Chassis',type:'oral',time:'17:40–18:00',speaker:'Radek Vítek',authors:'R Vitek*(1,2), N Šindelářová (1,3), A Hlavatá (1,2), T Moravec (1)',affil:'1) Laboratory of Virology, Centre for Plant Virus Research, Institute of Experimental Botany of the Czech Academy of Sciences, Prague.  2) Department of Genetics and Breeding, Faculty of Agrobiology, Food and Natural Resources, Czech University of Life Sciences, Prague. 3) Faculty of Food and Biochemical Technology, University of Chemistry and Technology, Prague.',title:'From Leaves to Seeds: Transcriptional Rewiring and Time-Resolved Monitoring of Recombinant Antibody Accumulation',topic:'Smart Chassis',abstract:'Nicotiana benthamiana is widely used for rapid transient production of recombinant biologics, yet leaf cells are poorly suited for high-capacity protein synthesis and storage, limiting yields. Linking fundamental plant developmental biology with applied biomanufacturing, we test whether leaf cells can be transcriptionally reprogrammed toward a seed-like, storage-competent state to enhance antibody accumulation.; We engineered hybrid transcription factors derived from regulators of embryogenesis, seed maturation, and regeneration, fused to strong synthetic activation domains to boost transcriptional output. Their transient co-expression with antibodies aims to increase biosynthetic activity and remodel lytic vacuoles into protein storage–like organelles.; Protein dynamics are monitored using fluorescent timer proteins that change emission over time, distinguishing newly synthesized from older pools. Combined high-throughput plate assays and confocal microscopy reveal altered compartmentalization and spatial separation of synthesis and storage sites.; While clear cellular remodeling is observed, quantitative gains in accumulation and stability will be validated by biochemical and mass spectrometry analyses. This approach integrates mechanistic insight with practical optimization of plant molecular farming.'},
  {id:'o22',code:'O-22',day:'Thursday 14 May',dayKey:'thu',session:'Oral — Smart Chassis',type:'oral',time:'18:00–18:20',speaker:'Emma Watts',authors:'Emma C. Watts* (1), Kaijie Zheng (1), Evan E. Ellison (2), Renier A. L. Van der Hoorn (1)',affil:'(1) The Plant Chemetics Laboratory, Department of Biology, University of Oxford, Oxford OX1 3RD, UK (2) Crop Science Centre, University of Cambridge, 93 Lawrence Weaver Road, Cambridge CB3 0LE, UK',title:'Immune Attenuation of Nicotiana benthamiana against Agrobacterium tumefaciens for Molecular Farming',topic:'Smart Chassis',abstract:'Plant biofactories present an opportunity for sustainable, scalable production of recombinant proteins but currently face a bottleneck in production capacity. In Nicotiana benthamiana, one of the most widely used hosts, yield is limited by the plant’s immune response to Agrobacterium tumefaciens, which carries pathogen-associated elicitors even when disarmed. One promising strategy to overcome this bottleneck is to modulate the immune profile of N. benthamiana to minimize immune elicitation. In this work, we have conducted a large-scale knock-down screen of immunity-related genes to identify targets for immune attenuation. In parallel, we are developing stable transgenic lines carrying knock-outs of key immunity genes. The transgenic lines, generated using virus-induced gene editing (VIGE), provide a versatile platform that can be stacked to create an optimized immune profile. We have already seen increased recombinant protein production by up to 5x in knock-down plants related to pattern recognition receptors, salicylic acid production, ethylene production, and potential antibacterial agents. We have generated and validated the associated prp27- and npr1- mutants, where we saw increases of about 2x. We are now generating further mutants and mutant stacks that avoid Agrobacterium recognition to maximize recombinant protein yield, with the aim of making these available to the community.'},
  {id:'f7',code:'PF-07',day:'Thursday 14 May',dayKey:'thu',session:'Flash Talks — Session II',type:'flash',time:'18:20–18:25',speaker:'Juliane Schuphan',authors:'M Ritter(1), Natalija Stojanović (1), Simon Zschieschang (2), Johannes Grader (2), MHD Naeem Assasa (3), Eva Miriam Buhl (3), Andrea Coschiera (1), Stefan Schillberg (2, 4), Horst Fischer (1) and Juliane Schuphan (2)',affil:'(1) Department of Dental Materials and Biomaterials Research, RWTH Aachen University Hospital, Pauwelsstrasse 30, 52074 Aachen, Germany (2) Institute for Molecular Biotechnology, RWTH Aachen University, Worringerweg 1, 52074 Aachen, Germany (3) Electron Microscopy Facility, Institute of Pathology RWTH Aachen University Hospital, Aachen, Germany (4) Fraunhofer Institute for Molecular Biology and Applied Ecology IME, Aachen, Germany',title:'More Than Carriers: Plant Viral Nanoparticles as Active Immunomodulators',topic:'Viral Vectors & Nanoparticles',abstract:'Despite advances in fibrous scaffolds for nerve repair, most platforms fail to integrate biochemical and physical cues essential for neuronal differentiation and neurite extension in vitro. Hey also lack precise control over growth factor presentation and spatial organization. Here, we introduce a multifunctional carrier based on potato virus X (PVX) nanoparticles that simultaneously delivers biochemical cues and directional guidance to neurons. Plant-produced, genetically engineered PVX is used to display high-density bioactive peptides derived from laminin and brain-derived neurotrophic factor, enabling targeted activation of neuronal membrane receptors. Neuronal differentiation and activation of associated signaling pathways are assessed using immunostaining, gene expression analysis, immunoprecipitation, and western blotting. Spatial guidance is achieved by aligning PVX nanoparticles using 3D-printed sacrificial materials to create an oriented microarchitecture, as confirmed by scanning electron microscopy. This integrated biochemical and structural strategy enables simultaneous pathway activation and neurite guidance within a single system. By combining biomimetic peptide display with plant-derived engineered PVX, this work establishes a versatile, scalable, and sustainable platform for precise control of neuronal differentiation and alignment, advancing biomimetic approaches in neural tissue engineering and regenerative medicine.'},

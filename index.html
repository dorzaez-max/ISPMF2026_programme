  {id:'p11',num:'P-11',speaker:'Hamideh Ofoghi',affil:'1-  Department of Biotechnology, IROST. Tehran-Iran 2- Agricultural Biotechnology Research Institute of Iran (ABRII), Isfahan Branch, Agricultural Research, Education and Extension Organization (AREEO), Isfahan, Iran',title:'Using CRISPR/ Cas9-mediated gene editing strategy to produce of the  oral shrimp recombinant vaccine in green microalgae',topic:'Plant‑Made Biologics – From Antibodies to Advanced Therapeutics',abstract:'Microalgae have high growth rate, ease of cultivation, low costs and metabolic pathways that are similar to those of higher plants, leading to the same post-transcriptional and post-translational modifications. since micro-algae are edible and contain nutritionally valuable substances such as vitamins, proteins, and fatty acids, they can be used directly without isolation and purifying recombinant proteins to consume animals. Among various anti-WSSV strategies, envelope proteins are preliminary target for the development of vaccines. Because, envelope structural proteins " like VP28" play a crucial role in viral infections, and are often involved with viral entry, assembly and budding processes. In this study, the coding sequence of VP28 was transferred to the pChlamy4 vector; then pChlamy4-VP28 electroporated to C. reinhardtii.(UVM4 strain). The expression of vp28 protein was confirmed using SDS-PAGE and WB.  Overall, the expression level of vp28 protein in the present study was low and had limited commercial and practical aspects. Therefore, in the continuation of the current research, an attempt is made to first Selection of the desired genomic locations for insertion of target Gene; in the genome of the microalgae including repetitive sequences and other suitable gene insertion sites, and then, using modern molecular techniques including CRISPR/CAS system, specifically insert the target gene into multiple sites  with multiple repetitions to improve the expression level.'},
  {id:'p12',num:'P-12',speaker:'Henrik Nausch',affil:'(1) Fraunhofer Institute for Molecular Biology and Applied Ecology IME, Department Model-based Product and Bioprocess Engineering, Forckenbeckstrasse 6, 52074 Aachen, Germany',title:'Dr.',topic:'Plant‑Made Biologics – From Antibodies to Advanced Therapeutics',abstract:'Laccases are versatile oxidoreductase enzymes present in bacteria, fungi, and plants, with numerous industrial applications, including the degradation of pharmaceutical micropollutants in wastewater. Among these, bacterial laccases are particularly attractive due to their high catalytic activity and remarkable stability across a wide range of temperatures and pH values. One such enzyme is the Escherichia coli copper efflux oxidase (CueO) fused to the adhesion promoting peptide Maqaque Histatin (MacHis) as immobilized enzymes proved to be most effective for waste water treatment. However, their practical application has been limited by low accumulation levels of only 25–50 mg/L when recombinantly expressed in E. coli or Pichia pastoris.; In this study, we demonstrate that the engineered CueO-MacHis can be produced at substantially higher levels of 250–320 mg/kg biomass in plant chloroplasts. Furthermore, we established a simplified and cost-effective purification strategy that leverages the enzyme\'s temperature and pH stability combined with either anion exchange chromatography (AEX) or tangential flow filtration (TFF).; This approach paves the way for the large-scale production of CueO-MacHis as a technical enzyme for industrial applications.'},
  {id:'p13',num:'P-13',speaker:'Hlapogadi Mashiloane',affil:'SEFAKO MAKGATHO HEALTH SCIENCES UNIVERSITY (1) and COUNCIL FOR SCIENTIFIC AND INDUSTRIAL RESEARCH (CSIR) (2)',title:'ENGINEERING SECRETORY ANTIBODIES FOR MUCUSAL IMMUNITY: ADVANCES, CHALLENGES AND EMERGING APPLICATIONS IN NON-TRADITIONAL EXPRESSION PLATFORMS',topic:'Plant‑Made Biologics – From Antibodies to Advanced Therapeutics',abstract:'The pharmaceutical industry is a fast-growing industry, and as a result, there is an increased demand for alternative production systems. Sectors such as antibody-based biopharmaceuticals are among the fastest growing sectors in the pharmaceutical industry. Plants such as Nicotiana benthamiana can produce enormous quantities of different recombinant proteins. Secretory antibodies (SIgA) are found in mucosal areas such as the gastrointestinal and respiratory tract and are essential in regulating and protecting intestinal, respiratory, and urogenital mucosal epithelia by limiting microorganism invasion/access. Given that N. gonorrhoeae primarily invades the mucosal areas of the urogenital tract, SIgA-based therapeutics could offer a targeted approach towards preventing bacterial adherence and infection. The scientific community\'s knowledge on plant-made N. gonorrhoeae-targeting secretory antibody is limited. In this review, our basic understanding of  engineering secretory antibodies for mucosal immunity is described along with advances, challenges and emerging applications in non-traditional expression platforms. This study will provide novel insights into its feasibility as an alternative therapeutic strategy due to the limited research on plant-produced SIgA’s against N. gonorrhoeae.'},
  {id:'p14',num:'P-14',speaker:'Kevin Wang',affil:'Division of Math and Natural Sciences, University of Pikeville, Pikeville, KY, United States',title:'Differential Host Responses to Full-Length and Mature Serine Proteases during Transient Expression in Nicotiana benthamiana',topic:'Plant‑Made Biologics – From Antibodies to Advanced Therapeutics',abstract:'Plant molecular farming enables rapid and scalable production of recombinant biopharmaceuticals; however, expression of proteolytic enzymes remains challenging due to host toxicity and tissue necrosis. In this study, we investigated the impact of protease maturation state on plant host responses using transient expression in Nicotiana benthamiana. Building on our published findings with nattokinase, we compared the expression of full-length zymogen forms and corresponding mature serine proteases lacking pro-domains.; Agroinfiltration of full-length constructs consistently triggered rapid leaf necrosis within 3–5 days post-infiltration, accompanied by reduced protein accumulation and compromised tissue integrity. In contrast, expression of mature protease forms resulted in delayed or minimal necrosis, higher soluble protein yield, and preserved leaf morphology. Functional assays confirmed that mature enzymes retained robust proteolytic activity, whereas full-length forms exhibited limited recoverable activity due to early tissue collapse.; These observations suggest that pro-domains in plant-expressed serine proteases may interfere with host cellular processes or activate plant immune responses, leading to hypersensitive-like cell death. Our results indicate that strategic removal of pro-peptides can mitigate host toxicity while preserving enzymatic function, offering a generalizable design principle for expressing bioactive proteases in plants.'},
  {id:'p15',num:'P-15',speaker:'Marcello Donini',affil:'Division of Biotechnologies, , Italian National Agency for New Technologies, Energy and Sustainable Economic Development (ENEA), 00123, Rome, Italy',title:'Expression of a recombinant human Granzyme B (GrB) in Nicotiana benthamiana plants for tumour-targeting applications',topic:'Plant‑Made Biologics – From Antibodies to Advanced Therapeutics',abstract:'This work aims to produce in plants an antibody-drug conjugate to specifically target glioblastoma tumors, inducing cell death. To this aim the monoclonal antibody H10 specifically recognizing the C domain of Tenascin-C, a tumor marker of the extracellular matrix was fused to granzyme B (GrB), a serine protease normally found in the granules of natural killer cells and cytotoxic T cells which mediates apoptosis in target cells. In this work, we have verified the possibility of producing functionally active GrB in plants. To this aim, the human GrB fused to an antibody Fc portion (GrB-Fc) in order to stabilize the protein and to facilitate purification. The recombinant enzyme was produced in plants by Agroinfiltration in its inactive form with an N-terminal DDDDK peptide and purified by protein A affinity chromatography at levels of 4mg/Kg FW. The enzyme could be easily activated by enterokinase treatment and in vitro experiments, using U87 glioblastoma cells, revealed its biological activity. Furthermore, the GrB was directly fused to the recombinant scFvH10 antibody. This antibody-drug conjugate (GrB-scFvH10) was expressed and successfully purified from plant agroinfiltrated leaves at levels of 30 mg/Kg. Preliminary in vitro tests show its functional activity on glioblastoma cells. Future experiments will explore the possibility to use GrB-scFvH10 in antibody-mediated drug delivery applications in mouse models against solid tumors expressing the C-Domain of Tenascin C.'},
  {id:'p16',num:'P-16',speaker:'Maria Elena Villani',affil:'(1)ENEA, Division of Biotechnologies, Rome, Italy; (2)Instituto de Investigación Sanitaria de Navarra (IdISNA) and Departamento de Microbiología y Parasitología, Universidad de Navarra, Pamplona, Spain; (3)Department of Animal Science, Centro de Investigación y Tecnología Agroalimentaria de Aragón (CITA), Zaragoza, Spain.',title:'Plant production of BP26 and SP39 Brucella suis antigens fused to swine Fc for potential vaccinal applications',topic:'Plant‑Made Biologics – From Antibodies to Advanced Therapeutics',abstract:'Brucella suis is the causative agent of porcine brucellosis, a globally important zoonosis with a significant impact on animal health and food safety. There is no vaccine available highlighting the need to explore novel antigenic products for the development of new vaccines and diagnostic tests. In the present work, two immunogenic B. suis periplasmic proteins (BP26 and SP39), were selected to be produced in N. benthamiana plants. Both proteins were transiently expressed in plants as fusion with the Fc portion of a porcine IgG1 (BP26-Fcp and SP39-Fcp) with the aim of potentiating their immunogenic properties, increasing expression stability and facilitating purification. About 50 mg/kg of leaf fresh weight of each protein were recovered and biochemical characterization showed that SP39-Fcp forms dimers while BP26-Fcp assembles into multimers. Transmission electron microscopy and DLS analysis revealed the ability of BP26-Fcp to form nanobarrel-like structures, as bacterial BP26, with a hydrodynamic diameter of about 15 nm. Results also showed that the Fc moiety maintains the ability to specifically interact with porcine FcγRIIIa, indicating that this type of antigen design may result in the efficient targeted delivery to immune cells expressing this receptor type. We demonstrated that plants are an efficient system to produce B. suis antigens fused to a porcine Fc for possible vaccinal applications and that BP26-Fcp nanobarrels may have a potential use in nanotechnology.'},
  {id:'p17',num:'P-17',speaker:'Marusic Carla',affil:'(1) Division of Biotechnologies, , Italian National Agency for New Technologies, Energy and Sustainable Economic Development (ENEA), 00123, Rome, Italy. (2) Institute of Translational Pharmacology - National Research Council of Italy, 00133 Rome, Italy.',title:'Targeted delivery of a plant-derived monoclonal antibody using pulsed electric fields in a 3D glioblastoma model.',topic:'Plant‑Made Biologics – From Antibodies to Advanced Therapeutics',abstract:'The objective of this project is the targeted treatment of solid tumors using electroporation. The strategy involves the plant-production of the monoclonal antibody H10 (mAb H10) specifically recognizing the C domain of Tenascin-C (C-TNC), a tumor marker present in the extracellular matrix of solid tumors such as glioblastoma. This aggressive brain tumor is characterized by the overexpression of C-TNC which takes part in proliferation and pro-angiogenic effects within the tumor microenvironment. The plant-purified antibody was conjugated with a fluorescent molecule to conduct in vitro studies. The targeting efficacy of mAb H10 was tested on a glioblastoma spheroid model (able to mimick the tumor architecture) and different electroporation protocols were assayed to enhance the antibody’s ability to penetrate the neurospheres. Electroporation was shown to facilitate the entry of mAb H10 into the spheroid matrix, resulting in a more homogeneous fluorescence within the treated neurospheres compared to non-electroporated controls. Moreover, confocal microscopy analysis evidenced the accumulation of the antibody in the extracellular matrix within the spheroids. These results demonstrate that electroporation-assisted delivery of mAb H10 into glioblastoma spheroids is a promising method for enhancing targeted therapy. Future research should focus on developing non-invasive electroporation devices and evaluating the therapeutic potential of this molecule.'},
  {id:'p18',num:'P-18',speaker:'Michela Osnato',affil:'(1) Università degli Studi di Urbino “Carlo Bo”, 61029 Urbino (PU) – ITALY (2) Centre for Research in Agricultural Genomics (CRAG), Campus UAB, 08193 Cerdanyola (BARCELONA) - SPAIN (3) Biotech Tricopharming Research SL, 08018 Barcelona - SPAIN',title:'Artemisia at flowering: optimizing in planta accumulation and in vitro evaluation of secondary metabolites with potential anticancer activity',topic:'Plant‑Made Biologics – From Antibodies to Advanced Therapeutics',abstract:'Aromatic plants often synthesize specialized metabolites at very low levels within specific structures or at precise developmental stages, hindering their large-scale exploitation. This is the case of Artemisia annua, used in Traditional Chinese Medicine and recommended by WHO for malaria treatment. Its active compound Artemisinin (AN) accumulates only in glandular trichomes and mainly at flowering, making its production difficult in the quantities needed for therapeutic results. Several approaches have been explored to enhance AN production, including the use of bio-stimulants that accelerate the vegetative to reproductive phase change and double trichome density.  Analyses of plants treated with specific Plant Growth Regulators led to the identification of candidate genes likely involved in the control of the floral transition. Our research focuses on the characterization of these regulatory genes to better understand how photoperiodic flowering is linked to AN biosynthesis. Beyond AN, A. annua synthesizes additional metabolites relevant to human health. We first optimized “quick & cheap” methods to extract terpenoids and flavonoids from dried leaves and floral buds. We then tested the anticarcinogenic capacity of these extracts using 3D models - recognized as standard for the tumorigenic potential of malignant cells. Some phytocomplexes markedly reduce spheroid formation in vitro, suggesting a great potential in reducing tumor cell reawakening.;'},
  {id:'p19',num:'P-19',speaker:'Mikayla Tolksdorff',affil:'University of Nottingham (1)',title:'Production of a virus like particle for the vaccination of East Coast Fever using antigen p67c: recombinant protein expression Agrobacterium tumefaciens, and production in Nicotiana benthamiana and Chlamydomonas',topic:'Plant‑Made Biologics – From Antibodies to Advanced Therapeutics',abstract:'The tick borne Theileria parasite poses a great risk to cattle within sub–Saharan Africa, as it causes East Coast Fever, which can lead toillness and death in cattle. Global warming is causing extended habitat range and prolonged active-periods of Theileria. The pressing issue currently is the lack of a viable, accessible and affordable vaccine. We propose to express a virus-like particle (VLP) of the hepatitis B core antigen (HBcAg) which displays the Theileria surface antigen p67c. A recombinant VLP was designed for transient expression in Nicotiana benthamiana, and additional production in the alga Chlamydomonas. The p67c antigen alone was also expressed in plants. Expression, purification, and characterisation (structural and immunogenic) of the vaccine candidates will be presented.'},
  {id:'p20',num:'P-20',speaker:'Mohammed Shahid Chaudhary',affil:'(1) Laboratory for Genome Engineering and Synthetic Biology, Division of Biological Sciences, King Abdullah University of Science and Technology (KAUST), Thuwal, Jeddah, Saudi Arabia; (2) Laboratory for Nanomedicine, Division of Biological and Environmental Science and Engineering, King Abdullah University of Science and Technology (KAUST), Thuwal, Jeddah, Saudi Arabia; (3) Computational Bioscience Research Center, King Abdullah University of Science and Technology (KAUST), Thuwal, Jeddah, Saudi Arabia; (4) Red Sea Research Center, King Abdullah University of Science and Technology (KAUST), Thuwal, Jeddah, Saudi Arabia; (5) Water Desalination and Reuse Center, Division of Biological Sciences and Engineering, King Abdullah University of Science and Technology (KAUST), Thuwal, Jeddah, Saudi Arabia',title:'High-yield, plant-based production of an antimicrobial peptide with potent activity in a mouse model',topic:'Plant‑Made Biologics – From Antibodies to Advanced Therapeutics',abstract:'Plants offer a promising chassis for the large-scale, cost-effective production of diverse therapeutics, including antimicrobial peptides (AMPs). However, key advances will reduce production costs, including simplifying the downstream processing and purification steps. Here, using Nicotiana benthamiana plants, we present an improved modular design that enables AMPs to be secreted via the endomembrane system and sequestered in an extracellular compartment, the apoplast. Additionally, we translationally fused an AMP to a mutated small ubiquitin-like modifier sequence, thereby enhancing peptide yield and solubilizing the peptide with minimal aggregation and reduced occurrence of necrotic lesions in the plant. This strategy resulted in substantial peptide accumulation, reaching around 2.9 mg AMP per 20 g fresh weight of leaf tissue. Furthermore, the purified AMP demonstrated low collateral toxicity in primary human skin cells, killed pathogenic bacteria by permeabilizing the membrane, and exhibited anti- infective efficacy in a preclinical mouse (Mus musculus) model system, reducing bacterial loads by up to three orders of magnitude. A base-case techno-economic analysis demonstrated the economic advantages and scalability of our plant-based platform. We envision that our work can establish plants as efficient bioreactors for producing preclinical-grade AMPs at a commercial scale, with the potential for clinical applications.'},
  {id:'p21',num:'P-21',speaker:'Monique Schulze',affil:'Fraunhofer Institute for Molecular Biology and Applied Ecology IME',title:'Augmenting the Plant Cell Pack (PCP) transient expression technology to a fully automated screening platform for early-stage biopharmaceutical product development',topic:'Plant‑Made Biologics – From Antibodies to Advanced Therapeutics',abstract:'Biopharmaceuticals, particularly monoclonal antibodies (mAbs), are the fastest-growing class of therapeutics for immune, infectious, and oncologic diseases inadequately addressed by small-molecule drugs. Their development increasingly relies on artificial intelligence (AI)-supported protein engineering, thereby driving the demand for high-throughput screening (HTS) platforms to identify optimal target variants and production conditions. In this context, plants provide an efficient screening platform as the transient transformation enables rapid protein expression without the need for stable cell line generation, and for screening purposes the transient transformation was recently transferred to the microtiter plate (MTP) format via the Plant Cell Pack (PCP) technology. However, despite the automation of PCP transformation itself, the throughput of the PCP technology is currently limited by manual cloning of expression vectors upstream and protein purification downstream. Using a robotic station, we developed a modular cloning workflow for vector assembly and transformation into Agrobacterium tumefaciens, and further established a purification workflow using magnetic beads. By integrating both workflows into the PCP platform, we created a fully automated, end-to-end system that streamlines and accelerates early-stage biopharmaceutical product development and enables the screening up to 384 different protein variants per day.'},
  {id:'p22',num:'P-22',speaker:'Richard Strasser',affil:'(1) Institute of Plant Biotechnology and Cell Biology, BOKU University, Vienna, Austria',title:'Plant-based production of human IL-22-Fc with mammalian type glycans',topic:'Plant‑Made Biologics – From Antibodies to Advanced Therapeutics',abstract:'Recombinant human interleukin-22 (IL-22) is a promising therapeutic candidate due to its central role in immune regulation, tissue repair, and host defense against bacterial pathogens. IL-22 contains multiple N-glycosylation sites, and the attached N-glycans critically influence its pharmacokinetics and bioactivity, as specific glycan structures affect both protein half-life and binding to the IL-22 receptor, a prerequisite for IL-22-mediated signaling. Accordingly, precise monitoring and modulation of glycosylation are essential for optimizing the stability and functional performance of recombinant IL-22 variants. A CHO cell-derived recombinant IL-22–Fc fusion protein dimer has demonstrated an extended half-life compared with native recombinant IL-22 and has shown favorable safety and tolerability profiles in healthy subjects. However, IL-22–Fc is a heavily glycosylated protein and exhibits substantial glycan heterogeneity when produced in CHO cells, which may compromise product consistency, efficacy, and manufacturability. To address these limitations, we transiently expressed recombinant human IL-22–Fc via agroinfiltration in leaves of glycoengineered Nicotiana benthamiana. Mass spectrometry analysis of affinity-purified IL-22–Fc revealed efficient N-glycosylation site occupancy and the formation of mammalian-type N-glycans, highlighting the potential of the glycoengineered N. benthamiana-based expression platform for the controlled production of IL-22-based biologics.'},
  {id:'p23',num:'P-23',speaker:'Roberta Zampieri',affil:'(1) Diamante Società Benefit srl, (2) Università degli Studi di Verona',title:'From Academic Spin off to GMP Manufacturing: The Evolution of Diamante Società Benfit srl',topic:'Plant‑Made Biologics – From Antibodies to Advanced Therapeutics',abstract:'Translating academic research into clinically relevant therapies remains a major challenge in biomedical innovation. Virus nanoparticles (VNPs) represent a promising platform for targeted immunomodulatory therapeutics due to their structural versatility and scalable production. The combination of VNP with immunodominant peptide offers a novel strategy for antigen specific immunotherapies aimed at restoring immunological tolerance in autoimmune diseases. This poster describes the evolution of Diamante SB Srl, an innovative SME founded as a spin-off of the University of Verona, and its progression toward the industrial-scale development of a virus-like nanoparticle (VNP)–based, plant-produced therapeutic candidate for rheumatoid arthritis, as well as its approach to Phase I clinical trials. Diamante’s platform is based on VNPs derived from Tomato Bushy Stunt Virus (TBSV), genetically modified to display the immunodominant peptide LIP1 associated with rheumatoid arthritis. Preclinical studies demonstrated the ability of the VNP based platform to induce antigen specific immunological tolerance. The transition to a new independent headquarters enabled the establishment of GMP compliant laboratories and workflows. Current activities focus on process optimization, quality control development, and regulatory alignment in preparation for GMP certification, supporting scalable production and clinical translation.'},
  {id:'p24',num:'P-24',speaker:'Seon-Kyeong Lee',affil:'(1)Plant Biomaterials and Biotechnology Division, Department of Agricultural Biology, National Institute of Agricultural Sciences, Rural Development Administration, Wanju-gun, Republic of Korea',title:'Development of a molecular farming platform for high-level transient production of PCV2d capsid in Nicotiana benthamiana',topic:'Plant‑Made Biologics – From Antibodies to Advanced Therapeutics',abstract:'Porcine circovirus type 2 (PCV2), the prevalent PCV2d genotype, remains a major challenge for swine health due to antigenic divergence from current vaccines. This study aimed to establish a plant-based molecular farming platform for the production and preliminary evaluation of the PCV2d capsid (Cap) protein in Nicotiana benthamiana. A codon-optimized PCV2d cap gene with N-terminal truncation and subcellular targeting elements was transiently expressed in 4–5-week-old N. benthamiana plants via Agrobacterium-mediated infiltration. Leaves harvested at 3, 5, and 7 days post-infiltration were analyzed by SDS-PAGE and western blotting. Cap protein accumulated mainly as a ~27 kDa monomer, accompanied by higher-molecular-weight species (~48–63 kDa), with reproducibly highest accumulation at 7 days. Recombinant Cap protein was enriched by affinity-based purification and showed self-assembly behavior under controlled buffer conditions. Transmission electron microscopy confirmed spherical particles of approximately 17–22 nm, consistent with PCV2 virus-like particle (VLP) morphology. In a preliminary small-animal immunization study, plant-produced Cap protein induced detectable Cap-specific humoral immune responses without observable adverse effects. These results demonstrate that N. benthamiana supports efficient production of PCV2d Cap protein and its assembly into immunogenic VLPs, highlighting the potential of plant-based molecular farming for veterinary vaccine development.'},
  {id:'p25',num:'P-25',speaker:'Tressa N Smalley',affil:'(1) Biochemistry, Molecular, Cell and Developmental Biology Graduate Group, University of California, Davis; (2) Department of Chemical Engineering, University of California, Davis; (3) Global Health Share Initiative, University of California, Davis',title:'Evaluation of the transient expression of human activin receptor 2B Fc fusion protein in Nicotiana benthamiana',topic:'Plant‑Made Biologics – From Antibodies to Advanced Therapeutics',abstract:'Plants offer a versatile platform for bioproduct manufacturing, including Space, where they can provide both food and medicine. The potential therapeutic, activin receptor 2b Fc fusion protein, (ACVR2B-Fc) shows promise in counteracting muscle atrophy, reducing it in mice under microgravity and in genetic disease models. Here I present successful ACVR2B-Fc expression in tobacco, confirming viability of an alternative production system and setting up for a future transgenic platform in the space relevant plant, Lemna japonica. Using Agrobacterium tumefaciens-mediated infiltration of N. benthamiana, I evaluated four ACVR2B-Fc sequences, comparing two Fc sequences and two glycosylation patterns and ER retention. The recombinant ACVR2B-Fc protein was screened through a combination of bicinchoninic acid (BCA), SDS/PAGE, western blotting, and enzyme linked immunosorbent assay (ELISA) to evaluate expression levels. The Fc fusion of the protein also serves for use in purification and allows for streamlined protein evaluation. Transient expression was achieved for the two constructs that were retained within the ER, and expression of these two constructs was evaluated from 1 to 4 days post infiltration. Plants showed peak expression around day 3. Early analyses show ACVR2B-Fc as approximately 0.01-0.02%TSP(2-4mg/kg FW). This study establishes that ACVR2B-Fc can be expressed in plants and paves the way for future optimization in tobacco as well as transgenic expression in L. japonica.'},
  {id:'p26',num:'P-26',speaker:'Vívian Caiafa Ferreira Paiva',affil:'(1) Universidade Federal de Juiz de Fora, Minas Gerais, Brasil, (2) Universidade Federal de São João del-Rei, Minas Gerais, Brasil.',title:'Targeting breast and ovarian cancer using a plant-produced scFv-anti-HER2 antibody',topic:'Plant‑Made Biologics – From Antibodies to Advanced Therapeutics',abstract:'Plant-based expression systems have emerged as attractive platforms to produce recombinant proteins and to allow protein engineering strategies. Here, we engineered and expressed a scFv anti-HER2 in Nicotiana benthamiana, incorporating the 2S2 signal peptide to promote efficient secretion into the apoplast. Agroinfiltration was performed with GV3101 Agrobacterium harboring the pK7WG2D_scFv-anti-HER2 plasmid. Apoplast redirection by the 2S2 signal peptide was confirmed by SDS-PAGE and Western blot in apoplastic fluid, even at low agroinfiltration densities. Positive samples were purified using His-tag affinity chromatography, diluted (200 to 0.001 µg/mL) and evaluated in HER2-positive breast (SK BR-3) and ovarian (SKOV-3) cancer cell models, using Trastuzumab as a reference therapeutic antibody. In the MTT assay, Trastuzumab reduced cell viability by less than 20%, keeping it above 80%, whereas plant-produced scFv-anti-HER2 decreased viability to about 50% at higher concentrations for both cell lines. Despite lacking Fc region, the scFv retained significant biological activity, exhibiting measurable cytotoxic effects with an IC₅₀ of approximately 37.36 µg/mL in SK BR-3 cells and 100 µg/mL in SKOV-3 cells. These findings demonstrate the effect of biologically active scFv-anti-HER2 fragments produced in plant-based platforms and highlight their potential as cost-effective and scalable alternatives for the development of next-generation targeted cancer therapeutics.'},
  {id:'p27',num:'P-27',speaker:'Henrik Nausch',affil:'(1) Fraunhofer Institute for Molecular Biology and Applied Ecology IME, Department Model-based Product and Bioprocess Engineering, Forckenbeckstrasse 6, 52074 Aachen, Germany',title:'Development of an efficient purification process for monoclonal antibodies transiently expressed in Plant Cell Packs.',topic:'Scaling Up Plant‑Based Production',abstract:'Laccases are versatile oxidoreductase enzymes present in bacteria, fungi, and plants, with numerous industrial applications, including the degradation of pharmaceutical micropollutants in wastewater. Among these, bacterial laccases are particularly attractive due to their high catalytic activity and remarkable stability across a wide range of temperatures and pH values. One such enzyme is the Escherichia coli copper efflux oxidase (CueO) fused to the adhesion promoting peptide Maqaque Histatin (MacHis) as immobilized enzymes proved to be most effective for waste water treatment. However, their practical application has been limited by low accumulation levels of only 25–50 mg/L when recombinantly expressed in E. coli or Pichia pastoris.; In this study, we demonstrate that the engineered CueO-MacHis can be produced at substantially higher levels of 250–320 mg/kg biomass in plant chloroplasts. Furthermore, we established a simplified and cost-effective purification strategy that leverages the enzyme\'s temperature and pH stability combined with either anion exchange chromatography (AEX) or tangential flow filtration (TFF).; This approach paves the way for the large-scale production of CueO-MacHis as a technical enzyme for industrial applications.'},
  {id:'p28',num:'P-28',speaker:'Lea Veničáková',affil:'(1) Faculty of Natural Sciences, Department of Biotechnology, University of Ss. Cyril and Methodius, Trnava, 91701, Slovakia; (2) Department of Information Systems and Technologies, Bilkent University, Ankara, Türkiye; (3) National Agricultural and Food Center, Research Institute of Plant Production, Piešťany, 92168, Slovakia',title:'Optimization of Long-Term Callus Biomass Production in Hybrid Lavender Using Machine Learning',topic:'Scaling Up Plant‑Based Production',abstract:'Lavender hybrids such as Lavandula × intermedia ‘Budrovka’ are increasingly explored as flexible upstream systems for plant molecular farming due to their well-characterized monoterpenoid and phenolic pathways and their reliable response to in vitro manipulation. Yet, long-term quantitative descriptions of callus biomass development remain limited. We monitored callus formation from root and stem explants in 3-week intervals across a 15-week cultivation period to generate a structured dataset suitable for predictive modelling. Five algorithms (Beta Regression, GAM, Random Forest, SVR, XGBoost) were trained on mean response data to estimate callus weight and induction efficiency. XGBoost achieved the highest accuracy for biomass prediction (R² = 0.9373; RMSE 1.76 g), and feature-importance profiles consistently identified explant origin, culture duration and auxin–cytokinin regime as dominant contributors to callus performance. NSGA-II multi-objective optimization, guided by GAM and XGBoost outputs, indicated that 15-week root-derived calli grown under 0.5 mg/L 2,4-D and 2 mg/L BAP represent the highest-yielding configuration. The study provides a data-resolved view of long-term callus behavior in hybrid lavender and a modelling-based approach for rational tuning of biomass production in plant-based bioprocesses.; This work was supported by project FPPV-31-2026.'},
  {id:'p29',num:'P-29',speaker:'Sofia Mikulášková',affil:'(1) Faculty of Natural Sciences, Department of Biotechnology, University of Ss. Cyril and Methodius, Trnava, 91701, Slovakia; (2) National Agricultural and Food Center, Research Institute of Plant Production, Piešťany, 92168, Slovakia',title:'Medium optimization of Datura stramonium L. root cultures to enhance tropane alkaloid production',topic:'Scaling Up Plant‑Based Production',abstract:'Plant-based production systems require robust and predictable in vitro platforms to support process optimization and future scale-up. Primary, non-transformed root cultures of Datura stramonium L. were used as a controlled in vitro platform to optimize the biosynthesis of the pharmaceutically relevant tropane alkaloids hyoscyamine and scopolamine. The combined effects of indole-3-acetic acid (IAA) and sucrose concentrations in liquid Gamborg B5 medium were evaluated using DoE and RSM. Biomass accumulation remained statistically comparable across all tested conditions, indicating stable growth kinetics suitable for process optimization. In contrast, alkaloid levels were significantly influenced by the interaction between auxin availability and carbon source concentration. RSM modelling enabled numerical optimization and identified 4 mg/L IAA and 50 g/L sucrose as conditions predicted to enhance alkaloid production while maintaining biomass stability. Experimental validation confirmed model accuracy for scopolamine and growth parameters, whereas hyoscyamine showed higher biological variability, suggesting the need for broader design space in future work. These findings demonstrate that targeted medium optimization can increase metabolite yield independently of biomass changes and support the use of DoE-RSM strategies to improve process predictability in root culture  plant production systems. This work was supported by project FPPV-05-2026.'},
  {id:'p30',num:'P-30',speaker:'Tsubasa Hirabayashi',affil:'(1)：Frontier Business Division, Chiyoda Corporation (2)：Biomanufacturing Process Research Center (BPRC), National Institute of Advanced Industrial Science and Technology (AIST) (3)：International Center for Biotechnology, The University of Osaka (4)：Nippi Research Institute of Biomatrix',title:'Successful Production of Human Type II Collagen in Plants and Establishment of a Facility for Scale-Up and R&D Support',topic:'Scaling Up Plant‑Based Production',abstract:'Biomanufacturing represents a sustainable alternative to conventional chemical processes due to its superior energy efficiency and reduced dependence on fossil resources. Despite this promise, challenges such as limited productivity and constraints in achievable material properties remain. While microbial platforms are often inadequate for producing large, structurally complex proteins, plants offer distinct advantages as hosts for high molecular weight recombinant protein synthesis. In this study, we demonstrate the successful production of human type II collagen—an essential structural component of cartilage—using a plant-based expression system. Because this protein requires intricate post translational modifications, it is difficult to express in standard microbial systems such as E. coli. Our analyses confirmed that the plant-derived collagen retains its native triple helical conformation and exhibits physicochemical properties comparable to those of collagen derived from animal tissues. To promote the commercialization of plant-made biomaterials, we have established a dedicated research and development facility designed to support feasibility evaluation and process scale-up from laboratory to industrial levels. Through this infrastructure, we aim to accelerate the development of diverse high-value plant-derived materials and contribute to the advancement of the plant molecular farming industry.'},
  {id:'p31',num:'P-31',speaker:'Erick Moreta-Urbano',affil:'(1) Centro Nacional de Biotecnología (CNB-CSIC) CNB',title:'Accelerated Breeding of Non-Flowering Tobacco Lines for Biomass Enhancement',topic:'Smart Chassis – Engineering the Plant Factory',abstract:'Nicotiana tabacum is a promising plant biofactory due to its high biomass yield, well characterized secondary metabolism, and metabolic compartmentalization. Enhancing biomass is therefore a key goal for engineering tobacco as a chassis for leaf based secondary metabolite production. Nevertheless, obtaining transgene free CRISPR mutants optimized for vegetative growth in tobacco is time consuming due to its relatively long-life cycle. We employed CRISPR Cas mutagenesis of endogenous flowering activator genes to extend vegetative growth and increase biomass. The thermotolerant Cas12 endonuclease generated quadruple flowering activator mutants in a single generation. To accelerate the breeding cycle, a florigen gene was overexpressed within the T DNA, reducing flowering time by half compared to standard protocols and enabling rapid selection of T DNA free CRISPR mutant seeds. Viral vectors overexpressing a florigen gene were also evaluated as a graft free strategy to induce flowering for propagation of non flowering lines. Flowering activator mutants accumulated greater biomass by the time wild type plants initiated flowering and remained in a prolonged vegetative state, unable to flower under long day or short day conditions, with potential for even greater biomass due to continued vegetative growth. This approach provides a versatile strategy to shorten breeding timelines and generate high biomass, non flowering tobacco lines optimized as sustainable plant biofactories.'},
  {id:'p32',num:'P-32',speaker:'Ethan Martindale',affil:'Department of Biology, University of Oxford, UK',title:'Towards Using Synthetic Biomolecular Condensates to Improve IgG Yield in Planta',topic:'Smart Chassis – Engineering the Plant Factory',abstract:'Nicotiana benthamiana offers a robust and flexible platform for the production of therapeutic antibodies, including IgGs against Ebola and HIV. Plant-derived IgG yield is, however, limited by protease degradation and further complicated by inefficient secretion of IgG into the apoplast. We hypothesised that targeting IgG to synthetic biomolecular condensates in the secretory pathway will improve IgG yield by: reducing ER stress associated with IgG expression (and thereby enhancing IgG folding), shielding IgG from proteolytic degradation, and improving IgG secretion into the apoplast. Our preliminary data demonstrate that a transiently expressed condensate scaffold recruits its client in N. benthamiana, leading to a change in the yield of the condensate-targeted client. This is a ground-breaking system, showing that synthetic condensates can be successfully targeted to the plant secretory pathway. In the future we will apply this technology to molecular farming, to improve IgG yield by targeting antibodies to synthetic condensates in the plant secretory pathway. This technology has the potential to substantially improve industrial plant molecular farming.'},
  {id:'p33',num:'P-33',speaker:'Helena Tomas Tenes',affil:'Centro Nacional de Biotecnología (CNB-CSIC) CNB.',title:'Metabolic and developmental engineering of Nicotiana tabacum for the enhanced production of terpenoids in glandular trichomes.',topic:'Smart Chassis – Engineering the Plant Factory',abstract:'Nicotiana tabacum glandular trichomes produce large quantities of diterpenes, representing a promising and sustainable alternative to conventional systems for producing high-value industrial or pharmaceutical terpenoids. While traditional breeding has generated tobacco varieties with favourable agronomic traits, breeding for biofactory-related traits remains largely unexplored. Furthermore, genetic tools for trichome-targeted metabolic engineering and heterologous compound production are not yet fully optimized. We evaluated trichome density in eighteen high-diterpene-yielding N. tabacum varieties using an automated quantification pipeline to identify a suitable biofactory chassis. We characterized the effects of CRISPR-Cas12 mutations in genes affecting trichome density and diterpene biosynthesis. Finally, we generated dual-reporter transgenic lines to assess the expression of five promoters described as trichome-specific. Trichome density and productivity were uncoupled, contributing independently to diterpene yield. CRISPR-Cas12 mutant lines demonstrated that targeted breeding can increase trichome density and block the main diterpene biosynthetic pathway. Dual-reporter lines revealed unexpected basal promoter expression in leaf tissue, challenging their reported specificity. This work contributes to the development of plant biofactories by integrating variety selection, promoter characterization, and genome editing to enhance terpene yield.'},
  {id:'p34',num:'P-34',speaker:'Lukas Leibetseder',affil:'acib GmbH (1), BOKU University (2)',title:'From plant to bioreactor: a robust workflow for establishing high-performance plant cell cultures',topic:'Smart Chassis – Engineering the Plant Factory',abstract:'Traditional production of high-value plant secondary metabolites is frequently hampered by environmental instability and resource-intensive farming. By transitioning to a bioreactor-based production system, we can offer a sterile and reproducible alternative to field cultivation. To move efficiently to a cell culture process we present a streamlined, two-stage strategy for the development of stable plant suspension cell lines. First, callus induction is screened for optimal growth and consistency for suspension cell lines. Second, a systematic macronutrient-based media optimization was implemented for the simultaneous selection of high growth and cell morphology. Using this screen, we successfully established a novel Moringa oleifera-derived cell line specifically engineered for industrial application. The M. oleifera cell line exhibits a low-aggregation phenotype and fast growth kinetics. Beyond its native capacity for bioactive secondary metabolite synthesis, the cell line’s high endogenous protein content provides a robust foundation for recombinant protein expression.  This research demonstrates how precise medium optimization and cell line selection can decouple plant-derived production from agricultural constraints. The developed M. oleifera platform serves as a versatile, robust biotechnological tool for the pharmaceutical industry.'},
  {id:'p35',num:'P-35',speaker:'Šarlota Kaňuková',affil:'(1) Faculty of Natural Sciences, Department of Biotechnology, University of Ss. Cyril and Methodius, Trnava, 91701, Slovakia; (2) National Agricultural and Food Center, Research Institute of Plant Production, Piešťany, 92168, Slovakia',title:'Elicitor-Mediated Modulation of Tropane Alkaloid Production in Root-Derived Callus Cultures of Datura stramonium L.',topic:'Smart Chassis – Engineering the Plant Factory',abstract:'Callus cultures of Datura stramonium L. offer a controlled in vitro platform for the production of pharmaceutically relevant tropane alkaloids. In this study, root-derived calli were established on Murashige and Skoog medium supplemented with selected auxin-cytokinin combinations and assessed for their ability to accumulate hyoscyamine and scopolamine. Basal calli produced only low alkaloid levels, but elicitation markedly enhanced biosynthesis. A broad range of biotic and abiotic elicitors was tested, with yeast extract (300 mg/L) and a plant extract containing cucumber mosaic virus (CMV) identified as the most effective treatments. Yeast extract increased hyoscyamine accumulation up to 24.7 mg/g DW (approximately 39-fold compared to control), while both yeast extract and the CMV-containing extract enhanced scopolamine levels more than 30-fold. Biomass responses to elicitation varied depending on the plant growth regulator composition used during callus maintenance, with methyl jasmonate (100 mg/L) supporting the largest biomass increase. These results demonstrate that D. stramonium callus cultures can be efficiently stimulated to produce high levels of tropane alkaloids and highlight the importance of selecting suitable elicitors and growth regulator combinations for optimizing metabolite output in plant in vitro production systems. This work was supported by project FPPV-05-2026.'},
  {id:'p36',num:'P-36',speaker:'Thomas Van den Wijngaert',affil:'Instituto de Biología Molecular y Celular de Plantas UPV-CSIC (1), Katholieke Universiteit Leuven (2), Instituto de Biología Molecular y Celular de Plantas UPV-CSIC (3), Instituto de Biología Molecular y Celular de Plantas UPV-CSIC (4)',title:'Next-Generation Genome Editing Tools for Plant Biofactories',topic:'Smart Chassis – Engineering the Plant Factory',abstract:'Precision and versatility in genome editing are essential for next-generation plant biofactories. We present two complementary strategies to overcome plant-specific limitations of current CRISPR tools. First, we develop AlCas12a, a novel metagenomic Cas12a nuclease, optimized for plant expression and paired with a TYLCV-based replicon to increase intracellular accumulation. We then apply structure-guided in silico protein engineering in two directions: (i) conserved mutations to obtain thermotolerant AlCas12a variants capable of efficient DNA cleavage at 22–25 °C, and (ii) chimeric and WED-III–corrected variants generated by domain swapping and targeted mutagenesis to restore pre-crRNA processing and enable multiplex genome editing. All variants have been computationally modeled and are being prepared for experimental validation. Second, we evaluate Prime Editing in Nicotiana benthamiana using a macroscopically visible fungal-bioluminescence reporter to directly score precise edits. Prime Editing version 7 was assessed, and editing efficiency was further enhanced using two amplification strategies (i) a TYLCV replicon to enhance editor and guide expression and (ii) a PhiC31 “SWITCH-ON” TMV replicon that amplifies reporter signal only upon successful PhiC31 editing. Together, AlCas12a engineering and system-level Prime Editing optimization expand the CRISPR toolbox for precise, efficient and multiplex genome editing in dicot plants.'},
  {id:'p37',num:'P-37',speaker:'Victor Vazquez-Vilriales',affil:'(1) Instituto de Biología Molecular y Celular de Plantas (CSIC-UPV), Valencia, Spain. (2) Earlham Institute, Norwich Research Park, Norwich, United Kingdom.',title:'Development of Autobioluminescent Sentinel Plants for the Early Remote Detection of Viral Infections',topic:'Smart Chassis – Engineering the Plant Factory',abstract:'Using plants as high-tech biofactories for high-value compound production demands extreme biosecurity and control. In these platforms, a viral infection is not merely a pathology but a critical failure in the production chain. To ensure batch integrity without skyrocketing costs, developing monitoring early-warning systems independent of complex instrumentation is imperative.; This project implements the "sentinel plant" concept in Nicotiana benthamiana for continuous monitoring using simple imaging systems. By coupling the fungal bioluminescence pathway to geminivirus vectors, a sensor with an OFFON logic was generated. This configuration detects infection before pathological phenotypes emerge, granting a larger action window. To provide a dedicated analytical tool, LumTrack was developed, a custom software that automates image analysis and visualizes spatiotemporal dynamics.; To expand the spectral detection range, the bacterial bioluminescence pathway coupled with BRET architectures was explored. This study assessed the feasibility of this pathway in plants and its potential to engineer a versatile palette of multispectral reporters.; Overall, this work validates sentinel plants as robust, self-reporting biosensors. By serving as co-cultivated biological proxies, they enable early detection and continuous monitoring, proposing a potentially scalable strategy to secure high-value production crops.'},
  {id:'p38',num:'P-38',speaker:'Fabian Schubert',affil:'(1)BOKU University, Institute of Plant Biotechnology and Cell Biology, Department of Biotechnology and Food Science, Muthgasse 11/1, 1190 Vienna, Austria ; (2)Research Center Molecular Biotechnoloy, The Molecular Biotechnology Section, University of Applied Sciences, Vienna, Austria; (3) Medical University of Vienna Center for Pathophysiology, Infectiology and Immunology Institute of Pathophysiology and Allergy Research',title:'Bio-encapsulation of immunotherapeutics for allergy treatmentfor allergy treatment',topic:'The Molecular Farming Marketplace',abstract:'Allergen-specific immunotherapy is a disease-modifying treatment for respiratory and insect venom allergies, but its application to food allergies remains limited. Conventional subcutaneous immunotherapy is associated with adverse reactions, prolonged treatment periods, and only transient clinical benefits. In contrast, oral immunotherapy induces desensitization and long-term immune tolerance through controlled allergen exposure and has shown promising clinical and immunological outcomes. Safety can be further improved by generating hypoallergenic variants that retain immunological activity while reducing allergenic potential. However, orally administered allergens undergo extensive proteolytic degradation in the gastrointestinal tract. Hypoallergenic parvalbumin, a promising candidate for fish allergy treatment, is particularly unstable upon mucosal delivery and therefore fails to induce durable oral tolerance. To overcome this limitation, we bioencapsulated hypoallergenic parvalbumin within zein protein bodies using Nicotiana benthamiana as an expression host. Zein protein bodies are naturally occurring seed storage organelles with high mechanical and chemical stability. A multilayered protein body platform composed of three distinct zeins enabled spatial targeting of the allergen to defined protein body layers. Protein bodies were produced at larger scale and evaluated in a murine food allergy model, where oral administration resulted in encouraging immunological outcomes'},
  {id:'p39',num:'P-39',speaker:'Jana Huckauf',affil:'(1) University of Rostock, Faculty of Agricultural and Environment, Department of Agrobiotechnology, Justus-von-Liebig-Weg 8, 18059 Rostock (2) Innocent Meat GmbH, Landgut 9,18059 Papendorf',title:'Plant-made basic Fibroblast growth factor (bFGF) for the usage in animal cell culture',topic:'The Molecular Farming Marketplace',abstract:'The anticipated rise in global meat consumption, combined with increasing pressure to reduce greenhouse gas emissions and improve animal welfare, has intensified work in cultivated meat as a sustainable protein source. A major bottleneck remains the cost-effective, animal-free cell culture media. Fetal bovine serum, the source of growth factors and carrier proteins, is incompatible with the ethical, regulatory, and scalability requirements of cultivated meat production. Molecular farming offers a scalable alternative for producing recombinant growth factors. Basic fibroblast growth factor (bFGF) is a key cytokine regulating cell proliferation and lineage commitment and represents a major cost driver in serum-free media. In this study, porcine bFGF variants were produced via transient expression in N. benthamiana using the viral MagnICON expression system. Different gene constructs were evaluated with respect to expression yield, purification efficiency, and biological activity to identify optimal production strategies. The most promising bFGF variants were transferred into pea (Pisum sativum) for stable, seed-specific expression. Eleven independent transgenic pea events were generated, and bFGF accumulation was quantified in homozygous lines. This work establishes peas as a platform for seed-based production of functional animal growth factors. Future studies will investigate whether minimally processed seed extracts can be directly applied in animal-free cell culture media.'},
  {id:'p40',num:'P-40',speaker:'Denise Pivotto',affil:'(1) Department of Biotechnology, University of Verona, Verona, Italy, (2) Diamante SB srl, Verona, Italy',title:'Plant-made viral nanoparticles for molecular farming: Insights into RNA inactivation strategies and RNA-free alternatives',topic:'Viral Vectors and Nanoparticles in Molecular Farming',abstract:'Plant-made nanoparticles represent a versatile therapeutic strategy in the pharmaceutical field. In the context of autoimmunity, Tomato Bushy Stunt Virus (TBSV) was engineered to display a pLiprin (pLip) peptide, reported as auto-dominant for rheumatoid arthritis, produced in Nicotiana benthamiana, and its functionality explored as platform for the induction of immune tolerance.  This single-stranded RNA-containing virion, while suitable for therapeutic reasons, may represents a bioburden that would require specific and costly disposal, especially when produced in large scale for commercial purposes. Therefore, RNA-inactivation strategies on the final product were investigated, in particular, the use of ultraviolect light (UV) and Binary Ethylenemine (BEI). UV inactivation is a commonly employed technique to damage nucleic acids, while BEI is useful to prevent viral replication, while maintaining the protein structure of the capsid. These strategies would both maintain virus antigenicity, while inactivating its RNA, resulting in a safe and environmentally-friendly active pharmaceutical ingredient (API). On this note, the production of empty virus-like particles (eVLPs) was attempted, to directly obtain an RNA-free virion, to bypass viral inactivation steps. These strategies could innovate and reduce the environmental risk of the API, while maintaining its therapeutic potential, following appropriate validation.'},
  {id:'p41',num:'P-41',speaker:'Esmée Zutt',affil:'Wageningen University and Research',title:'ir, MSc / PhD candidate',topic:'Viral Vectors and Nanoparticles in Molecular Farming',abstract:'Exploring a novel CSDaV-derived VLP platform for biotechnological applications and production in microalgae Virus-like particles (VLPs), including those derived from plant viruses, can be used in biopharmaceutics as a scaffold for vaccines or as carriers by cargo encapsulation. In this work, we introduce the opportunities and limitations of using citrus sudden death-associated virus (CSDaV)-derived VLPs as a novel biotechnological platform. CSDaV-VLPs can be produced in N. benthamiana plants by expressing CSDaV’s major coat protein (CP), with particle sizes and morphology similar to authentic virions. Furthermore, attempts to fuse small peptide sequences to the CSDaV-CP demonstrated that CSDaV-CP only allows for N-terminal genetic fusions to maintain VLP formation. By using the SpyTag/SpyCatcher system, GFP can be bound to VLPs, where it is presented in the internal cavity of the particle. Currently, conditions for dis- and re-assembly of CSDaV-VLPs are being investigated for cargo encapsulation. In addition, a scalable microalgae-based production platform is being explored to enable the production of plant VLPs. To this end, CP genes derived from two plant viruses, CSDaV and CCMV, have been cloned into a microalgae expression vector and are currently being transformed in microalgae. The outcome of this project aims at a proof-of-concept platform combining plant virus-derived VLPs and a microalgae production system to enable fast and customizable biopharmaceutical engineering'},
  {id:'p42',num:'P-42',speaker:'Johannes Grader',affil:'(1) Institute for Molecular Biotechnology, RWTH Aachen University, Worringerweg 1, 52074 Aachen, Germany  (2) Department of Dental Materials and Biomaterials Research, RWTH Aachen University Hospital, Pauwelsstrasse 30, 52074 Aachen, Germany (3) Electron Microscopy Facility, Institute of Pathology RWTH Aachen University Hospital, Aachen, Germany (4) Fraunhofer Institute for Molecular Biology and Applied Ecology IME, Aachen, Germany',title:'It’s All about Networking: Engineered Plant Virus Nanoparticles for cross-linking of hydrogels',topic:'Viral Vectors and Nanoparticles in Molecular Farming',abstract:'In tissue engineering, hydrogels mimic the extracellular matrix, that interacts with and modulates cell behavior. Current research focuses on developing hydrogels that provide dynamic biological and mechanical cues, modulated by the embedded cells during tissue maturation. Plant virus nanoparticles (VNPs) have emerged as promising nanocomposite candidates for hydrogels due to their ability to present diverse peptides on their surface, enhancing cell support and hydrogel properties. Here, genetically engineered and plant-produced potato virus X (PVX) nanoparticles serve as co-building blocks in a gelatin-based hydrogel system. These VNPs are designed with motifs facilitating crosslinking via microbial transglutaminase (mTG). The integrity of the VNPs was confirmed through Western blotting, RT-PCR and transmission electron microscopy. Upon incubation with mTG and gelatin, crosslinking was validated using SDS-PAGE and Western blot analysis. The proteo- and hydrolytic stability alongside mechanical properties was characterized, revealing enhanced stability at a 1/600 VNP-to-gelatin ratio. Live/dead staining indicated maintained cell viability, while immunofluorescent labeling demonstrated increased cell interactions.These findings highlight the potential of engineered PVX as biocompatible nanocomposites that stabilize hydrogels and create a dynamic microenvironments mimicking natural extracellular matrices.'},
  {id:'p43',num:'P-43',speaker:'Shiva Izadi',affil:'(1) Institute for Molecular Biotechnology, RWTH Aachen University, Worringerweg 1, 52074 Aachen, Germany. (2) Aiiso Yufeng Li Family Department of Chemical and Nano Engineering, University of California San Diego, 9500 Gilman Dr., La Jolla, California 92093, United States. (3) Fraunhofer Institute for Molecular Biology and Applied Ecology IME, Aachen, Germany.',title:'Plant virus nanoparticles as biocompatible delivery system for siRNA to selectively control pests',topic:'Viral Vectors and Nanoparticles in Molecular Farming',abstract:'The increasing demand for sustainable agricultural practices has highlighted the need for innovative solutions in plant protection. RNA interference has been utilized to develop RNA-based pesticides as an alternative to traditional chemical formulations. However, due to the low environmental RNA stability, effective nucleic acid delivery requires safe, stable, and efficient vehicles to protect these molecules from degradation. Synthetic nanoparticles involve high manufacturing costs as well as safety and environmental concerns. In contrast, engineered plant virus-like particles (VLPs) can be used to encapsulate small interfering RNA (siRNA) to create efficient and biodegradable biopesticides that target plant pathogens without the need for transgenic plants. Here, we demonstrate the successful in planta and in vitro assembly of the potato virus X coat protein and non-viral RNA targeting GFP. The structures of different siRNA/VLPs are assessed using transmission electron microscopy. The localization and silencing capacity of the sprayed siRNA/VLPs in GFP-transgenic plants are determined by confocal microscopy, RT-PCR and Western blotting. In future, RNA size and concentration in filamentous and spherical VLPs will be optimized to induce potent silencing effects. This work highlights siRNA/VLPs as biocompatible, non-infective pest management system convenient for farmers.'},
  {id:'p44',num:'P-44',speaker:'Sofía López Solís',affil:'Instituto de Biología Molecular y Celular de Plantas, Consejo Superior de Investigaciones Científicas – Universitat Politècnica de València, Valencia, Spain',title:'Improving the tobacco mosaic virus vector for systemic expression of recombinant proteins in plants',topic:'Viral Vectors and Nanoparticles in Molecular Farming',abstract:'Viral vectors have been established as one of the most rapid and efficient plant-based systems for recombinant protein production, with tobacco mosaic virus (TMV) notably achieving remarkable accumulation levels of some proteins of interest. Despite this potential, TMV-based platforms are traditionally limited by a narrow cargo capacity and a lack of systemic mobility; since the protein of interest typically replaces the viral coat protein (CP), the resulting vector is unable to move beyond the initial infection site. To address these bottlenecks, this work explores strategies to decouple protein expression from movement constraints by leveraging the correlation between expression levels and movement protein (MP) availability. We generated two transgenic Nicotiana benthamiana lines designed to provide viral functions in trans: the first expresses the full-length MP to decompress the viral genome and allow for larger exogenous inserts, while the second expresses a gain-of-function MP mutant, lacking the 16 C-terminal amino acids, facilitating systemic viral spread even in the absence of the CP. Complementing these host-based strategies, we developed a novel vector utilizing the P2A self-processing peptide to fuse the recombinant protein to the CP. This approach preserves CP integrity and ensures systemic movement in wild-type plants. Together, these systems provide a flexible toolkit for high-yield, systemic production of large and complex proteins in plant-based biofactories.'},
  {id:'p45',num:'P-45',speaker:'Verónica',affil:'Instituto de Biología Molecular y Celular de Plantas, Consejo Superior de Investigaciones Científicas-Universitat Politècnica de València, Valencia, Spain',title:'Viral vectors for plant metabolic engineering',topic:'Viral Vectors and Nanoparticles in Molecular Farming',abstract:'Plant viruses are frequently reshaped into expression vectors for the efficient and quick production of recombinant proteins in plants, which are used as bioreactors. Interestingly, plant viruses can also be engineered to produce metabolites of interest in biofactory plants. To do so, virus-based vectors typically express transcription factors or metabolic enzymes that impact into endogenous or novel metabolic pathways in the host plants. Our research group has pioneered the use of viruses within the genus Potyvirus, such as tobacco etch virus, to produce anthocyanins, carotenoids and apocarotenoids in Nicotiana benthamiana. The use of potyviral vectors in plant metabolic engineering is based on the relatively large cargo capacity of this type of elongated, flexuous RNA viruses, and the efficient and highly specific activity or the viral nuclear inclusion a protease (NIaPro). Our current research aims to open the technology to other potyviruses, such as lettuce mosaic virus or beet mosaic virus, which may allow to produce the metabolites of interest in edible plants, and to explore the use of minus-strand RNA viruses, such as tomato spotted wilt virus. Based on particularities of the infection cycle, this kind of vectors may exhibit larger cargo capacity with higher genetic stability.;'},
  {id:'p46',num:'P-46',speaker:'Yukti Kataria',affil:'1 University of Nottingham, School of Biosciences, Nottingham, UK   2 Croda Europe, Harpenden, UK   3 John Innes Centre, Norwich, UK',title:'Coupling of Replication and Selective Packaging in Cowpea Mosaic Virus Enables Custom RNA Encapsidation for Biopesticides',topic:'Viral Vectors and Nanoparticles in Molecular Farming',abstract:'Cowpea mosaic virus (CPMV) is a bipartite plant RNA virus that provides a unique opportunity to integrate fundamental virology with plant molecular farming. In CPMV, selective encapsidation is intrinsically linked to replication, such that only replication-competent RNAs are packaged into viral particles. Exploiting this, heterologous RNAs flanked by CPMV untranslated regions can be efficiently replicated and selectively packaged into virus-like particles (VLPs) that are readily purified from agroinfiltrated plant tissue.    We show here that a long hairpin RNA (forming a pseudo double-stranded RNA) encoding inverted repeats of a gene sequence from an agricultural insect pest (Colorado Potato Beetle) is efficiently and stably encapsidated within CPMV VLPs, with integrity retained after purification, underscoring their potential as dsRNA delivery vehicles. Notably, packaging is significantly more efficient when a version of RNA-1 is used which cannot replicate itself, but is only capable of replication in trans. These findings validate CPMV VLPs as a potential platform for Spray-Induced Gene Silencing (SIGS), a highly specific and environmentally sustainable pest-control strategy based on RNA interference and gene silencing following dsRNA ingestion by target pests. Collectively, this work positions CPMV dsRNA VLPs as a next-generation RNA delivery technology which we intend to combine with industry-enabled formulation pipelines for pest control product development.'},
];

let activeFilter = 'all';
let myAgenda = new Set();
let expandedCards = new Set();
let collapsedDays = new Set();

function setFilter(type, btn) {
  activeFilter = type;
  document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const query = document.getElementById('search').value.toLowerCase().trim();
  const content = document.getElementById('content');

  const allItems = [...TALKS, ...POSTERS];
  const filtered = allItems.filter(t => {
    const matchType = activeFilter === 'all' || t.type === activeFilter || (activeFilter === 'poster' && t.num);
    const matchQ = !query ||
      (t.speaker||'').toLowerCase().includes(query) ||
      (t.title||'').toLowerCase().includes(query) ||
      (t.topic||'').toLowerCase().includes(query) ||
      (t.affil||'').toLowerCase().includes(query);
    return matchType && matchQ;
  });

  updateStats(filtered);

  if (filtered.length === 0) {
    content.innerHTML = `<div class="no-results"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><p>No results found for "<strong>${query}</strong>"</p></div>`;
    return;
  }

  // Separate posters from talks
  const filteredTalks = filtered.filter(t => !t.num);
  const filteredPosters = filtered.filter(t => t.num);

  let html = '';

  // Group talks by day
  const days = [
    {key:'wed',label:'Wednesday 13 May',cls:'dh-wed',sub:'Plant-Made Biologics · Keynotes · Flash Talks I'},
    {key:'thu',label:'Thursday 14 May',cls:'dh-thu',sub:'Viral Vectors · Scaling Up · Smart Chassis · Flash Talks II'},
    {key:'fri',label:'Friday 15 May',cls:'dh-fri',sub:'Metabolic Engineering · Marketplace · Flash Talks III'},
  ];

  for (const day of days) {
    const dayTalks = filteredTalks.filter(t => t.dayKey === day.key);
    if (dayTalks.length === 0) continue;

    const isCollapsed = collapsedDays.has(day.key);
    html += `<div class="day-section">
      <div class="day-header ${day.cls}" onclick="toggleDay('${day.key}',this)">
        <div>
          <h2>${day.label}</h2>
        </div>
        <span class="day-sub">${dayTalks.length} sessions</span>
        <span class="day-toggle ${isCollapsed?'':'open'}">▼</span>
      </div>
      <div class="day-body ${isCollapsed?'collapsed':''}">`;

    // Group by session
    const sessions = [...new Set(dayTalks.map(t => t.session))];
    for (const session of sessions) {
      const sessionTalks = dayTalks.filter(t => t.session === session);
      html += `<div class="session-group"><div class="session-label">${session}</div>`;
      for (const t of sessionTalks) {
        html += buildTalkCard(t);
      }
      html += '</div>';
    }
    html += '</div></div>';
  }

  // Posters section
  if (filteredPosters.length > 0 && (activeFilter === 'all' || activeFilter === 'poster')) {
    const isPosterCollapsed = collapsedDays.has('poster');
    html += `<div class="day-section">
      <div class="day-header dh-poster" onclick="toggleDay('poster',this)">
        <div><h2>Poster Sessions</h2></div>
        <span class="day-sub">Wed 18:00 & Thu 18:40 · ${filteredPosters.length} posters</span>
        <span class="day-toggle ${isPosterCollapsed?'':'open'}">▼</span>
      </div>
      <div class="day-body ${isPosterCollapsed?'collapsed':''}">
        <div class="session-group">
          <div class="session-label">All posters — click to view abstract</div>
          <div class="poster-grid">`;

    for (const p of filteredPosters) {
      const inA = myAgenda.has(p.id);
      html += `<div class="poster-card ${inA?'in-agenda':''}" onclick="togglePoster('${p.id}')">
        <div class="poster-num">${p.num||p.code||''}</div>
        <div class="poster-title">${p.title}</div>
        <div class="poster-author">${p.speaker}${p.affil?' · '+p.affil:''}</div>
        <div class="poster-topic">${p.topic}</div>
      </div>`;
    }
    html += '</div></div></div></div>';
  }

  content.innerHTML = html;

  // Re-expand previously expanded cards
  for (const id of expandedCards) {
    const detail = document.getElementById('d_'+id);
    const card = document.getElementById('c_'+id);
    if (detail) detail.classList.add('open');
    if (card) card.classList.add('expanded');
  }
}

function buildTalkCard(t) {
  const inA = myAgenda.has(t.id);
  const isExp = expandedCards.has(t.id);
  const badgeCls = {keynote:'bk',oral:'bo',flash:'bf',poster:'bp'}[t.type]||'bo';
  const code = t.code || t.num || '';
  const badgeLabel = code ? code : t.type.charAt(0).toUpperCase() + t.type.slice(1);
  return `<div class="talk-card ${inA?'in-agenda':''} ${isExp?'expanded':''}" id="c_${t.id}">
    <div class="talk-header" onclick="toggleCard('${t.id}')">
      <div class="talk-time">${t.time}</div>
      <div class="talk-content">
        <div class="talk-title">${t.title}</div>
        <div class="talk-speaker">${t.authors||t.speaker}${t.affil?' <em>· '+t.affil+'</em>':''}</div>
      </div>
      <div class="talk-right">
        <span class="badge ${badgeCls}">${badgeLabel}</span>
        <button class="add-btn ${inA?'added':''}" title="${inA?'Remove from agenda':'Add to agenda'}"
          onclick="event.stopPropagation();toggleAgenda('${t.id}')">${inA?'★':'☆'}</button>
      </div>
    </div>
    <div class="talk-detail ${isExp?'open':''}" id="d_${t.id}">
      <div class="detail-inner">
        <div class="detail-topic">${t.topic}</div>
        ${t.authors&&t.authors!==t.speaker?'<p class="detail-authors"><strong>'+t.authors+'</strong></p>':''}
        <p class="detail-abstract">${t.abstract}</p>
        ${t.affil?'<p class="detail-affil">'+t.affil+'</p>':''}
        <div class="detail-actions">
          <button class="action-link ${inA?'primary':''}" onclick="toggleAgenda('${t.id}')">
            ${inA?'★ In my agenda':'☆ Add to agenda'}
          </button>
        </div>
      </div>
    </div>
  </div>`;
}

function toggleCard(id) {
  if (expandedCards.has(id)) {
    expandedCards.delete(id);
  } else {
    expandedCards.add(id);
  }
  const detail = document.getElementById('d_'+id);
  const card = document.getElementById('c_'+id);
  if (detail) detail.classList.toggle('open');
  if (card) card.classList.toggle('expanded');
}

function toggleAgenda(id) {
  if (myAgenda.has(id)) {
    myAgenda.delete(id);
  } else {
    myAgenda.add(id);
  }
  updateAgendaCount();
  render();
}

function togglePoster(id) {
  if (myAgenda.has(id)) myAgenda.delete(id);
  else myAgenda.add(id);
  updateAgendaCount();
  render();
}

function toggleDay(key, el) {
  if (collapsedDays.has(key)) {
    collapsedDays.delete(key);
  } else {
    collapsedDays.add(key);
  }
  render();
}

function updateAgendaCount() {
  const cnt = myAgenda.size;
  const el = document.getElementById('agenda-count');
  if (cnt > 0) {
    el.textContent = cnt;
    el.classList.remove('hidden');
  } else {
    el.classList.add('hidden');
  }
}

function openAgenda() {
  document.getElementById('agenda-overlay').classList.add('open');
  renderAgendaPanel();
}

function closeAgenda() {
  document.getElementById('agenda-overlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('agenda-overlay')) closeAgenda();
}

function renderAgendaPanel() {
  const ac = document.getElementById('agenda-content');
  if (myAgenda.size === 0) {
    ac.innerHTML = '<div class="agenda-empty">No talks saved yet.<br>Click ☆ on any talk to add it to your agenda.</div>';
    return;
  }

  const allItems = [...TALKS, ...POSTERS];
  const saved = allItems.filter(t => myAgenda.has(t.id));

  // Group by day
  const dayOrder = ['Wednesday 13 May','Thursday 14 May','Friday 15 May'];
  const grouped = {};
  for (const t of saved) {
    const d = t.day || 'Poster Sessions';
    if (!grouped[d]) grouped[d] = [];
    grouped[d].push(t);
  }

  let html = '';
  const allDays = [...new Set([...dayOrder, ...Object.keys(grouped)])];
  for (const day of allDays) {
    if (!grouped[day]) continue;
    html += `<div class="agenda-day-label">${day}</div>`;
    for (const t of grouped[day]) {
      html += `<div class="agenda-item">
        <div>
          <div class="agenda-item-time">${t.time||t.num||''}</div>
          <div class="agenda-item-title">${t.title}</div>
          <div class="agenda-item-speaker">${t.speaker}</div>
        </div>
        <button class="remove-btn" title="Remove" onclick="toggleAgenda('${t.id}');renderAgendaPanel()">×</button>
      </div>`;
    }
  }

  html += `<button class="export-btn" onclick="exportAgenda()">Download my agenda (.txt)</button>`;
  ac.innerHTML = html;
}

function exportAgenda() {
  const allItems = [...TALKS, ...POSTERS];
  const saved = allItems.filter(t => myAgenda.has(t.id));
  let txt = 'MY ISPMF 2026 AGENDA\n';
  txt += '13–15 May 2026 · UPV Valencia\n';
  txt += '='.repeat(50) + '\n\n';
  const grouped = {};
  for (const t of saved) {
    const d = t.day || 'Poster Sessions';
    if (!grouped[d]) grouped[d] = [];
    grouped[d].push(t);
  }
  for (const [day, items] of Object.entries(grouped)) {
    txt += day.toUpperCase() + '\n' + '-'.repeat(30) + '\n';
    for (const t of items) {
      txt += `${t.time||t.num||''} | [${(t.type||'poster').toUpperCase()}] ${t.title}\n`;
      txt += `  ${t.speaker}${t.affil?' ('+t.affil+')':''}\n\n`;
    }
  }
  const blob = new Blob([txt], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ISPMF2026_My_Agenda.txt';
  a.click();
}

function updateStats(filtered) {
  const counts = {};
  for (const t of filtered) {
    const type = t.num ? 'poster' : t.type;
    counts[type] = (counts[type]||0) + 1;
  }
  const bar = document.getElementById('stats-bar');
  const parts = [
    `<div class="stat-pill">Showing <b>${filtered.length}</b></div>`,
    counts.keynote ? `<div class="stat-pill">Keynotes <b>${counts.keynote}</b></div>` : '',
    counts.oral ? `<div class="stat-pill">Oral <b>${counts.oral}</b></div>` : '',
    counts.flash ? `<div class="stat-pill">Flash <b>${counts.flash}</b></div>` : '',
    counts.poster ? `<div class="stat-pill">Posters <b>${counts.poster}</b></div>` : '',
  ];
  bar.innerHTML = parts.join('');
}

// Initial render
render();
</script>
</body>
</html>
